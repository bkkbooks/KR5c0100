body:
  text: 盱江危大有集第十五章古之善爲士者微妙玄通深不可識夫唯不可識故强爲之容吴氏曰士謂有道之士旁達曰通妙萬物者無所不通其妙也微而不顯其通也玄而難辯淵乎如水之深而不可測其中深不可測故强爲之模擬其外之容以示人也下文七者是也林氏曰此章形容有道之士通於玄微妙可謂深於道矣而無所容其識知惟其中心之虚不識不知故其容之見於外者皆出於無心故曰强爲之容豫兮以下乃是形容有道者之容自是精到何氏曰士之爲道也微妙而難窺玄通而不滯誰得而測識之既非情識所到雖名狀亦强耳故取譬如下文所云豫兮若冬涉川猶兮若畏四鄰儼兮其若客涣兮若冰將釋敦兮其若樸曠兮其若谷渾兮其若濁吴氏曰豫猶皆獸名豫象屬猶犬子也象能前知其行遲疑犬先人行尋又回轉故遲回不進謂之猶豫冬涉川者怯寒畏四鄰者懼敵是以遲回而不進有道者不敢爲天下先其容如此儼矜莊貌若客隨而不迎也涣解散貌若冰將釋融液而不凝浸也敦篤厚貌樸材未成器也曠空豁貌若谷虚而善應也渾黄濁貌若濁美惡玄同不自潔也何氏曰十二月輿梁成民未病涉也此冬涉之難士之持重而豫兮者似之無易由言耳屬於垣此四鄰可畏也士之慎密而猶兮者似之主人不問客不先舉士之不爲物先而儼兮者似之水結成冰冰消反水士之於物無滯而涣兮者似之敦兮若樸之未斲曠兮若谷之不盈渾兮若濁之受垢歷歷形容善士之道相似未易殫於言也孰能濁以靜之徐清孰能安以乆動之徐生吴氏曰此承上濁之一字而設問曰孰能濁乎濁者動之時也動繼而靜則徐徐然而清矣又因靜之一字而設問曰孰能安乎安者靜之時也靜繼以動則徐徐而生矣安謂靜定生謂活動蓋惟濁故清惟靜故動以是推之則曠者不盈而盈敦者不器而器涣者不凝而凝儼者不爲主而主猶豫者不爲先而先從可知矣何氏曰是道未嘗不包體用貫動靜而非直空言也和其光同其塵與世混濁而有淡乎泊乎者清寓於濁也閉兊塞門雖安汝止而有油然勃然者動生乎靜也兩云徐者言徐徐自然而非數數然也此言靜則可使濁者徐徐而清動則可使安者徐徐而生動靜互用也林氏曰此兩句只是濁中有清動中有靜耳保此道者不欲盈夫惟不盈故能敝不新成吴氏曰成謂完備凡物敝則缺新則成敝而缺者不盈也新而成者盈也保守此道之人不欲其盈故能爲敝缺不爲新成也章内七容皆敝缺而不新成也何氏曰保此道者不欲盈虚其中也道沖而用之或不盈惟不盈故與物相反人皆趍新趍成而我甘其敝不急於新成林氏曰不欲盈者虚也敝故也敝而不新則千載猶一曰也能如此而後爲道之大成是以能敝不新新是一句成是一句李氏曰接上章道紀之義發明後學存誠致敬常慎其獨不住於相而抱一潜虚爲日用至於頓息諸縁消融萬幻撓之不濁澄之不清是謂微妙玄通深隱也第十六章致虚極守靜篤吴氏曰致至之而至其極處也虚謂無物外物不入乎内也極窮盡其處也守固内禦外如守城之守靜謂不動内心不出乎外也篤力不倦也吕氏曰虚之又虚神得其居靜之又靜神得其正列子靜也虚也得其居也西昇經人能虚空無爲非欲於道而道自歸之何氏曰列子或謂子奚貴虚曰虚者無貴也非其名也莫如靜莫如虚靜也虚也得其居也故曰虚者道之常今至虚且極則性太空矣故曰靜者萬物之始今守靜且篤則心永寂矣性空心寂自然道生虚極生神靜極生覺矣於此可以坐觀物化而不化於物者矣萬物並作吾以觀其復吴氏曰作動也植物之生長動物之知覺皆動也復返還也物生由靜而動故返還其初之靜爲復植物之生氣下藏動物之定心内寂也吕氏曰且萬物之並作兆於和氣發於無形觀其復也反於杳冥歸於自然至人體自然之妙用猶夭地之於萬物作者動復者靜斡旋樞機運鍊元和含養胎息則眞炁來復返本還元矣何氏曰列子有生者有生生者又曰有生則復於不生聖人妙見作復之理觀物之出於機者必入於機故吾不與之俱盈觀物始於艮必終於艮故吾靜而不與之俱往復也者謂歸於道而常存也夫物芸芸各復歸其根歸根曰靜靜曰復命吴氏曰芸芸生長而動之貌凡植物春夏則生氣自根上達於枝葉是曰動秋冬則生氣自上而返還下藏於根是曰靜天以此氣生而爲物者曰命復於其初生之處故曰復命吕氏曰萬物皆作於性類草木之根也出乎震見乎離說乎兊勞乎坎終歸於其根也夫草木枝在上根在下人則不然四肢在下根在上即泥丸宫是其根也黄庭經腦神精根字泥丸乃帝眞之靈域精神所聚處也人能内觀於此則萬神自集萬氣咸臻胎仙成矣故曰夫物芸芸各復歸其根夫至士造道必始於窮理次之以盡性終之於復命未有不窮理盡性而能至於復命者也今夫明白四達窮其理也至虚極守靜篤盡其性也廣成子無視無聽抱神以靜必靜必清汝神將守形形乃長生長生則命乃復矣李氏曰致虚靜篤復命歸根純是神妙若向這裏具隻眼一生參學事畢復命曰常知常曰明不知常妄作凶知常容容乃公公乃王王乃天天乃道道乃乆没身不殆林氏曰得至復命處乃是常乆而不易者能知常乆不易之道方謂之明人惟不知此常乆不變之道故有妄想妄動皆失道之凶也知常則其心與夭地同大何物不容既能容矣則何事不公王天下者即此公道是也以公道而王則與天同矣天即道也故曰王乃天天乃道乆常也人能得此常道則終其身無非道也又何殆之有何氏曰夫惟知時物代謝之爲常則盈虚消息之理得而不察察於細故曰常乃容知美惡是非可容則蕩蕩無偏故曰容乃公至公無私則公之道即王道也至大無外則王之道即天道也悠乆不息則天之道即常道也道歷千萬世而無弊何殆之有此虚靜之極功也吴氏曰殆謂危其身也按殆字從歹訓危訓將訓近凡字從歹者多是死之義也殆者危而將近於死也没猶終也第十七章太上下知有之其次親之譽之其次畏之侮之信不足有不信吕氏曰太上者其教無爲其治無迹與道同體無上可加故曰太上雖有其位而不自尊不尚貴任物自然各安其所若華胥之國則天下不聞治而自治人雖知有其君而謂帝力於我何有周詩曰不識不知順帝之則故曰太上下知有之且上古之世民結繩而用巢居穴處不知四時歲月推遷可謂至治矣伏羲神農氏作民始耕而食織而衣趍於仁義禮樂毁譽之說著焉爲君者澤加於民被其仁者則視之如父母懷其義者譽之如日月親譽之理愈彰則於上古之道日愈遠矣南華經曰舜有羶行百姓悦之是也故曰其次親之譽之後世治出變詐仁義失禮樂廢愚智相欺天下衰矣未免道之以政齊之以刑示其威令使民僶而從之故民不畏威而化爲欺罔民欺罔則侮上之心生矣故曰其次畏之侮之五常者以信爲主魯語云民無信不立信全則天下安信失則天下危儻焉文質相勝得喪相隨權詐聿輿欺罔並起此信之不足也信既不足則民有不信之心生焉所謂周人作誓而民始叛是也故曰信不足有不信林氏曰太上言上古之世也下天下也上古之世夭下之人但見有君而已而皆相忘於道化之中及其後也民之於君始有親譽之意又其後也始有畏懼之意又其後也始有玩侮之意此言世道愈降而愈下也上德既衰誠信之道有所不足故天下之人始有不信之心此啇人作誓而民始叛周人作會而民始疑之意何氏曰聖人在上懷道不言而澤及萬物官府若無事朝廷若無人無勞役無冤刑天下莫不仰上之德當是時知有君而不知其它如魚相忘於江湖時也此太上之道也其次大道廢有仁義則與夭下相親相譽於禮樂之中如魚相呴濡時也又其次則其政察察其民缺缺而天下始畏於法令之下又其次則法立而奸生令行而詐超而民始罔上行私疾視其上而玩侮於後矣此如魚相吞噬時也莊子古之明大道者道德已明而仁義次之賞罰最居其後正有見乎此世道愈降如江河固難復望帝力何有於我之世而伯王道雜人心隨之遂有愛畏敬慢之變皆超於上之人誠信不足以感人以至此極也又曰必我不足於信而後人有不吾信李氏曰太上以下不能無爲親之譽之不言之教也畏之者刑禁也侮之者上失信也上失信於民則民不信猶兮其貴言功成事遂百姓皆謂我自然李氏曰猶兮其貴言不言之教也不言之教無爲而成刑不試而民自服也至於功業成遂還淳返樸則親譽畏侮皆忘矣百姓安居樂俗忘其所自故曰謂我自然何氏曰聖人所以豫兮猶兮以言爲重而不敢事聲色之化民也必得不言之教無爲之爲功成事遂自然之化使民賛美而不自己者乃所以救世變於無窮也吕氏曰太古之化無爲之理不言之教而已其貴言也如此易曰不言而信存乎德行則知聖人一言而爲天下之法自知其言之可貴是以損之又損默之又默猶貴其言未嘗輕發今之人徒貴其言亦虚文也故曰猶兮其貴言有道之君使民日改月化遷善遠罪安居樂俗垂拱而視夭民之阜淳化之風可復功既成事既遂百姓咸謂得其自然之道也第十人章大道廢有仁義智慧出有大僞林氏曰大道行仁義在其中仁義之名立則道漸漓矣故曰大道廢有仁義譬如智慧曰出而後天下之詐偽生吴氏曰前章下知有之者大道也親之譽之者仁義也畏之侮之者智慧也自大道而一降再降已是三等智慧又變爲大偽則共有四等然大道廢而後有仁義則其變猶稍緩智慧出遄有大偽則其變爲甚亟吕氏曰大道者太古無爲之道也大道之隆仁義行於中民用之而不知其爲道耳聖人之學先道德而後仁義世俗之學先仁義而後道德殊不知陰陽者天之道剛柔者地之道仁義者人之道其仁義初未嘗離於道而道亦何嘗棄於仁義奈何後人執於仁義爲定名遂使樸素之道微而蒙蔽之害生焉曾未若絶仁棄義返本還元造乎自然則道不廢矣故曰大道廢有仁義智慧起於仁義盜賊超於貧窮仁義隱則智慧生智慧生則大偽出智不足則繼之以偽故曰智慧出有大偽何氏曰莊子至德之世端正而不知以爲義相愛而不知以爲仁實而不知以爲忠當而不知以爲信是以行而無迹事而無傳由是而觀之仁義忠信之名不立而有其實所以爲至德之世大道之行也六親不和有孝慈國家昏亂有忠臣林氏曰六親不和而後有孝子之名國家昏亂而後知有忠臣之名此二句皆是譬喻吴氏曰六親父子兄弟夫婦也苟尊卑長幼各由其道而無有不和則子孝者乃其常分不知其爲孝也瞽叟不父嚚傲參會然後知有大舜之孝子國謂君之國家謂臣之家君臣上下各由其道而無有昏亂則臣忠者亦其常分不知其爲忠也啇受不君奸回群聚而後知有三仁之忠臣李氏曰接上章親譽畏侮之義與其國亂顯忠臣不若無爲民自化吕氏曰夏桀立而龍逄彰啇紂亡而比干顯第十九章絶聖棄智民利百倍絶仁棄義民復孝慈絶巧棄利盜賊無有吴氏曰絶謂絶之而不爲棄謂棄之而不用聖智即智慧也巧利即大偽也吕氏曰形度法象功用陳迹皆爲聖也權變謀慮揣摩縱横皆爲智也苟有心於爲智豈知至智者乎至人恐天下之人惑於聖智失眞愈甚貴乎務本絶其聖棄其智使民如童蒙專事農桑其利於民也豈止百倍故曰絶聖棄智民利百倍夫孝慈者夭之性仁義者人之情也夭性出於自然不可易也仁者愛物則民親之義者宜物則民譽之親譽之心生而性命之和失矣至人絶之於未有棄之於未然使人返於本復於初則孝慈之道全矣故曰絶仁棄義民復孝慈夫雕琢刻削機械扃鐍事之巧也珠玉斛斗權衡符契物之利也競事之巧則不顧其耻趍物之利則不顧其義起盜賊一端也苟能返其性宅歸於樸鄙則盜賊何自而起乎故曰絶巧棄利盜賊無有林氏曰聖智之名出而後夭下之害生不若絶之棄之而天下自利仁義之名出而後有孝不孝慈不慈分别之論不若絶而去之與道相忘則人皆歸於孝慈之中而無所分别也巧利作而後盜賊起不若絶而棄之即所謂不貴難得之貨使民不爲盜李氏曰發上章之藴聖智仁義巧利一切棄絶不復見用則民從其化而返樸也林氏曰或謂老氏絶仁棄義得非與孔子背馳蓋推尊道源之所從出以仁義禮樂非不可以爲治不如以道化民而相忘於吾道之中爲上也此三者以爲文不足故令有所屬見素抱樸少私寡欲吕氏曰絶聖棄智一也絶仁棄義二也絶巧棄利三也皆入道之序未睹其實也道不可言言之皆其似者也達者聞似而失眞未免紀之以文垂之以教猶恐人之疑似焉是明而不著知而不用去文而尚質别有所循使其涣然冰釋故曰此三者以爲文不足何謂令有所屬純粹而不雜見素也靜一而不變抱樸也守己至公不好外美少私也節儉制情恬然安密寡欲也如是而治國則躋民於仁壽之鄉羲皇之世不難及矣如是而治身則其神虚白物不能染豈非見素其神不虧存於混沌豈非抱樸食息起居無非公正豈非少私棲神希夷諸縁迥絶豈非寡欲以彼易此有何不可何氏曰非聖智巧利之不可用於天下也謂此三者之名皆其文而非其實也使天下安其性命之情則三者可無以名爲也夭下不安其性命之情而人徒尊三者之名而惜之惑之甚也文則有所不足者若屬之道德之鄉始爲實也故曰夫巧智神聖之人吾自以爲脱焉故曰𩐎萬物而不以爲義澤及萬世而不爲仁覆載天地雕刻衆形而不爲巧故曰愛利出乎仁義捐仁義者寡利仁義者衆夫仁義之行唯且無誠且假夫禽貪者器是以一人之斷制利天下也此言利之假之無以誠之則皆文之以義而已於仁義何有去道遠矣但世俗未達其㫖笑絶聖棄智爲荒唐鄙絶仁棄義爲徑庭曷不思玄聖之意欲使天下修混成之道捨文返質以遊其天故曰守其一不雜其二治其内不飾其外明白入素無爲返樸體性抱神夫如是何以文爲由少私寡欲而入於無私無欲淳厚既返澆競自祛則昭灼之聖無所用機鐍之志無所行兼愛之仁無所措裁制之義無所施利器伎巧無所用天下混然歸乎大順此則聖人立言之大㫖也世俗未足以識此奈何輕議吴氏曰大道之民外之相示以素内之自守以樸素者未染色之絲也樸者未斲器之木也質而已矣何以文爲第二十章絶學無憂唯之與阿相去幾何善之與惡相去何若人之所畏不可不畏荒兮其未央哉李氏曰絶學者絶常人之學而學人之不學絶世之學也俗人惟務學於事益其所聞惟恐進道不精故常憂聖人棄絶所有惟務於味道故無憂也相去幾何言相去不遠也相去何若言太遠也人之所畏不可不畏言善惡可畏也何氏曰此絶學即大道也自然無爲乃至離色離名此絶學也宜其憂思頓忘也既曰無憂夫又何畏雖無思無慮然必敬必戒蓋以唯阿一聲也幾何其遠而唯敬阿慢善惡一念也幾何其闊而善美惡醜莊子美成在乆惡成不及改可不慎歟此又於無憂之中有可畏者聖人雖忘世而不敢玩世由絶學無憂而言則無色之色爲之見無聲之聲爲之聞無味之味爲之甘不言之教爲之教目中無全牛又何憂焉由唯阿善惡而言則目不敢妄視耳不敢妄聽口不敢妄言形不敢妄動視蝨有大如車輪奈何不畏莊子曰眇乎小哉所以屬於人此人畏亦畏之說也曰謷乎大哉獨成其天此絶學無憂之說也蓋道至無爲而極弘道則自善而始無巨無細無起無止欲求其渠央荒乎其不可尋也吾復何所用其心董氏曰荒大而莫知其畔岸衆人熙熙如享太牢如登春臺我獨泊兮其未兆如嬰兒之未孩吴氏曰熙熙和樂貌泊靜也兆如龜兆之微坼衆人之爲學者循外爲悦如享太牢而食可悦口者甚美如登春臺而觀可悦目者甚備我則泊然而靜情慾未開無端倪可見如嬰兒未能孩笑之時一不知外物之爲樂也林氏曰衆人之樂於世味也如享太牢如登春臺而我獨甘守淡泊百念不形如婴兒未孩之時兆形也萌也此心不萌不動故曰未兆嬰方生孩稍長也嬰兒之心全無知識何氏曰衆人方如享太牢之適口體也如登春臺而恣遊觀也熙熙然其足樂也吾則兆眹未形如嬰兒初生未至於孩迎之不見其首也乘乘兮若無所歸吴氏曰乘乘謂寄寓於物若無所歸謂不住著於物何氏曰乘乘兮無所歸乘物遊心如乘風履虚無所凑泊隨之不見其後也又曰乘乘如乘風乘雲皆乘風駕浮之象吕氏曰隨世混迹與物同波心融形釋與神爲一若虚舟汎汎而東西木葉飄飄而高下不知風之乘我我之乘風莫知所往故曰乘乘兮若無所歸衆人皆有餘而我獨若遺林氏曰衆人皆有求盈餘之心而我獨若遺棄之此意謂我之爲道而無有餘之心也吕氏曰世人循其所知汨於富貴自謂樂有餘矣至人則不然粃糠名利針芥軒冕知身世皆妄心如虚空無乎不忘故曰衆人皆有餘而我獨若遺吴氏曰遺失也衆人喜其所得之多我則一無所得而慊然若有失也董氏曰遺忘也蓋有若無也我愚人之心也哉沌沌兮吕氏曰窮天下之辯者不在辯而在訥極天下之智者不在智而在愚終日如愚者以其不虧其神也吴氏曰沌如渾沌之沌冥昩無所分别也與莊子愚芚之芚同謂無知也林氏曰沌沌混沌無知之貌俗人昭昭我獨昏昏俗人察察我獨悶悶吕氏曰世人用神於外光而且耀惟求多聞增益其見學以衒人若揭日月而行至人則智週萬慮靈光内燭被褐懷玉外無文彩故曰衆人昭昭我獨昏昏世人嚴明苛刻矜誇有爲執持其偏急從事於細微見察淵魚智窮毫末而不知止也至人則體天法道逍遥任物寞然寬大無乎不容昏默難知晦冥罔測故曰衆人察察我獨悶悶林氏曰昏昏悶悶即混沌是也俗人昭昭察察而我獨昏昏悶悶此其所以異於人也吴氏曰昭昭已明察察尤明昏昏已不明悶悶尤不明也俗人皆以有知爲智我獨無知而愚也漂兮其若海颼兮似無所止林氏曰如乘舟大海之中風颼颼然而無所止宿此若乘乘兮無所歸之意吴氏曰如漂浮於海中任其所適而不知所定向如颼颼之長風隨其所起而不知其所止息衆人皆有以我獨頑似鄙吴氏曰衆人皆有以者有以知其所止所定也頑謂面頑如麻痹不知癢痛者鄙謂鄙人我獨頑然無知有似遠鄙之愚人也几人居國邑繁庶之地者多知居於遠鄙僻陋之地者無知也林氏曰有以有爲也衆人皆有爲而我甘於不求故若頑若鄙董氏曰以用也頑然無知也鄙野也人皆知有用之用而不知無用之用我獨異於人而貴求食於母吴氏曰此一句總結上文自人之所畏至我獨若壝言人爲學者務多能而我獨一無所能自愚人之心至我獨頑似鄙言人之爲學者務多知而我獨一無所知此我之所以獨異於人而我之所貴者則大道玄德也大道者萬物之母也故曰食母食母即乳母也司馬氏曰乳哺元和林氏曰我之所以異於人者味於道而已有名萬物之母母即道也食味也貴求食於母言以求味於道爲貴也李氏曰聖人棄絶所有惟務於道而求食於母守雌抱一而已故曰無憂吕氏曰道者萬物之宗如魚之有水魚失其水則死人失其道當何如哉要當知其神爲炁之子炁爲神之母非母乳之無以自活非炁飼之無以自生故曰虚而乳之綿綿上下則形可以不化神可以不虧故曰而貴食母或曰有以而貴求食於母而解者有以兒貴食於母而解者其辭不同何也曰其辭雖不同而其理則皆歸於味道也第二十一章孔德之容惟道是從吕氏曰常道無名惟德以顯至德無本順道而成道無形也及其運而爲德則有容矣未嘗須臾離道故曰惟道是從吴氏曰孔德猶言盛德容謂有而可見者從由也萬有皆本乎德凡形氣之可見者德之容也然德之所以有此容者由道中出林氏曰孔盛也知道之士惟道是從而有見外者自有盛德之容德之爲言得也得之於己曰德道不可見而德可見故以德爲道之容也道之爲物惟恍惟惚吕氏曰夫道杳然難言何物之可擬也言物者强名以究妙理也道既無形當何所從乎今也即物求道不可得捨物求道道亦無涯扣其恍惚之端則恍似有也無中之有惚似無也有中之無居無非無即空是色居有非有即色是空恍惚之理可想像矣故曰道之爲物惟恍惟惚吴氏曰似有似無不可得見故曰恍惚惚兮恍其中有象恍兮惚其中有物沓兮冥其中有精其精甚眞其中有信吕氏曰恍中之象方其有象也其來無所從故視之不可見聽之不可聞視聽既不可得所謂杳冥之物又安得涯涘也謂之無則能妙萬物謂之有則莫見其形太虚之象似有而無造化生焉萬物兆焉太虚之物似無而有風雷生焉霜露降焉有象則物之名立矣有物則因至精而生焉杳而深窈寞而寂默無中妙有包乎萬化之根藏乎太虚之精畜乎自然之信是以萬類生焉三才備焉廣成子言至道之精杳杳冥冥至道之極昏昏默默原其身也心爲恍惚之宫腎爲杳冥之府心藏神腎藏精一身之精神寓於恍惚之中矣故曰惚兮恍其中有象恍兮惚其中有物杳兮冥其中有精若精者經緯萬方妙乎一身在丹謂之大藥在易謂之中孚萬變不能遷自然不可移妙中之妙眞中之眞感之立應故能春生秋殺未嘗差忒注之於身飛騰祖炁斡旋泝流回黄轉赤其道應時故曰其精甚眞其中有信何氏曰昔有通玄者論此章曰物非常物精非常精也天得以清地得以寧人得以靈夫能抱玄守一求精於杳冥求物於恍惚形神洞達與道合眞矣夫曰象曰物曰精皆在恍惚杳冥無中有也而曰其精甚眞且言有信則無無而有有也吴氏曰先儒謂沖寞無眹而萬有森然已具者此也自今及古其名不去以閲衆甫吾何以知衆甫之然哉以此吕氏曰爰自上古下及來今湛然常存隨時顯用未始有名强名眞精亘千古而不動儼一性之長存坐觀天地之衆美死生之終始故曰自古及今其名不去以閲衆甫然衆甫之變日逝不停何以知萬物資禀乎亦由其道之所至也蓋道者杳冥恍惚常在不去故能應變爲治也如此何氏曰是道也先天地生而不爲乆長於上古而不爲老雖常無名而名不去即首章常名之名是謂常道之道坐閲衆甫之自出甫美也衆甫全美也以備道也故曰淡然無極而衆美從之此天地之道聖人之德也何以知衆甫之然哉以此以此道也閲衆甫如閲天下義理之閲皆更歷意林氏曰道之名在於古今一日不可去而萬善皆由此出衆甫衆美也閲歷閲也萬善往來皆出此道也以此者道也吴氏曰不去謂長存也閲猶歷也甫美也衆甫萬有也萬有之美皆有時變滅惟孔德由道中出者自古及今不滅變而常存然如此也吾何能知萬物之變滅無常如此哉以此孔德有常之道而知道德眞經集義卷之三
