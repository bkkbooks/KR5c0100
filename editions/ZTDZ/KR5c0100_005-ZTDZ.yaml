body:
  text: 盱江危大有集第三十章以道佐人主者不以兵强天下其事好還吕氏曰有道之士輔佐其君莫不務以德爲本三軍五兵德之末也君使臣以禮臣事君以忠無爲而民自化庶俗熙熙知帝力之何有以從事於甲兵豈道也哉兵者凶象戰者危事非君子之器不得已而用之有勝則有敗有利則有害豈可以强侵弱暴凌善獸窮則摶物極則反此必然也倪氏曰不曰人主而曰以道佐人主者蓋言人主雖有用兵之意苟大臣不從更之未必用也林氏曰佐人主而以强兵爲心則非知道矣兵凶器也我以害人則人將以害我故曰其事好還王氏曰以道佐人主尚不以兵强天下况人主躬於道者乎師之所處荆棘生焉大軍之後必有凶年吕氏曰師旅所過之地古今爭戰之場鮮有所濟田荒室露荆棘森然可不畏乎大軍一過上違天時下奪民力和氣不應於上殺氣横流於下民之與物悉被戕賊六氣不均雨暘失時疵癘灾害兵興荒歉必至凶年理之常也蘇氏曰兵興所在民事廢田不修用兵之後殺氣騰年穀傷政和注下奪民力故荆棘生上違天時故有凶年林氏曰用師之地農不得耕荆棘生焉用兵之後傷天地之和氣則必有凶年之菑故善者果而已不敢以取强果而勿矜果而勿伐果而勿驕果而不得已果而勿强吕氏曰强兵戰勝禁暴禦亂之術亦不可廢猶水火焉善用之則爲福不善用之則爲禍善用兵者果决而已不敢以取强也德所不能化政所不能及不得已而後起迫而後動動罔不利非恃强而有取也此善勝之道也明矣果而不矜其能自矜則不長果而勿伐其善自伐則無功果而勿驕其勢自驕則不足侵伐之事救而可也非用果以爲强也何氏曰善不在用兵而善用其所謂果者蓋見善明用心剛之謂果凡果者决於爲善而不果决以爲兵也傳所謂心競力爭之辨故曰果而不敢以取强又曰果而勿强也夫勿矜能勿伐功勿驕氣不得已而後應者皆善心之所發則果斷以行之是不以心競也惟至强兵一事則果斷以去之是不以力爭也董氏曰兵固有道者不取然天生五材亦不可去譬水火焉在乎善用惟以止暴濟難則果决於理而已凡理義之在我則所守者不屈矣春秋傳曰殺敵爲果言殺敵者令不相侵而已何敢取强於天下哉果以理勝强以力勝惟果則隱然有必克之勢初非恃力好戰故臨事而懼好謀而成不得已而後應之勿强而已物壯則老是謂不道不道早已林氏曰强者不能終强矜者不能終矜譬猶萬物之既壯則老必至矣不知此理而欲以取强於天下皆不道者也既知此爲不道則當急去之故曰早已已者已而勿爲也蘇氏曰壯之必老物無不然惟有道者成而若缺盈而若沖未嘗壯未嘗老未嘗死以兵强天下壯亦甚矣而能無老乎何氏曰聖人何以自視退怯不忍求勝於天下哉則有見夫日中則昃月盈則虧物壯則老將至豈道之常哉如知其非常道則早復於道早去其非道亡國之事故不一而佳兵者必亡以道相人國家可不以佳兵爲戒而善用其果哉董氏曰物壯極則老兵强極則敗故兵之恃强則不可全其善勝物之用壯適所以速其衰老皆非合道宜早知止第三十一章夫佳兵者不祥之器物或惡之故有道者不處也林氏曰佳兵喜用兵也以用兵爲佳此不祥之人也以不祥之人行不祥之事故曰不祥之器此天下之所惡故有道者不爲也李氏曰不以兵强天下故次之以兵者不祥之器聖人於此深戒萬世之下有國之君以無爲清淨治化自然家國安寧雖有甲兵無所陳之永無爭奪之患也吕氏曰兵非太平致治之具伐暴可也既不得已而用之豈免多陰謀乎夫好戈甲以爲服玩者是尚不善之用也所謂佳其凶器以幸夭下非特人惡物亦憚之續資治通鑑宋太宗謂近臣曰朕讀老子至佳兵者不祥之器聖人不得已而用之未嘗不三復以爲規戒君子居則貴左用兵則貴右兵者不祥之器非君子之器不得已而用之恬澹爲上勝而不美而美之者是樂殺人夫樂殺人者不可得志於天下林氏曰君子居每以左爲貴而兵則尚右便是古人亦以兵爲不祥之事非君子之所樂用必不得已而後爲之不幸而用兵必以恬淡爲上恬淡無味也即是不得已之意也雖勝亦不爲喜不美者言用兵不是好事也若以用兵爲喜則是以殺人爲樂豈能得志於天下孟子曰不嗜殺人者能一之亦是此意吕氏曰夭地之道左陽而右陰陽主德主生主柔弱平居則貴之陰主刑主殺主剛强用兵則尚之吴氏曰恬者不歡愉淡者不濃厚爲上不喜好用兵乃爲上也勝而不美謂兵雖得勝亦不肯以爲美事若以戰勝爲美事則是以殺人爲樂也不可得志於天下要終而言之以示戒也吉事尚左凶事尚右偏將軍處左上將軍處右言以喪禮處之殺人衆多以悲哀泣之戰勝以喪禮處之林氏曰偏將軍之職位本在上將軍之下今上將軍居右而偏將軍居左是古人以兵爲凶事故以喪禮處之左陽右陰也喪禮則尚陰幸而戰勝亦當以居喪之禮泣死者而悲哀之可也此章之意蓋言人之處世有心求勝者皆爲凶而不爲吉也何氏曰戰勝如不勝以喪禮處之慈之至也秦師敗於崤而歸秦伯素服郊次向師而哭此戰敗則宜之未有戰勝反爲之哀者自非深體天地好生而兼愛民物者疇能動心及此慈故能勇哀故能勝有道存焉若乃以兵爲佳以殺爲樂以勝爲美是不知道是不知天第三十二章道常無名樸雖小天下不敢臣侯王若能守萬物將自賔吕氏曰夫道之難言包羅萬有貫穿毫芒豈得而名喻之以朴且樸者眞精純素一而不雜洋洋乎大哉無乎不在小者非小大之謂以其無方無體無爲無形微妙之極也摶摸擬議莫得髣髴故名之以小夫世之材器既有名則爲無名所役矣惟道之樸也萬物之所係天地不能犯聖智不能干而天下豈能臣之乎爲侯爲王能守其樸則天下罔不治矣喻之於己侯王者本來赤子無相天君謂之元神守而勿失與神爲一一之泰定萬氣朝之故曰道常無名樸雖小天下不敢臣侯王若能守萬物將自賔何氏曰道常二字句絶如天常眞常等字即常道也大道無形無名强名曰道無名乃道之常也樸也凡可名可道者非眞常也器也故曰天地與人物本皆道之原俱出於太素虚無之始端樸太素也無名之始也未判爲萬有之衆體惟包於大混之一樸微乎芒乎難知難見故曰小也聖人决本常根見素抱樸㫖約而易操事少而功多中心無爲以守至正道虚而實無而有以之居重御輕可以君天下而天下何敢臣之以之處靜制動可以爲萬物主而萬物將自賔之李氏曰道常無名者虚無自然也樸雖小至微也天下不敢臣至尊也萬物將自賔無不服也林氏曰道常無名即可名非常名無名之樸道也雖若至小而天下莫不尊之孰敢卑之故曰不敢臣爲王侯者若能守此道則萬物自賔服之矣天地相合以降甘露人莫之令而自均吕氏曰天地交而萬物生人道交而功勛成况聖人作而萬物睹和氣默應上際于天下蟠於地甘露降嘉禾生品彙根荄咸被其澤道參天地德合神明民不待命令而自然胥悦此皆皇國符瑞之兆非使然而然扣之己焉坎離交而二炁合上及太清下及太寧化爲甘露潤澤一切初莫知令升降均平出入玄牝會于黄庭洞達斯㫖立反嬰兒何氏曰聖人與天地合德則時雨降醴泉出甘露可致也與億兆同心則教化美風俗移天下不待令而自均也甘露者王者之瑞應也靈液如脂美味如飴松竹可受之以聖人之樸靜漠恬澹故自然之應如此李氏曰天地相合者惟德是輔也以降甘露者和氣所致也自均者自然和平也始制有名名亦既有夫亦將知止知止所以不殆吕氏曰時逐歲行物因事顯散樸爲器因器制名名分既立尊卑是陳不可越于上下若不知止徇名忘樸棄本逐末則失其根本矣其知止者既明且哲自足於内無求於外豈有危殆乎林氏曰道之始本無名萬物既作而後有道之名制作也是樸散而爲器也此名既有則一生二二生三何所窮已知道之士當於此而知止知止則不危殆矣何氏曰自無名而有名自有始而爲母每於樸散爲器之中自有大制不割之妙沿流溯源傍本探末復始相中泯於無形不使失道遠而忘返則於止知止何殆何辱故曰有名則復於道功名長乆終身無咎此也故曰不可得而名道之初可得而名道之餘知初者合元始之道也知餘者契陰陽之樞混之而爲一可與天地符吴氏曰始者道也制制作也猶言爲也有名者德也道無名自道而爲德則有名也道之無名而爲德則名亦既有矣故人之用此德者當知止於德不可再降而下也此章之意若曰自無而適有當知至於德而止不可再適也德之有名以下於道復下於德可乎知止於德則猶未遠於道也譬道之在天下猶川谷之於江海吕氏曰道者萬物之所宗川谷者水之所分江海者水之所鍾而道之在夭下上則鬰乎清都紫微下則溷乎瓦甓稊稗順之則昌逆之則亡譬于海焉善之則浸潤萬物逆之則滂湃爲沴殊不知道愈下而愈高海愈傾而愈有聖人德兼夭地澤被邇遐則民罔不歸之吴氏曰上文言自無而有此又言自有而無當復於道也蓋道之在夭下猶江海德者猶溪谷之會歸于江海何氏曰道之在天下如江海之納百谷江海非欲於水而水自歸之人能返樸無爲非欲於道道自歸之自然而非强然也聖人冥心無爲之始而脱累有名之後其道歷萬世而不變則謂之眞常者宜哉林氏曰川谷之水必歸之江海而後止天下萬物必歸之道而後止故曰道之在夭下猶川谷之於江海第三十三章知人者智自知者明勝人者有力自勝者强吕氏曰知人則求備於物制命於外未若自知無所知自明無所明可謂眞自知眞自明務於外者以力勝人務於内者以道自勝若夫建國立號攬權作威以號令天下臣服諸侯此非以力而勝於人乎自勝者尊道德行仁義克己復禮謙而自下而人歸之故夭下莫能勝非强而何何氏曰人之常情明於知人暗於知己强於勝人怯於勝己故知人不過是非利害之間而一念知非靈光常現自明之大也勝人不過剛柔勇怯之際而一念勝邪天下大勇自强之大也比之務外不務内者遠矣吴氏曰智能知人循外之智爾能自知則内能盡性也故謂之明有力能勝人恃外之力爾能自勝則内能克己故謂之强知足者富强行有志不失其所者乆死而不亡者壽吕氏曰成人之業繼人之後施之萬民不失其所不忘其本著於乆遠使後世不能企及其於身也守眞抱一不爲物遷未嘗須臾離也然後入乎眞常之域亘古不變與道同體故曰不失其所者乆聖人之道傳諸萬世布在方策後世尊之師之其人雖亡其政若存有道之士以生爲寄以死爲歸其生也識趣圓明與道合眞其死也脱胎神化如蟬蜕焉身雖死而眞身不亡壽與二儀齊其綿邈故曰死而不亡者壽何氏曰自知而明可矣必也爲知足之知則富不在夭下其足爲道足爲神足也是謂知之至自强而勝可矣必也爲强行之强則志可挫萬物其行者爲勤行爲獨行也是謂强之至此二句知足强行粘上句一知字一强字義可見矣乆在不失其所夫所者歸宿之地易曰艮其止止其所謂止之能止者由止得其所也萬物庶事各有其所得其所則安故乆失其所則悖焉能乆壽在死不在亡死者一終之義列子無所由而常生者道也由生而生故雖終而不亡常也莊子千歲厭世去而上仙乘彼白雲至于帝鄉是也如傳云立德功言三不朽亦其不亡者李氏曰知足者貧亦樂强行者終始不怠固守者無危殆内明者出生死死而不亡者眞一長存也吴氏曰老子之道以昩爲明以弱爲强而此章言明言强何也曰老子内非不明外若昩爾内非不强外示弱爾其昩其弱治外之藥其明其强治内之方並行而不相悖也董氏曰所猶艮卦止其所之所惟知道而能行則自得其所而居安矣故雖物變無窮而心未嘗失乃無入而不自得所以乆也惟能自知自强而不失其所乃壽之實也此即不隨生死所變者卓然而獨存是烏可以數量論哉第三十四章大道汎兮其可左右吕氏曰至高無上至深無下莫測其涯涘莫尋其根源其唯道乎包藏宇宙而無表裏充塞太虚動靜不失往來無窮汎然無所繫礙遊於萬物左之右之而無不可其用大矣至於一身大道元氣彌漫百骸在節滿節在關滿關汎然無乎不在柴氏曰道者萬物之奥無往不在經中句法多是兮字聯其字如荒兮其未央哉怕兮其未兆之句又十五章皆是兮字聯其字蓋老子文法如此林氏曰汎兮其可左右無所繫著也何氏曰大哉聖人之道發育萬物峻極于天此言汎者淵淵乎其若海巍巍乎其終復始也左之左之宜於左右之右之宜於右經曰執大象天下往言無往而不可也萬物恃之以生而不辭功成不名有吕氏曰生化之力本於自然而已而道何嘗施其巧矜其能乎天地至大猶恃賴焉其於萬物往者資之求者與之六合雖大未離其内秋毫雖小待之成形豈辭勞哉卓然獨立生之而不違成之而不有弗居其功是法道之體也何氏曰物物倚之孕育在在隨之呈露而聖人處之裕如也林氏曰物物皆道之所生何嘗辭之既生矣何嘗居之以爲功衣被萬物而不爲主常無欲可名於小萬物歸焉而不爲主可名於大吕氏曰夫道復於至幽顯於至變生之畜之若無端紀覆之育之各遂其性若赤子之晝賴其乳食宵藉其襁褓廣其愛育之德爲而不恃長而不宰任其自然而常無所欲内觀其妙而無物不入群動莫窺其歸往之迹可名於小矣故曰萬物歸而不爲主常無欲可名於小道隱無名無名也者廣乎其無不容淵乎其不可測未始有物惟其無物則萬物歸之而無不同同之而不爲主可以大名之矣何氏曰衣被者覆露之義莊子聖人遭之而不違過之而不守調而應之德也偶而應之道也則不辭不有不主之意可見矣常無欲者靜也聖人一於無爲無欲者則心本無心斂之不盈一握樸雖似小而萬物歸焉不爲主則物各付物散之則彌六合何其大也固曰天地固有恒矣日月固有明矣禽獸固有群矣林木固有立矣放德而行循道而趍已至矣由是而觀神人無功聖人無名何心於主宰哉故曰功蓋天下而似不自己化貸萬物而民弗恃有莫舉名使物自喜立乎不測而游於無有此也李氏曰衣被萬物而不爲主忘其所自也萬物歸之而不爲主任運自然也是以聖人終不爲大故能成其大林氏曰惟其能小所以能大聖人之所以不爲大者故能成其功也此即守其雌爲天下谿之意何氏曰聖人終不爲大而大以之成始雖不明有而終不可掩其名之大其以是道歟吴氏曰此章首言天地之道結句乃言聖人蓋聖人與天地一也歲功成而萬物歸焉道之至大也而天地不居其功而萬物不知所主是天地之道雖大而不自以爲大聖人亦若此矣是以能成其大也吕氏曰域中有四大而帝王居其一焉聖人執謙以爲柄處損以自居下於人而人高之卑於人而人尊之忘其穹窿之勢去其矜伐之容則可以成其道之大全矣第三十五章執大象天下往往而不害安平泰何氏曰大道無象故無象之象其爲象也大矣夫道也大包天地細入毫芒不可得而名狀故曰大象言執云者謂持此以往人能體無名無形之道循自然常然之化則理身理國貫古貫今何往而不通雖天下吾往矣不惟往而不害且安其性命之情平中之福泰然無復事極其所往天人和同之際也莊子苟得其道無自而不可林氏曰大象者無象之象也天下往者執道而往行之天下也以道而行則天下孰得而害之天下無所害則安矣平矣泰矣政和注安則無危平則無陂泰則通治樂與餌過客止道之出口淡乎其無味視之不足見聽之不足聞用之不可既何氏曰五音六律足於耳八珍九鼎足於口此舉其聲味之切於人者言之僅可爲過客口耳一時之娱而非所以怡神養壽之源也席罷客散於我何有凡物欲之足以攖人心者皆此類也大道則不然靜以修身聲色有所不樂儉以養生滋味有所不嗜遊心於淡合炁於漠養其無象象固長存守其無體體固全眞味無味而甘視無視而明聞無聞而聰用無用而大用之不可既夫既者盡也非用之無盡乃道之本不可盡也李氏曰樂與餌聲味俱美喪其無象安能乆乎道之出口無味無象無聲無色以其無體故應用無盡林氏曰樂鐘鼔之樂也餌飲食也張樂設饌以待嘉客樂終食盡客過則止矣過者去也道之可味雖若至淡視之雖不可見聽之雖不可聞言其不足悦耳目也而用之於今古而不盡此即物有盡而道無窮之意道之出口言道形於言也猶曰道之爲言也第三十六章將欲歙之必固張之將欲弱之必固强之將欲廢之必固興之將欲奪之必固與之是謂微明李氏曰執大象則能見事之機微纔見固張便知將歙未萌先兆未舉先知非天下之微明其孰能及此林氏曰此八句皆是譬喻只是得便宜處失便宜之意歙斂也弛也張者必弛强者必弱興者必廢得必有失與得也奪失也人惟不知自以爲喜而不知此理雖晦而實明故曰微明微猶晦也言雖微而甚易見也何氏曰天不可信理無常是誰能一之日之將瞑也大明天之奪鑑者益疾氣有歙張勢有强弱數有廢興物有與奪是事之不可常者此理之自然非有欲不欲也經曰飄風不終朝驟雨不終日天地尚不能乆而况人乎是故以氣言陽極陰生非欲歙而先張乎以勢言物壯則老非欲弱而先强乎以數言盛者必衰非欲廢而先興乎以物言所貴能賤非欲奪而先與乎將欲如此必先如彼借人事以明天理不過盈虚消息之自然耳天何容心哉聖人何容心哉後世不知此道遂認爲權謀操縱之用此乃有機事必有機心去聖遠矣此章大義豈可以有心有爲觀之哉莊子目將眇者先觀秋毫耳將聵者先聞蚋飛體將僵者先亟奔佚心將迷者先識是非故物不至者則不及注者以爲窮上及下自然之數聖人居中履和終身全具是道也微乎深哉難乎其明哉劉氏曰張則必歙强則必弱興則必廢與則必奪物理之自然也是謂微明微明謂精微明著昭然可考或以權術解其義天之道利而不害若是乎董氏曰消息盈虚相因之理其機雖甚微隱而理明著惟清靜柔弱自處者不入其機柔之勝剛弱之勝强魚不可脱於淵國之利器不可以示人李氏曰學道之士存其無象守其至柔與物無競則自然知幾苟用剛暴尚權謀智術求之勝物非道也哉比如魚乃水中物求異群魚欲脱於淵可乎既不可則人亦不可尚權尚權者反常也如魚離淵必死國之利器不可以示人即孔子所謂可與立不可與權同一義聖人用權反常合道尚不可輕爲而况常人乎可不戒哉何氏曰天下莫柔弱於道道之所以柔弱者包裹天地貫穿萬物此言柔弱之勝剛强也故曰人在道中道在人中魚在水中水在魚中道去人死水乾魚終此言魚以潜淵人以道養輕脱則必敗矣利器者開闔變通之權如庖丁解牛神行肯綮善刀而藏十九年刃若新發於硎夫豈可以示人老氏曰權者聖人所以獨見莊子曾舉此章魚不脱於淵二句而繼之曰聖人者天下之利器也非所以明天下也神而用之所以救世變於無窮其不以示人夫豈愚其民慮患之意深矣吕氏曰魚在水藏於深淵以自存則孰能苦之倘失於淵則人得而取之盪而失水則蟻得而困之利器權也民或得而窺之是猶持太阿而授以柄輕用其國國必危矣内取諸身則魚在水中水在魚中人在氣中氣在人中魚去水則死人失氣則亡魚能韜鱗掩藻吐納其水則本不死人能退栖福地吐納其氣則本不亡國之利器道之天機也若以輕泄於人則天譴立至大洞天憲經曰非人傳之謂之泄天寳至哉天機豈妄宣泄南華經云夫有干越之劍匣而藏之不敢用也保之至也意蓋以此河上公曰利器權道也治國權者不可以示執事之臣也治身道者不可以示非其人林氏曰淵喻道魚喻人也人之不能外於道猶魚之不可脱於淵也第三十七章道常無爲而無不爲侯王若能守萬物將自化何氏曰莊子萬物雖殊理道不私故無名無名故無爲無爲而無不爲前章無名之上冠以道常二字此章亦然經曰常無欲以觀其妙常有欲以觀其徼惟常無故無爲常有固無不爲其道一也此無爲而無不爲所以爲道之大常也道常句絶是總標也無爲無不爲乃並言之荘子虚則實實則倫靜則動動則得此所謂無爲者虚靜自然之常道也聖人曷常沉空滯寂而一無所爲哉尸居而龍見淵默而雷聲神動而天隨從容無爲而萬物炊累焉其何故也無爲而無不爲天地也聖人以天地爲本故得性者此眞常也應物者亦此眞常也動靜無端體用一源蓋無爲者道之常也而無不爲者亦道之常也道無在而無不在侯王能守此道則道行於萬物不期化而自化也林氏曰此章與道常無名章句皆同無爲而無不爲自然而然也侯王若能守此無爲之道則不求化萬物而萬物自化矣吕氏曰身之所擬應接無心凝神太定斯無爲也侯王者泥丸帝一守而勿失津化爲液液化爲髓髓化爲精精化爲元珠元珠化爲金丹此非萬化之化而何化而欲作吾將鎮之以無名之樸無名之樸亦將不欲不欲以靜天下將自正何氏曰化雖上作下應而欲作將作之機聖人尤謹之神而化之使民宜之不先時而躁不後時而縮其機如此聖人亦不認爲己功吾將由無爲之化還無名之樸鎮之云者雕琢復樸塊然獨以其形立之意雖感而遂通之中有寂然不動者在夫所謂無名之樸道之始也不可得而名也聖人亦將不欲而况樸散之器非常之名乎言道尚無心而况非道乎如是則聖人之心靜矣一心定而萬物服天下其不正乎吴氏曰欲謂有心爲之作猶起也言未能純乎無爲之道者方將待物之化而遽有心於欲其化欲之之心一起則非無爲之道矣鎮謂壓定使之不起也無名之樸謂無爲之道也欲作之時必將以此無名之樸鎮其有心之欲謂以道而自治也既以此無名之樸鎮其欲則其欲亦將不欲矣靜者作之反其始也欲作既以道鎮之則欲者不欲而作者靜矣故雖無心正天下而天下將自正吕氏曰其於己也一念纔動則謂之情情動則萬化作矣念既已漏急須反照滅其動心還其純素鎮之以樸庶可一其性故曰化而欲作吾將鎮之以無名之樸且夫道本無形假樸以爲言聖人又恐滯迹之流執其樸而爲用憂其弊之不救以謂使天下之群實心莫若虚應天下之群動心莫若靜惟窒慾以空其性絶學以虚其心以之修身無自而不得以之治性無往而不可如此則天下泰然將正而定矣李氏曰天地無爲萬物發生聖人無爲萬民安泰以修煉言之都無作爲於安靜之時存其無象毫髮之動便要先覺既覺便以無名樸鎮之樸本無形又曰無名謂空也道德眞經集義卷之五
