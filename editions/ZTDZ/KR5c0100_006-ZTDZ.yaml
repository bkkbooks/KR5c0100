body:
  text: 盱江危大有集第三十八章上德不德是以有德下德不失德是以無德上德無爲而無以爲下德爲之而有以爲上仁爲之而無以爲上義爲之而有以爲上禮爲之而莫之應則攘臂而扔之何氏曰莊子古之人在混茫之中與一世而澹漠焉人雖有智無所用之此之謂至一莫知爲而常自然逮德下衰及唐虞始爲天下興治之流𣻏淳散樸離道以善險德以行然後去性而從心心興心識知而不足以定天下然後附之以文益之以博文滅質博溺心然後民始惑亂無以反其性情而復其初此章大㫖盡在是矣夫上德不德則混茫澹漠也不失德而無德則爲者敗執者失矣上德無爲而無以爲則至一自然也下德爲之而有以爲則所謂始爲天下矣上仁爲之而無以爲至仁無親去德猶未遠上義爲之而有以爲以義制事則下仁已一等以仁義視道德則所謂離道以善險德以行也曰不德曰無以爲皆無心無所爲而爲之謂天曰不失德曰有以爲皆有心有所爲而爲之謂人上禮爲之而莫之應又下義一等附之以文禮也於忠信爲薄益之以博智也於道爲華其去性初轉遠矣上禮者盛禮也施厚報宜厚報不敵施爭由是起攘臂引去貌敗禮之人也扔引也字從亻者非林氏曰爲之而莫之應者强民而民不從之也抉引也民不從而强以手引强掣拽之也只是形容强民之意故曰攘臂而抉之李氏曰上章云常無爲故次之以上德不德上德無爲故合道下德有爲不合道仁義猶近德可爲進道之階禮者純是作爲以禮齊物轉不齊蓋有爲終有失也執之不失亦可漸入佳境自仁而反德自德而反道直造無爲也淮海秦氏曰道德者仁義禮之大全而仁義禮者道德之一偏以道爲本以仁義爲用故失道而後德失德而後仁失仁而後義失義而後禮夫禮者忠信之薄而亂之首也前識者道之華而愚之始也何氏曰首亂始愚極言禮智流弊所至耳莊子歷歷舉此失道而後德以下五句而曰今也以爲物也欲復歸根不亦難乎其易也其惟大人乎雖則云然抑且曰匿而不可不爲者事也遠而不可不居者義也親而不可不廣者仁也節而不可不積者禮也中而不可不高者德也一而不可不易者道也雖此數者有上下先後之序而以聖人並用之則何莫非道也昔有通玄者云道也者妙萬物而爲言總兩儀而稱德得之上者爲道得之中者爲仁義得之凉者爲禮智凉而失之者非人也此言最簡而明也吕氏曰夫道者德之體德者道之用仁義由出於中爲可尚也至於禮則去性益遠華盛而實虧從事乎繁文末節而不求其本忠信日以衰薄雖施於日用之間外則燦然而其中則無有也順之則治違之則亂間不容髮豈非亂之首乎故曰三皇之有道也不知其道化爲五帝之德五帝之有德不知其德化爲三王之仁義三王之有仁義不知其仁義化爲秦漢之戰爭此之謂也且世人以智爲鑿從事浮華雖自以爲見而不知至愚自此而始也故曰前識者道之華而愚之始也吴氏曰忠信者德之厚也漸變而薄一降而爲仁再降而爲義三降而爲禮而忠信之厚德薄矣禮者欲其理而不亂也而適以基亂故曰亂之首前識猶言先知謂智也道猶木之實也未生之初生理在中胚胎未露既生之後則德其根也仁其幹也義其枝也禮其葉也智其華也根幹枝葉華皆自道中生出智者欲其哲而不愚而適以肇愚故曰愚之始也李氏曰前識者智識也智識者失道之始故曰道之華有道者不處也是以大丈夫處其厚不處其薄居其實不居其華故去彼取此何氏曰夫處厚不處薄言其及禮於忠信所以息禮之爭也居實不居華言眞智於道也所以救智之弊也故曰見其文者弊其眞飭其外者傷其内去彼取此捨澆返樸之道也吴氏曰結上文處厚不處薄謂貴德而不尚禮居實不居華謂體道而不用智彼謂其薄其華此謂其厚其實又曰此篇乃分說道德仁義禮智六字以道爲無名以德爲有名自德而爲仁義禮智每降而愈下也故此章之等以道爲一德爲二仁爲三義爲四禮爲五智爲六也吕氏曰聖人目擊道存尚其淳厚捨其澆薄安其誠實摘其華綺去彼禮之華末取此道之大體天下治矣譬如己之攝生反其質素敦兮若樸處其厚也行乎無路遊乎無迹遠其薄也出乎無門入乎大方居其實也屬其精神偃其聞見去其華也去彼華薄取此厚實何不可之有第三十九章昔之得一者天得一以清地得一以寧神得一以靈谷得一以盈萬物得一以生侯王得一以爲天下貞其致之一也何氏曰莊子太初有無無有無名一之所起有一而未形夫以昔之得一者冠於章首言一之爲道自古以固存也一者道之所生不曰得道而曰得一者見道之尊其獨無對爲物不二列子不生者疑獨此言獨者即一之㫖也故曰疑獨其道不可窮林氏曰一者道也天之所以清明而垂象地之所以安靜而載物神之所以虚而靈谷之所以虚而盈皆此道也萬物之所以生亦此道也侯王之所以保正萬邦亦此道也其致之者言其清寧靈盈生貞皆因此道而得之吕氏曰昔之得一者謂往古太極既判而天地谷神萬物侯王所以能清能寧能靈能生能盈能貞者無他蓋得一氣之妙用也夫一氣者無匹合於夭下也爲大道之子神明之母混元之先萬化之祖上下匪常古今不二是以聖人近取諸身天者首之圓象也得之則髮紺髭黑目碧耳聰百靈清爽矣地者黄庭眞土也得此則覆載萬物滋生百昌安寧不動神得之咀嚼六氣凝結胎仙然後變化通靈矣谷得之則腦滿髓實天谷虚盈中生紫眞萬物者六腑五臟九竅百骸是也得之則七液洞流五内堅固沖和滋潤故能乆視而長生矣侯王乃元神心君也得之則頓躋聖位形將自正矣此無他皆一炁之所致也吴氏曰一者沖虚之德也上篇所謂抱一所謂爲一後章所謂道生一皆指此而言莊子謂之太乙又但謂之一此乃自然之道所爲其用則虚而不盈後而不先柔而不剛前章固屢言之而此章盡發其藴得者謂得此一以爲德以者謂以此故能若是也言天之清地之寧神之靈谷之盈萬物之生生不窮侯王之立乎天下之上其所以致之者皆得此一之故也天無以清將恐裂地無以寧將恐發神無以靈將恐歇谷無以盈將恐竭萬物無以生將恐滅侯王無以爲貞而貴高將恐蹶何氏曰清明者爲夭不知此一此道以之清無以則晝冥宵光清者將分裂矣寧靜者爲地不知此一此道以之寜無以則山崩川涸寧者將發泄矣靈應者爲神不知此一此道以之靈無以則其神不靈而將消歇矣盈滿者谷不知此一此道以之盈無以則谷不盈而將枯竭矣生生化化者萬物不知此道此一以之生無以則其生不植而將衰滅况侯王以一身處臣民之上得一且致一而後可以爲夭下貞苟非此一此道之有以也則位高者危德二三者凶蹷敗之來可不戒哉貞者正也吕氏曰天者積陽之德表君之象倘無以清則陰陽謬矣紀綱弛絶沖一不運而開裂之兆見矣地者積陰之德表臣之象倘無以寧則剛柔卷折山川崩决沖一不守而發泄之形著矣神者陰陽不測無以靈則禍福生怪祅祥勃興沖一不居而廢歇之時至矣谷者虚以容物倘無以盈則流潤之失崩夷之憂沖一不盈則枯竭之患作矣萬物有形者也倘無生則堅强枯槁沖一散去則滅亡之期應矣王者貫三才而有萬物儻無以貞而貴高則百官不職四海不歸而蹷敗之禍隨之矣且夫人之一身至陽赫赫在乎上自天柱第一椎玉京關之上皆天也其不清則腦髓减齒落目昏形將壞裂矣己之地無以寧則眞土乾枯黄芽不生靈津發泄矣己之神無以靈則赤子困悴胎仙蕩散七液不流乆而逝竭矣己之萬物不生則關節無寳臟腑虚羸而終於寂滅矣己之侯王恃其高貴則丹元不正性眞失常心影既偏將恐蹷仆矣林氏曰裂分裂也發言動而不定也歇消滅而不靈也竭盡也虚則能受不虚則盡止而不可受矣蹶顛也處貴高之位而無此則顛蹶之矣故貴以賤爲本高以下爲基是以侯王自謂孤寡不穀此其以賤爲本邪非乎林氏曰貴賤高下兩句亦只是譬喻無賤何以爲貴無下何以能高下與賤乃貴高之基本也侯王之稱曰孤曰寡人曰不穀皆是自卑之辭又以此爲虚而不自有之喻非乎言我如此說豈有不然者乎此兩字亦是文之奇處吴氏曰此章以六句並言而此以下承上文貴高二字專爲侯王言之蓋侯王之位貴且高而沖虚之德不欲盈惟當自處於下賤也孤如無父之孤寡如無夫之寡不穀不善此皆不美之名非人所願有者而侯王以此自謂是以下賤自處也先云下爲基賤爲本而後但云賤爲本蓋舉一以包二省文也李氏曰非乎豈不然哉何氏曰貴本於賤高基於下是以侯王自謂孤寡無助不穀不德亦可反其本而不失其道矣易曰常以一德謙以制禮常德之固謙德之柄是也此道家所謂雌一之道守約而施博也故致數車無車不欲碌碌如玉落落如石林氏曰數車無車一本作數譽無譽譽字誤也此兩句本譬喻若作譽字下文如玉如石意不相屬矣李氏曰數車之名件無一名車者數我之一身無一名我者轂輳合一則名車四大合一則名我不欲如玉如石者貴賤兩忘惟抱一也何氏曰如數車而裂於名數之異如玉石而偏於貴賤之質則非一與本之道莊子萬物一齊孰短孰長以道觀物何貴何賤此也故章末取喻以戒之柴氏曰輪輻等物皆車中微賤者然非此莫成車盡其名件數之無一名曰車者故曰數車無車石中出玉不敢貴玉賤石蓋愈乆愈不忘初也第四十章反者道之動弱者道之用林氏曰反者復也靜也靜者動之所由生即易所謂艮所以成始成終也能弱而後能强專於强則折矣動以靜爲用强以弱爲用吴氏曰道之至靜反於道故動道本至無反於道故有是以虚無恍惚之根萬物共本之元囿於出入之機墮於動靜之域皆道之體用也極物之眞必守其本命物之化必守其宗故動而生者不與之俱化則知出者之必入不與之俱徂則知動者之必靜觀物之出必終於反觀物之動必終於靜而夭地之心可見矣且春夏則萬物芸芸競作根荄芽甲並發于外出而有生豈非反於動乎秋冬則萬物去華而就實各斂于内歸吾性宅順而不亂豈非弱而用乎譬之身焉欲修長生要識所生之本欲求不死當眀出入之機謂之反還謂之動靜反者返其眞元也動者發其天機也自一陽來復於靜定之中運轉樞要斡旋泝流得七返之㫖鎮補三田流通百脉非動則無以復命也故曰反者道之動夫道無形無聲非柔不能制剛非弱不能制强故專守雌靜若嬰兒之未孩且天下之柔弱莫過於水水莫過於氣氣莫過於道道氣神水之所柔弱者通貫金石爍鋭磨堅無乎不入故曰弱者道之用李氏曰反者道之動神一出便收來弱者道之用專氣致柔也天下萬物生於有有生於無林氏曰有夭地然後有萬物故曰物生於有然天地敦生之天地之始生於太虚是生於無也因動靜强弱而推言言有無之始也吕氏曰天下之物有無相生迭出迭入未始有盡非有則不能顯無非無則不能生有萬物生於天地之内是因有而生也天地形於太虚之中是因無而有也有生則復於不生有形則復於無形有無之相生若循環然而反復之義大矣哉聖人深達厥理即水以觀之不觀其流必觀其反流即木以觀之不觀其華必觀其去華則物雖有萬之不同目擊而道存矣然天地爲萬物父母而人爲萬物之最靈己之有者形也己之無者神也胞胎成其形有生於無也百靈生於身無生於有也故眞有不有眞無不無達斯㫖者自契於眞有眞無也何氏曰天下萬物生於有有生於無反求其初也有天地然後有萬物也天地者萬物之一初先天地生有物混成混淪者又天地之一初無有生有無形生形有生則復於不生有形則復於無形始自無而散諸有終自有而反諸無則道樸豈終散於器乎彼流蕩而忘反者宜其失於强盛而去道遠矣李氏曰天下萬物生於有即有名萬物之母有生於無即無名夭地之始也第四十一章上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑不足以爲道林氏曰勤而行之者言聞曰必信也若存若亡者且信且疑又以爲有又以爲無也最下鄙俚之人則直笑之耳惟最下之人以之爲笑方見吾道之高退之論文且曰人笑之則以爲喜况道乎何氏曰道者自然行者能得聞者能言能行勤行士之上也中人求道不宏不篤焉有焉無繫念存心萬中無一至於世俗浮薄雖謙下爲懦弱笑虚無爲荒唐然不足發或者之笑亦不足見此道之大以知道者希故也吕氏曰上士者大資純厚達於妙理聞道則洞然曉悟信而不疑篤志行之惟恐不得故曰勤而行之中士受性中庸可上可下始樂而終厭初勤而後情聞道則猶豫多疑取捨不决欲進則不能果於力爲欲退則猶有所顧惜故曰若存若亡下士賦性污濁不達至理聞道則以爲迂闊荒唐不止於不信又且大笑而非之然而不爲下士之所笑者豈足以爲清淨之道也故建言有之明道若昧進道若退夷道若類上德若谷大白若辱廣德若不足建德若偷質眞若渝大方無隅大器晚成大音希聲大象無形林氏曰建言者立言也言自古立言之士有此數語明道以下數句是也此亦是設辭言此數句不出於我自古有之明道若昩惟昩則明前章曰自見者不明又曰不自見故明即此也進道若退者能退則爲進也夷平也夷道大道也大道則無分别類同也和光同塵之意上德若谷能虚而不自實也大白若辱不皎皎以自異也廣德若不足若自足則狹矣偷竊也欲爲而不敢爲也建立其德是有爲者爲之於不敢爲所以能建立也質眞若渝眞實之質純一而不變而自有若渝變之意此亦足而不自足之意大方者太虚也太虚雖有東西南北孰見其方隅哉大器晩成如鑄鼎之類豈能速成哉大音希聲天地之間音之大者莫大於風霆豈常有哉希者不多見也大象夭地也易曰法象莫大乎天地夭地之形誰得而盡見之何氏曰建言有之古之立言之士如下文所云皆爲世所訕笑而大道存焉明道若昩大悟同未悟也進道若退大勇同無勇也夷道若類平等同無等也上德若谷實若虚也大白若辱清若濁也廣德若不足有餘不敢盡也建德若偷建諸天地而如朝夕偷安者質眞若渝質如金石而如長乆渝變者大方無隅無門無房大器晩成匪雕匪琢大音希聲非律非吕大象無形離色離名混沌太無非可名狀可謂費而隱矣此皆極大道之形容廣乎其無不容淵乎其不可測也吕氏曰夫過欲陽而功欲陰過陽則能消功陰則能全諺謂之陰德者不欲人知因物自然興著不顯其能退藏於密故曰建德若渝道隱無名夫惟道善貸且成林氏曰道隱無名不可得而名也貸者與也推以及人也有道者能以與人而不自有也成者道之大成也成己成物而後謂之大成也何氏曰無名者不可指定而名也故有如上文摸寫不盡者然道雖無名而有實善貸且成貸註韵施也人人咸備物物周普如夭施地生小以成小大以成大何莫非道也莊子化貸萬物而民弗恃有莫舉名使物自喜立乎不測而游乎無有者此也第四十二章道生一一生二二生三三生萬物萬物負陰而抱陽沖氣以爲和何氏曰虚無生自然自然生道道生一一生天地天地生萬物萬物抱一而成得微妙氣化凡人物背寒向暖背暗向明背惡向善皆爲負陰抱陽之意抱陽即抱一道之生氣之化也人與天地參爲三而於物最靈故人也者天付以神地付以精沖和付以氣人貴護氣保精愛神與天地並立所以保養沖和以謙不以盈也書曰滿招損謙受益時乃夭道林氏曰一太極也二天地也三三才也言皆自無而生道者萬物之始自然之理三極既立而後萬物生焉萬物之生皆負抱陰陽之氣以沖虚之理行乎其間所以爲和也吕氏曰道生一氣一氣生天地夭地生萬物所以道生一者太極未判一氣之渾淪也一生二者謂清濁既分而天地位焉易所謂易有太極是生兩儀是矣赫赫發乎天肅肅出乎地兩者交通而成和故人倫成焉一陰一陽之謂道言負而且抱者不可須臾離也可離非道也鍊養家以月爲衆陰之母曰爲衆陽之父所以負抱者常當嘻吸天光咀嚼沖氣則天谷虚盈二景纏絡萬神安寜出入元化飛駢玉清董氏曰几動物之類則背止於後陰靜之屬也口鼻耳目居前陽動之屬也故曰負陰而抱陽如植物則背寒而向暖而沖氣則運乎其間又統而言之則神陽而質陰神運於中曰抱質見於外曰負氣則動陽而靜陰乃濟之以中和而沖乎形質爲神所乘之機也人之所惡惟孤寡不穀而王公以爲稱故物或損之而益或益之而損何氏曰稱孤稱寡不穀者托於無輔無善之稱此王公卑以自牧之名三名者人之所甚惡而亦人之所以教蓋位峻者顛輕豪者亡固理之常而損中有益益中有損又物之變故聖人爲三才宗主執沖含和寧處人之所惡寧受物之所損安知自下者人不高之自後者人不先之惡未必非美損未必非益也經曰道沖而用之或不盈盈者沖之反也易曰有大者不可以盈故受之以謙謙與盈相反也林氏曰人之所惡莫若孤寡不穀而王公以爲稱此亦譬喻有道者自卑自賤之意其意蓋謂天地人皆自無而有萬物以陰陽爲質而其所以生之者皆沖虚之和氣學道者當體此意則必以能虚能無爲貴天下之物或欲損之而反以爲益或欲益之而反以爲損損益之理有不可常如月盈則必缺此益之而損也既缺則必盈此損之而益也人之所教我亦教之强梁者不得其死吾將以爲教父何氏曰金背銘强梁者不得其死又繼以好勝者必遇其敵亦以見古之人皆以此爲教而我亦不求異以爲教然且爲教之父者蓋指約而易操也教之父道之母也無他天地物類生皆從一道以沖爲宗李氏曰人之所教無非爲善我亦如是教之也吴氏曰此言用弱之事梁亦强也以木絶水以木負棟皆曰梁也取其力之强也不得其死謂不得善終如子路之行行夫子以爲不得其死後果死於孔悝之難教父猶言教之本父謂尊而無出於上者人之所教教以用弱我亦以此教之强梁而不能弱者必不能保其身以强梁勝人之益而有不得其死之損所謂益之而損者此最爲教人第一義故曰教父倪氏曰老子言道每譬之母此特曰父者母主於養父主於教爲人師者必尊嚴如父可也第四十三章天下至柔馳騁天下之至堅無有入於無間吾是以知無爲之有益也林氏曰堅者易折柔者常存以至柔行於至堅之間如水之穿石是也無間無縫罅也無有即無形也如人身榮衛之間可謂無間而氣脉得以行之無隙之隙而曰月之光亦入之此皆無有入無間也何氏曰夭下莫柔弱於氣氣莫柔弱於道道之所以柔弱者包裹天地貫穿萬物老子嘗以是語關尹知道與氣所以柔也天地之氣雖至堅如金石無所不透其道亦然其來也幾微易簡其究也廣大堅固故至柔非弱至堅非强如泰山之溜穿石如單極之綆斷榦亦此類也馳騁者莊子所謂乘天地馳萬物之意可以執道御有者由至堅而遡至柔由至柔而遡至元列子體合於心心合於氣氣合於神神合於無舉此見無介然之間道其至矣乎然後知無爲之有益無爲神歸無動氣泯决本常根入乎無間默悟之可也吕氏曰天下至柔莫過於水然猶未免有形者也或似無形而入於有形則氣是矣氣本柔也且氣本柔養之至大至剛人莫能禦以堅禦堅不折則碎以柔禦堅柔亦不縻堅亦不病夫一已之至柔者道氣是也馳騁乎至堅者謂氣能穿關通節也故曰夭下之至柔馳騁天下之至堅以有入有捍而不受以無入有無未嘗勞有未嘗覺惟大梵之氣無有形質故能包裹天地而無外密襲秋毫而無内聖人體之德性是也見道朗徹何往不通所以致治四海謂之神化喻夫至人臻襲氣母引鍊太和神明在躬出入無間淵乎不可測度故曰無有入於無間無爲者居象帝之先處太極之中道之妙用實寓于此聖人則之立不教坐不議虚而往實而歸無有不可豈小補哉至人無爲無事而形不勞忘我忘人而精不虧非欲於道道自歸之故曰吾是以知無爲之有益也不言之教無爲之益天下希及之林氏曰前兩句皆譬喻也以此而觀則知無爲無不爲者至理也不言而教自行無爲而功自成此皆至道之妙用而天下之人知不及之故曰天下希及之有益有功用也何氏曰何謂不言之教如天地有大美而不言四時有明法而不議萬物有成理而不說精誠所感吾何言哉何謂無爲之益如水行用舟山行用橇因高爲田因下爲池簡易之化吾何爲哉此皆專氣致柔極虚本無以道運化故也故天下希及之不言而信不求而得保眞懷道而天下自從又誰得而企及之哉第四十四章名與身孰親身與貨孰多得與亡孰病林氏曰名貨皆外物也無益於吾身則雖得雖亡何足爲病而不知道者每以此自病何氏曰莊子伯夷死名於首陽之下盜跖死利於東陵之上二人所死不同其於殘生傷性均也烈士殉名貪夫殉利以身殉之雖死不悔曾不知身重於天下况死名死利乎知道者身尚非我有况美名美利皆外物耳不知道者試以名比身世以名爲華身固有名高而身危則名豈不疏於身乎試以財比身世以財爲資身固有財多而身害則財豈不少於身乎故曰生我名者殺我身益我貨者損我神當其無得無失之初如水未波及亡於既失之後無病自灸敦若本無之無事乎敦能自遣於既失之餘乎吕氏曰先身而後名貴身而賤貨是猶未能忘我也夫忘我者身且不有而况於名貨蓋名無實實無名夫貴者夜以繼日思慮善否其爲形也亦疏矣富者苦身疾作競名積財而不得盡用其爲形也亦外矣然聖人貴以身爲天下非忘我則不然使天下之人知名之不足親貨之不足多故伯夷餓死於首陽之下是殉名也盜跖死於東陵之上是殉利也其於身貨敦多敦寡焉以身殉名世必謂之君子以身殉利世必謂之小人得之則悦失之則憂貪得忘失見利忘義是猶以隋侯之珠彈千仞之雀雖得雀而珠已亡蓋所亡者重所得者輕也可不哀哉蓋志在乎得而不得者以亡爲病及其既得而患於失則病又甚於亡者惟齊有無均得喪而後始無疵矣是故甚愛必大費多藏必厚亡林氏曰愛有所著則必自費心力以求之愛愈甚則費愈大此言名也貪而多藏一旦而失之其亡也必厚無所藏則無所失藏之少則失亦少多藏乃所以厚亡也此二句發明下三句何氏曰多取美名是謂甚愛名者爲實之賔名大而費心亦大矣居其奇貨是謂多藏利者治亂之媒利厚而亡物亦亡矣吴氏曰愛謂愛名大謂身也以名比身則身大於名慕名者甚其愛而愛身反不如愛名必至耗費心神而損壽是因名而使身之大者耗費也故曰大費藏謂藏貨厚亦謂身也以貨比身則身厚於貨嗜貨者多其藏而重身反不如重貨必至喪亡身命而隕生是因貨而使身之厚者喪亡也故曰厚亡知足不辱知止不殆可以長乆林氏曰惟知足者不至於自辱惟知止者不至於危殆如此而後可以長乆此三句却是千古萬古受用不盡者何氏曰知足則於名於利已得之中知有分量而此身早退何辱之有知止則於不當得之名與利截然一毫不求而此身能隱何殆之有乃可乆也吕氏曰心足則無求於外故無辱心止則萬縁俱息故無殆可以長可以乆也吴氏曰知内分之有定則足而不貪故不至失舉虧行之辱知外物之無益則止而不求故不至損壽隕生之殆而可長乆也李氏曰名貨得失皆有爲也終不長乆惟知足知止可以長乆第四十五章大成若缺其用不敝大盈若沖其用不窮大直若屈大巧若拙大辯若訥林氏曰有成則有缺大成者常若缺則其用不敝矣有盈必有虚大盈者常若虚則其用不窮矣前章窪則盈敝則新即此意大直則常若屈然枉則直也曲則全也大巧者常若拙然不自矜也大辯者常若訥然不容言也李氏曰上章知足不辱故次之以大成若缺德有餘而爲不足者壽財有餘而爲不足者鄙大成若缺大盈若沖至於若屈若拙若訥皆德餘而爲不足者用之無盡也吴氏曰以成爲成以盈爲盈以直爲直以巧爲巧以辯爲辯小矣若缺則非成若沖則非盈若屈則非直若拙則非巧若訥則非辯乃爲成之大盈之大直之大巧之大辯之大者也躁勝寒靜勝熱清靜爲天下正林氏曰躁之勝者其極必寒靜之勝者其極必熱躁靜只是陰陽二字言陰陽之氣滯於一偏皆能爲病惟道之清靜不有不無不動不靜所以爲天下正何氏曰道以清靜爲正亦惟清靜爲大躁勝寒陽極生陰靜勝熱陰極生陽皆極於所偏勝若夫天清地靜乃天下至正之道無勝無極而可以大且乆者經曰人能常清靜天地悉皆歸是也道德眞經集義卷之六
