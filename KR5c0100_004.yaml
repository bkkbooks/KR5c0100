body:
  text: 盱江危大有集第二十二章曲則全枉則直窪則盈敝則新少則多多則惑吕氏曰聖人鈎深致遠動必循理理之所在天下莫能與之較也以謂治性者莫若明心全身者莫若遠害是以屈曲才能出處語默隨順其宜與物無競不虧大全故能成其無爭之德故曰曲則全聰達明察曉辨諸物遺佚而不怨厄窮而不憫其直如矢其端若弦常且委蛇同波類尺蠖之未伸屈伏而不有其直斯可謂大直矣故曰枉則直川谷窪下則水就之雖欲不盈不可得也於己謙虛則衆德歸之故曰窪則盈至人支離其德弊薄其身大白若辱質真若渝則天下樂推而不厭其道日新矣楊子或問新弊何如新則襲之弊則益之然可謂日新其德不為外物之弊者矣故曰弊則新夫道不貴繁聞見之多不如其守之約也易則易行簡則易從易簡得則天下之理得矣攝生之士少思少慮少欲少念持而勿失則得之矣故曰少則得人情好勝以多為貴蓋道不欲多多則雜而擾路多歧則亡羊學多方則喪道治身之道多思則神散多機則智沉非所以抱一也故曰多則惑何氏曰此章首言曲則全末言全而歸於以見天然混全之道如川谷之於海不以萬折而妨其東也道初非曲所能強全特以其本全之天外以曲成其物者耳要知天地大全皆備於我與物委蛇以同其波為斯世不得直行其道也何嘗違道干譽如後世見惡之曲者哉如是則四方均齊道本直也外以枉全之六虛周流道本盈也外以窪全之謙受益也長古不老道本新也外以弊全之晦而明也少則得一也多則惑雜也列子大道以多歧亡羊學者以多方喪道林氏曰能曲而後能全能枉而後能直能窪而後能盈能弊而後能新能少而後能多此皆能不足而後能有餘能真空而後能實有之意少則得多則惑只是少則多三字又紬繹作兩句也是以聖人抱一為天下式吕氏曰一者人之真性也道之所言一者亦有數種不可不知也有道之一無一之一也有神之一真一之一也有氣之一一氣之一也有水之一天一生水之一也此言抱一者乃真一之一也知一者無一之不知昔黃帝往峨眉山見天真皇人曰請問真一之道天真皇人曰此道家之至重其經上帝祕在五城之內吾聞之經曰一在北極太淵之中前有明堂後有絳宫巍巍華蓋金樓穹窿此真一之大略也夫言北極太淵之中者言真一所居之神室也乃在兩耳交通之穴前明堂後玉枕上華蓋下絳宫即泥丸天帝上一赤子之所居也謂耳屬腎故曰北極太淵之中也西升經子得一萬事畢知而行之乃可為修真之法式故曰抱一為天下式何氏曰聖人抱一為世法式一者道所自生乃混然天全者不自見故明不自是故彰不自伐故有功不自矜故長夫惟不爭天下莫能與之爭吳氏曰自見猶云自炫明謂智之明不自見者用晦而明也自是猶云自賢彰謂明之彰不自是者暗然而日彰也夸其功曰伐功謂事之成績負其長曰矜長謂能之過人不自見不自是不自伐不自矜而以夫惟不爭終之四者皆不爭之喻也林氏曰不自見不自是不自矜皆是不有其有之意我既無所爭於天下又何爭之有李氏曰不自見以下皆戒盈勸謙之義也謙下故無爭無爭則全其本也古之所謂曲則全者豈虛言哉誠全而歸之吳氏曰曲則全三字蓋古有是語而老子述之以為此章首句章內抱一為綱曲則全以下五者夫惟不爭以上五者凡十事為目皆曲則全一句所可該也故重述之於章末而曰古人所謂曲則全者豈是虛為此言而無實哉蓋以其誠實能全而遂以全之效歸之董氏曰蓋老子述而不作以謂曲則全等語皆古文也此申其言之不妄者勸之深也使學者果能明曲枉之道則道大全實皆歸諸己矣道乃人之固有故云歸言復其初也第二十三章希言自然飄風不終朝驟雨不終日孰為此者天地天地尚不能久而况於人乎何氏曰經曰聽之不聞名曰希夫希者何言自然也言大道之言也此句當以希字句絶不可以希言與多言對解淺矣學道者遊心於淡合氣於漠廓然無形寂然無聲故首言以希之一字大音希聲之希自然也曰希曰自然此玄門也飄風暴雨不終曰飄風暴雨行強梁之氣故不久而滅此也夫飄暴之氣不自然則不能以常然天地者尚不能以此為久而况人乎吳氏曰聽之不聞名曰希希言言無言也得道者忘言因其自然而已飄風強疾之風自旦至食時為終朝驟雨急暴之雨自旦至暮時為終日不因其自然而輕躁發言譬如天地飄風驟雨皆反自然之常而為變怪者也天地反自然之常尚不能久不及終朝終日而止矣况人而不能因其自然可乎李氏曰飄風驟雨言妄動躁進不久遠之喻吕氏曰飄風驟雨不久之喻者此太上戒人之喜怒哀樂發而不中節動止失常也希者視之不見之道也故從事於道者道者同於道德者同於德失者同於失吳氏曰從事於道謂以道為事也道者謂有道之人德者謂有德之人失者謂庸下之人所為不能無失者也同與莊子齊物論之齊相近謂與之合一而不相非異也惟因其自然而希言故凡上等次等下等之人皆視之一同而無相非異也蓋道者德者與我為一無所容言矣至若失者他人雖以為失彼則自以為是固亦有自然之是也豈可不因其所是以是之而乃妄言以非之哉莊子不言則齊齊與言不齊言與齊不齊也故無言亦老子希言自然而玄同之意李氏曰從事於道者和順於道德混同於事物自然感通於物物亦自然相應也又曰道者同於道一體同觀也德者同於德謂不生二見失者同於失無分别也吕氏曰至人同於道同於德同於失不與物親不知其有道不知其有德不知其有失超然出於形器之外而無得失之憂也同於道者道亦得之同於德者德亦得之同於失者失亦得之吳氏曰道德之人以我同之與我即證參同夫何間然失者之人以我同之亦或緣彼之獨是以悟我之公是則三者之人皆以我同之而有得也然此惟有道之實者能之苟道之實有所不足於己則其待人必有不以其實者焉而是是非非強加分别矣豈能如此玄同也哉李氏曰我同於我道亦同於我我同於德德亦同於我我同於失失亦同於我我疑於物物亦疑於我第二十四章跂者不立跨者不行李氏曰此章總證前三章跂者不立跨者不行如飄風驟雨之謂也吳氏曰此章又以人之行立譬前章立與行亦因其自然或於自然之外而求益跂超其踵而立以增高其身跨開其足而行以增闊其步暫時如此不能久也終必不可以立不可以行吕氏曰跂者似立而非立人貴其有立非道則不立跨者似行而非行人貴其有行非道則不行苟以立為未足而加之以跂以行而未足加之以跨未見其可也類夫冒進之士跂望非分欲求榮寵有若延頸舉踵何能久立哉而又材力卑劣欲超軼於人跨步挾物心覬速達何由得行乎是以違其常性而強其所不能若夫以道獨立乎萬法之表超然不移者曷可同日而語何氏曰跂翹足也則離於立言人企望之心重不可與有立也跨大步也則促其行言人進取之心重則不足與有行也自見者不明自是者不彰自伐者無功自矜者不長其於道也曰餘食贅行物或惡之故有道者不處也李氏曰自見自是自矜自伐渾是私意私意確則害公何可久也故有道者不處餘食贅行殘飯贅疣衆所不美吕氏曰至人遊心太虛睨物玩世以生死為一條以可不可為一貫回視自見自彰自矜自伐之人譬諸棄餘之食贅餘之行天之所虧地之所變人之所惡而况至人窮理盡性造道之極曷嘗顧之終身當勿處也林氏曰自見自彰自是自伐自矜皆是有其有而不化也吳氏曰自見者之終不能明自是者之終不能彰自伐者之終無功自矜者之終無所長亦若跂者之不可以立跨者之終不可以行也食之不盡曰餘肉之附生曰贅或曰行讀作形古字通用司馬氏曰棄餘之食適使人惡附贅之形適使人醜第二十五章有物混成先天地生吕氏曰太易者未見氣也太初者氣之始也太始者形之始也太素質之始也氣形質具而未始相離故曰渾淪非清非濁湛然常存非高非下萬派莫分天地由之而生萬物由之而化至人體之是以歸根復命返性於初恍惚之中千和萬合極物之真原其本來先乎覆載混沌成體道之源也在人為妙覺之性亘萬劫而不間故曰有物混成先天地生林氏曰有物混成道也無極而太極其生在天地之先言夭地自是而生也吳氏曰有物混成物謂道也混成謂不分判而完全也先天地生猶首章所謂夭地之始四章所謂象帝之先寂兮寥兮獨立而不改周行而不殆可以為天下母吕氏曰寂兮無聲寥兮無象空洞杳冥無今無古獨立無配未嘗遷革何物可偶故能周遊八紘應用無盡斡旋不忒物有盛衰道無窮極萬物莫見其行而行莫見其止而止行而復止止而復行如環無端物無大小咸向於道得之則全離之則損生之成之咸有所賴林氏曰寂兮寥兮不可見也獨立而不改常久而不易也周行而不殆行健而不息也可以為天下母天下萬物之所由生也寂閴靜也寥虛廓也言其無聲無形也獨立乎萬物之表無可與對而未嘗變易故曰不改周行於萬物之中無不遍及而未嘗窮匱故曰不殆生育萬物故曰為天下母吾不知其名字之曰道強為之名曰大大曰逝逝曰遠遠曰反林氏曰吾不知其名不可得而名也名不可得字之曰道字者代名之謂也曰道不足以盡之又強而名之曰大大又不足以盡之又名之曰逝逝者往也不可追逐也逝又不足以盡之又強名之曰遠遠者不可近也不可得而親附也遠又不足以盡之又強而名之曰反反者復歸於根之意也李氏曰大者無有限量逝者無有疆界遠者無有邊際反者收拾來歸何氏曰反者則復歸於無物也柴氏曰反者用復歸體也故道大天大地大王亦大域中有四大而王居其一焉吳氏曰王謂聖人之有位者古今惟道最大無可與並此以天地聖人與道而言而曰四大何也蓋天得此道以為天地得此道以為地聖人得此道以為聖人其所以能大者以其有此道故也李氏曰人只知域中有四大殊不知自己一物更大吕氏曰至人喻之於己道者虛無神妙天者夭谷神宫地者黃庭真土王者真性元神元神乃心也不離方寸潛夭潛地經緯萬方亦可謂大者矣人法地地法天天法道道法自然吕氏曰王者淵默沉靜與陰同德所宰無私是法乎地也地者守一不動剛健中正與陽同波是法乎天也天者高明至公出真兆聖酬酢萬變惟德是輔與道同體是法道也惟道則任物遂性無為自然守而勿失與神為一道體圓通出入無礙所謂自然也其誰曰不可故曰人法地地法夭天法道道法自然吳氏曰人之所以大以其得此道而與地一故曰法地地之所以大以其得此道而與天一故曰法夭天之所以大以其與道一故曰法道道之所以大以其自然故曰法自然非道外别有自然也自然者無有無名是也林氏曰其意但謂道至於自然而極如此發揮可謂奇論何氏曰人法地之人即王也第二十六章重為輕根靜為躁君是以君子終日行不離輜重吳氏曰根猶本也躁動也君猶主也言輕以重為本動以靜為主也君子之行吉行乘乘車師行乘兵車皆輕車也輕之後有輜車載寢處服食所用之物謂之重車雖乘輕車以行而終日不與重車相離不敢以輕車疾行竟往而不顧在後之輜重也此言輕本乎重也吕氏曰重者任物者也輕者為物所任者也將制於輕不可失之於重靜者役物者也躁者為物役者也將制於躁不可失之於靜蓋靜則有制輕之功靜則有持躁之方是以治國之君當以厚重安靜為基則百姓安康而無擾亂之憂矣有若終曰行邁未嘗敢離輜軿之重載者以其衣食之所在也苟遠而棄之則有中途委頓之患其於立身行道豈可須臾忘於靜與重邪至人處己亦然貴乎重靜謹乎輕躁重者首輕者肢靜者神躁者情取此靜重之德去其輕躁之情則聖胎安逸終日如乘安車大道雖夷不敢輕易其行林氏曰根言輕自重生也君言躁以靜為主也雖有榮觀燕處超然吳氏曰燕間也處居也雖有榮華之境可以遊觀亦超然無一物之繫纍其心此言動主乎靜也林氏曰其胸中之所見極天下之至美故曰榮觀而居之以安故超然於輕重躁靜之外燕安也處居也猶吾書所謂安行廣居也何氏曰雖有崇高榮華之觀而超然清間之燕萬物毋足以撓其心於治天下乎何有列子至觀不知所視靜重之至也奈何萬乘之主而以身輕天下輕則失臣躁則失君吳氏曰國勢之居重馭輕兵法以靜制動與夫人之治身治心皆當本之於重主之以靜林氏曰萬乘之主若不知身之重則不能超然於事物之外必至有輕躁之失失臣者不足以臣伏天下失君者言自失所主以身輕天下者以天下為重以身為輕也不輕其身則知道矣知道則知自然矣吕氏曰至人取之於己則心者君也氣者臣也輕則心動而損其氣躁則氣耗而蕩其心內而修身外而役物靜重之體性理之分哉故曰輕則失臣躁則失君第二十七章善行無轍迹善言無瑕謫善計不用籌策善閉無關楗而不可開善結無繩約而不可解吳氏曰善謂善於其事轍謂車轍迹足迹也瑕疵玷謫過責計計數之多寡籌策計數者所用之算以竹為之關楗拒門木也橫曰關堅曰楗繩約索也合而成體曰繩用而束物曰約行者必有轍迹在地言者必有瑕謫可指計數者必用籌策閉門者必須用關楗結繫者必須用繩約然皆常人所為爾有道者觀之則豈謂之善哉蓋善於行者以不行為行故無轍迹善於言者以不言為言故無瑕謫善於計者以不計為計故不用籌策善於閉者以不閉為閉故無關楗而其閉自不可開善於結者以不結為結故無繩約而其結自不可解舉五事以為譬以起下文聖人善救之意吕氏曰神無方道無體不行而至不疾而速至人觀天之道執天之行為乎無為行所不行不出户庭其德流傳如風披拂萬物何轍迹之可尋乎且不善言多為言之所纍未能忘言也明矣夫瑕者玉之病謫者言之咎夫豈知言之所以言哉至人以日新之德發而為言垂訓於世舉合自然又曷有瑕疵譴謫之可玷乎故曰善行無轍迹善言無瑕謫道不可求於度數也今以籌策而知者豈自得之妙邪惟善計者不然守一無為能任萬物縱橫遲用不墮諸數使大小多少各盡其分不損其材何假於籌策哉故曰善計不用籌策且善閉者六通四闢雖天地密移鬼神靈響不得其門無自而入以其形全精復塞兊閉門諸境莫入雖無關楗終莫能開也故曰善閉無關楗而自不可開噫物之膠固水之凝結事之和合雖無繩約不可解也至人簡易沖虛神凝氣定恬然清靜雖天地不能犯也故曰善結無繩約而不可解也李氏曰謹於言行則無迹無謫心之計其可算心之閉其可開心之結其可解乎林氏曰五者皆譬喻也其意但謂以自然為道則無所容力亦無所著迹是以聖人常善救人故無棄人常善救物故無棄物是謂襲明吳氏曰聖人之救人救物以不救為救亦若上文所譬以不為其事為善也蓋有所救者必有所棄假使所救者百千萬人百千萬物然此百千萬之外皆棄而不及救也聖人之善於救者不然一皆無所救也無所救則無所棄矣不見其為救此而棄彼也故無一人是棄而不救之人無一物是棄而不救之物何氏曰道在天下周普萬有人人皆欲化之物物皆欲成之而不見其迹神應故妙也關尹子荼然鬱然在大化中性一而已知夫性一者無人無我故人物皆得遂其性而無遺棄者聖人無為之道也是謂襲明夫靈明之性人所同稟特不全明爾聖人委曲導人使還其靈明之天於不壞不滅之地繼之者善也故曰襲明吕氏曰至人收視返聽虛室生白宇定光發如燈之明傳襲而不絶故曰襲明董氏曰夫救人於危難特救其形爾而且未必能博豈足為善哉惟彼方執著有為迷其性於暗蔽之中而我有兼容之量容之以先覺之明覺之使彼之天光自發如明燈之傳襲無盡而在我者既以與人己愈多則其明亦何限量哉故善人不善人之師不善人善人之資吳氏曰善人謂善於其事之人師者人之所尊事而為法者也資者如以貨財給人俾人藉之賴之而得有所成也因彼之不善而成此之善名故曰資何氏曰夫不善之人師善者而受其教善者資不善者以行其化此道之所以生生不息者是謂襲明林氏曰天下若無不善之人則誰知善人之為善是不善人乃為善人之資也資者言其賴之以自别也吕氏曰師資者能資人而亦資於人相成之義也倪氏曰善人為不善人之師固也不善人乃為善人之資者孔子曰三人行必有我師焉擇其善者而從之其不善者而改之孔子猶以不善者為師况賢乎資之為言助也因彼不善吾鑒之而知改過以從善是之謂資不貴其師不愛其資雖智大迷是謂要妙吕氏曰人雖因其師而指南及其頓悟至理物我兩忘不貴不愛如列子師老啇友伯高既而曰不知夫子之為我師若人之為我友內外盡矣故曰不貴其師不愛其資故能見性之性開天之天深造乎道使有智者亦皆迷其津雖有巧計無所施之雖有至言無所喻之可謂真要妙矣故曰雖智大迷是謂要妙李氏曰師資兩忘黜聰屏智終曰如愚第二十人章知其雄守其雌為天下溪為天下溪常德不離復歸於嬰兒吕氏曰雄者剛而動雌者柔而靜聖人知己之尊榮若縱乎剛勝則患生未若守其柔弱卑退善下而天下之德皆歸之如水之就下焉為天下溪沛若細流決之四方何所不納復能守其常德溫粹不雜類嬰兒之未孩是謂全德於己亦然雄者陰中之陽也在人為精雌者陽中之陰也在人為神知雄者保其精守雌者存其神神之靈而萬物至心之無而和氣歸若水之注于溪任物污濁比於赤子吳氏曰雄謂剛強雌謂柔弱嬰兒謂無所知識林氏曰知字能有為而不為之意知雄守雌不求勝也常德即常道也不離無間斷也嬰兒無知焉李氏曰知雄守雌不自大也何氏曰夭門開闔能為雌乎吾寧靜為下弱勝強也倪氏曰先之以知其雄而後言守其雌者於雄之剛強非不知也乃能守雌之柔弱故可貴也若本不知雄唯守雌而已則凡世之愚弱者亦可謂知道可乎故必先知之而能不用此所以為有道也嬰兒者譬道之始也知其白守其黑為天下式為天下式常德不忒復歸於無極吕氏曰白以喻道之著也黑者喻道之復也聖人知我心澄潔純素無有一疵慧而不用乃能收其淵奧實智若愚持以自晦光而不耀行之於己施之於人可為天下模式既楷模法則於世矣正而不妄公而不私動而有常絶無差忒之愆其於人之身也白者金之鄉黑者水之府知金之與水相生相成為命之基當鍊金液守元精斡旋運動成真金之體可為舉世修真之依式也且真常之德獨覺無為一了百當毫毛匪差神契無冥豈有窮極哉河上公曰白喻昭昭黑以喻默默人雖自知昭昭明白當復守以默默如暗昧無所見如是則為天下法式則德常在林氏曰不忒無差失也無極無物也何氏曰毋履太白可令永存吾寧以玄為德明若昧也吳氏曰白謂光眀黑謂暗昧無極無所窮盡也李氏曰知白守黑者不自見也知其榮守其辱為天下谷為天下谷常德乃足復歸於朴吕氏曰榮辱之來人莫得而先知倘來適去初無交涉聖人知其位之崇高榮觀燕處守其卑辱納污藏垢如谷之虛谷既虛矣靡所不容無彼此之間內德充足一性純常復歸于朴李氏曰知榮守辱不自貴也守雌守黑不見自己之明也何氏曰大白若辱盛德若不足吾寧受垢受不祥損而益也曰嬰兒曰無極曰朴皆混然返始之道也林氏曰乃足備至之也朴太朴也天地之始也吳氏曰榮謂尊貴辱謂卑賤朴謂木質未斫為器此章之意欲常德而返本復始以歸於太初之道常德者沖虛不盈之德也故寧黑無白寧雌無雄寧辱無榮知其守其者雖知彼之可尚然寧守而自處於下既全此沖虛之德乃可復歸於太初之道莊子所謂德至同於初也曰無極曰嬰兒曰朴皆以喻太初之道也朴散則為器聖人用之則為官長故大制不割林氏曰大朴既散而後有器即形而上者謂之道形而下者謂之器聖人以形而上者用形而下者則天地之間各有其職聖人兼三才以御萬物雖職覆職載亦聽命於我是為天地之間官萬物者之長也莊子官天地之職亦造化之一官守耳割離也以道制物謂之大制制則道器不相離矣此即無為而為自然而然之意何氏曰朴者大道無為之始器者事物有為之名聖人不能使朴之不器而善用之以官天地長民物雖大制御方而不割生而不傷大道之力也吳氏曰有所裁制者必須以刀割裂其全而大制則以不制為制故不割裂也大散者不散大用者不用亦如大制之不割第二十九章將欲取天下而為之者吾見其不得已天下神器不可為也為者敗之執者失之何氏曰經中言天下之戒者三欲革千萬世亂臣賊子之心所謂昧於權利越次妄據外不量力內不知命自取喪滅者示其禍戒也故曰以無事取天下不可萌一毫有為之心天下大物曰神器非人力可覬覦也如文王三分天下有其二何嘗有為之之心堯之黃屋非心舜禹有天下而不與何嘗有執之之心聖人無為故無敗無執故無失事事物物莫不皆然一以無心處之况天下之大神明之祚其可以智力求哉吕氏曰聖人之有天下非取之也其治天下非為之也夫何故以其未嘗有心於為也所以能合天道之常理輔萬物之自然萬物歸之不得已而受之苟有心取而為之無乃用智尚力咈逆天理而失其自然之道乎神器者大寶之位天地神明之所主宰制萬有役使群動果不可為也若一己之私從事天下為物所拘認而有之動而不知其止涉乎憂患之域非惟喪其至理亦將失其真矣奚暇治天下哉人之一心天下衆妙皆歸焉所貴乎自然而已既為之則不能無為以人滅天以敬滅命道愈不可得也原其形體法天象地妙契陰陽乃神聖之器也黃帝南望而玄珠遺七竅鑿而混沌死是不可為也為之者欲其成故敗之執之者欲其得故失之倘若無為故無敗無執故無失其於道也至矣哉李氏曰無為則無事有為則有事執者失為者敗有為之戒也林氏曰天下神器豈人力所可得道盛德至天下歸之若萌取天下之心而強為善以求有得決不可得矣蓋言凡天下之事不可以有心求為者必敗執者必失是皆有心之纍也凡物或行或隨或詬或吹或強或羸或載或隳是以聖人去甚去奢去泰何氏曰物損於彼者盈於此成於此者虧於彼損盈成虧往來相接列子所謂螳蜋捕蟬不知黃雀在後亦是此意故物或行而前已有隨其後者或詬而暖已有吹之寒者或強而勝已有羸而弱之者或載而成已有隳而壞之者如相守然故曰影之守人也物之守物也况天下大於物而可以有心有為有執哉甚者過當道以弱為表以虛為實不為已甚故去甚奢者浮摩也道以本為精以物為粗奢則不遜故去奢泰者驕肆也道以深為根以約為紀而不以天下為泰故去泰此三者皆有作為之侈心去此三者聖人之心虛矣不以天下動其心矣李氏曰強羸載隳互相倚伏如影隨形才有成便有敗是以聖人去貪甚去奢侈去驕泰深戒後世蘇氏曰或行於前或隨於後或詬而暖或吹而寒或強而益或羸而損或載而成或隳而毁皆物之自然勢之不可免者也吳氏曰此承上文執者失之一句而言守天下之道有天下者豈能保天下之長為我有而不亡也哉蓋得失存亡之相襌如行隨詬吹強羸載隳八者相反而相因聖人知其勢之必至於此也而處之有其道焉几過盛則必衰惟不使過盛則可以不衰也甚奢泰三者盛之極也能不過盛則可以保天下矣道德真經集義卷之四
