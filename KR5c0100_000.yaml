body:
  text: 河上公河上丈人也吕氏名知常何氏名心山宇處尹李氏名道純號清庵劉氏名師立號真靜子倪氏名思號齊齊林氏名希逸號鬳齊蘇氏名轍宇子由董氏思靜朝氏迥柴氏元皋宇知白吳氏名澄號草廬
