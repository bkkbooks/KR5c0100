front:
  text: 道德眞經序覆四太上道德上下篇凡五千餘言内而葆鍊存養之道外而修齊治平之事無不備焉此所謂内聖外王之學也史氏列之申韓間世因稱之黄老刑名則與道家者流之所謂大殊不能無病焉蓋周衰王道浸微其垂世拯俗之意寓焉而非一本諸自修也而曹參蓋公以清靜無爲有驗於治其用之去經世之理不遠矣矧出世之教由是而大者焉或不求其端緒之奥一概訾以爲虚無怪誕之說是豈眞知道者哉古今注疏凡百餘家各持其見而必以辭理該貫者爲善荀理塞義晦辭雖工無取焉盱江道紀危大有端謹有志行間探索諸家擇其尤善者類編成集將募工鋟梓以傳其志亦勤矣使善味之者求之言外踐之身心則葆鍊存養之道内充而修齊治平之事亦外著矣道豈二哉因其請遂冒書於篇首歲昭陽作噩仲冬晦日嗣四十三代天師三洞弟子張宇初謹序太上道德經乃吾道經之祖也以無爲自然爲體以謙退慈儉爲用以致修齊治平之道靡不具焉葛玄眞人曰五千文實道德之源大無不包細無不入天人自然之經倪文節公曰老子五千文誠修身治國之要道濟時救世之良劑也由此而觀非特道經之祖也三教諸經亦豈外此而别有其理哉當今聖明在位特加崇尚復設道司以掌其教後之學者必諳通經義然後授以度牒奈何世俗凋弊讀亦未知况其義乎大有嘗於祝釐之暇將諸家注釋校之或異或同有得有失學者於此不能無惑於是將河上公及何心山等十餘家注解取其訓釋詳明理長意同而不牽强者集成一部上下二卷名曰道德經集義欲俾後之學者知一定之論而無異同之惑也若夫因義以明經因經以造道而樂乎無爲之業者豈無其人焉時洪武丁卯盱江道紀危大有焚香謹書集義姓氏
