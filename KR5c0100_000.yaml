  text: 河上公河上丈人也吕氏名知常何氏名心山宇處尹李氏名道純號清庵劉氏名師立號眞靜子倪氏名思號齊齋林氏名希逸號鬳齋蘇氏名轍宇子由董氏思靜晁氏迥柴氏元皋宇知白吴氏名澄號草廬
