body:
  text: 盱江危大有集第四十六章天下有道却走馬以糞天下無道戎馬生於郊吕氏曰夫時之泰也庶民昌四海治兵戈息民多務本户競田桑糞治田疇雖有良馬無所用之不謂之有道而何時之否也百事疲灾異生强暴相凌彼疆我界矣其守而爭奪之端起矣戎馬交馳集於戰地故陰陽自此閉塞品彙自此夭閼不謂之無道而何夫一身者一天下也南華經野馬也塵埃也是以馬而喻氣也揚子云氣也者適善惡之馬也蓋氣即道也道即氣也自一氣以生萬物氣之所生萬物柔弱而生氣之所去萬物堅强而死却者反也走者運也運其精氣泝流直上補其腦血糞其根本以養其身故曰天下有道却走馬以糞已之天下無道則忘本逐物心動意躁其息自奔上有重樓浩浩而出下有金龜續續而泄日以心鬬六賊生於郊境矣何氏曰天下植有道之君則不以兵强天下而以務農重穀為本故却善走之馬而惟糞治其田疇不舍內以事外傳曰糞除先人之弊廬糞除皆修治意無道之世戎馬生於郊駉駉牡馬在坰坰之野郊本言畜馬之地彼以是妨農業者則可戒也按吳氏澄所注本天下有道却走馬以糞下有車字言有道之世不相侵伐故善走之馬不以服戎車而退却賤用之以服糞車而糞田也諸家並無車字惟晦庵朱子語録有之張衛東京賦云却走馬以糞車是用老子全句吳氏本自有理學者不可不知也罪莫大於可欲咎莫大於欲得禍莫大於不知足故知足之足常足林氏曰戰爭之事皆自欲心之始欲心既萌何時而足惟得是務所以為罪為禍為咎也惟知足者以不足為足則常足矣此又發明前章知足不辱之意吳氏曰罪謂愆惡咎禍皆謂灾殃而禍重於咎得隴又望蜀此不知足也李氏曰曰罪曰咎曰禍皆欲心所致故結語云知足常足知足者貧亦樂第四十七章不出户知天下不窺牖見天道其出彌遠其知彌少何氏曰老子語文子曰精神發於內神氣動於天專言精神可以前知也李氏曰不出户知天下言有道之士知內不知外知內不知外則無所不知見內不見外則無所不見若只知外見外而忘其內者知見淺狹矣吳氏曰天下萬物萬事之理皆備於我故雖不出户而遍知之矣天道者萬理之一原內觀而得非如在外之有形者必窺牖而後見也不知其皆備於我者必出至一處而後知此一事故出彌遠而知彌少烏能不出户而知天下哉林氏曰天下雖大人情物理一而已矣雖不出户亦可知雖陰陽變化千古常然雖不窺牖亦可見若必出而求之則足迹所及所知能幾自力所及所見能幾用力愈勞其心愈昏故曰其出彌遠其知彌少是以聖人不行而知不見而明不為而成何氏曰知人不以忖度而以道知見天不以揣摩而以道見人即我也我即天也使必待出户窺牖則是捨心而外馳也精神不足知見奚足於道何有易曰無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此又曰惟神也故不疾而速不行而至此不行不見不為而能知能明能成自然之道也林氏曰不行而自至不求見而自明不為而自成聖人之道其為用如此易曰不疾而速不行而至即此義也吳氏曰不待行處而已如遍至其處故能悉知天下之事不待窺見此物而後能明其理故不窺牖而見天道也不為而成言上二句之效驗惟其不行而遍知萬事不窺而洞見一原故不待有所作為而事無不成完也第四十八章為學曰益為道日損損之又損以至於無為無為而無不為矣何氏曰千日學慧不如一日學道非學自學而道自道也學則開於知見積而後成道則忘其知見本來混成學所以求道博所以反約勤修無為悟真道成先益而損由有入無既損而損雖無亦無乃合道真此無為妙境也老子語文子曰所謂無為非謂迫之不應感之不動堅滯而不流謂其循理而舉事因時而立功任下責成舉過無事此乃無為而無不為之事李氏曰不出户知天下內知也其出彌遠外事也故次之以為學日益言為學者求其增益為道者事事减損易曰山下有澤損君子以懲忿窒欲正謂此也至於無忿可懲無欲可窒以至無為則萬民化而天下歸往矣吕氏曰至人損之又損是非俱泯寂然不動以至於無為守性之真體道之原與天地合德造化同功然後煉大梵祖氣飛肘後金精胎閉納息回風混合灌漱元泉此皆無為而無不為也倪氏曰為學日益學貴博也為道日損道貴約也先博而後約先益而後損不益則安所取約徒益而不損則博反惑矣是故學者道之筌蹄道者學之歸宿也孔子曰多學而識之學之益也一以貫之道之損也既損之又加之以損損之至也損之至則無所為矣雖無為則實無所不為此無為之所以貴若止於無為不能無所不為則涉於虛無非所謂道也取天下常以無事及其有事不足以取天下何氏曰無心於事無事於心雖天下之大吾何容心焉昔聖人之得天下此自然之道也如堯之黃屋非心舜禹有天下而不與此皆行乎其所無事若有事於天下是有心也經曰為者敗之天下神器不可為也為無為而天下治此也此古人不以天下易此道而每言取天下之戒者深戒不知道者將以天下為足貴於道也豈知無為無事自然之道哉林氏曰取天下必以無心有心者反失之三代之得天下何容心哉因當時戰爭之俗借以為喻其言亦足以戒無事有事即無心有心也吳氏曰無事者無所事即無為也因言取天下者亦止是無為蓋德盛而天下自歸之也若必用志用力而有作為之事則何足取天下哉李氏曰苟或妄有作為則民亂而難治故曰不足以取天下第四十九章聖人無常心以百姓心為心吕氏曰天本無心於物因物見天之心是以虛而能受靜而能應如鑑對形以彼妍醜如谷應聲以彼巨細初無他心何常心之有苟卿曰天下無二道聖人無兩心是以譬諸己焉淵默寂淡能應能定不將不迎和其光同其塵大齊物我而未嘗異於物故曰聖人無常心以百姓心為心李氏曰上章云無事取天下故次之以聖人無常心所謂無常心者隨機應變不逆民物之情故百姓遵聖人之言行聖人之行從聖人之化天下同一心也何氏曰聖人心若太虛何常之有其常心者天下之心而已政和注聖人之心虛而能受靜而能應如鏡對影以彼妍醜如谷應聲以彼巨細何常之有善者吾善之不善者吾亦善之德善信者吾信之不信者吾亦信之德信吕氏曰夫善否相非誕信相譏善與不善信與不信世俗之情自為同異耳故有好善之心者聖人不違其性輔之以上善使必成其善苟有不善者亦因以善待之善不善在彼而吾所以善之者未嘗渝也百行無非善而天下莫不服其化德之厚矣故有好信之誠者聖人不奪其志輔之以大信使必成其信茍有不誠之心者亦因以信待之而吾所以信之者未嘗變也萬情無非信而百姓確然無不信德之至矣夫至人者是非一致真僞兩忘美亦善之惡亦善之常善救物而無棄物可亦信之否亦信之常善救人而無棄人是也何氏曰大凡善者吾善之不善者未必善信者吾信之不信者未必信此常人之心也未是德善德信事也聖人德與天地參天地無私覆載日月容光必照聖心渾乎以物我為一也故能善人之不善信人所不信彼善否相非誕信相譏而吾一以自然之道待之書曰簡厥修亦簡其或不修進厥良以率其或不良何善何否語曰不逆詐不億不信何信何誕有孚顒若下觀而化此也莊子其好之也一其弗好之也一其一也一其不一也一其一與天為徒其不一與人為徒此也林氏曰善不善在彼而我常以善待之初無分别之心子曰苟志於仁矣無惡也與此同信不信在彼而我常以信待之初無疑間之心子曰不億不信亦此意也其曰吾亦善之吾亦信之者非以其不善為善不信為信也但應之以無心耳聖人之在天下惵惵為天下渾其心百姓皆注其耳目聖人皆孩之吕氏曰聖人體道合變毋意毋必毋固毋我旁礴萬物渾其心而同其塵順其性而同其化未始自為取舍天下一心渾渾然無所分别無善無惡無信無僞真一不二待之以道故曰聖人之在天下惵惵為天下渾其心林氏曰惵惵者不自安之意聖人無自矜自足之心故常有不自安之意渾其心者渾然而不露圭角此心渾然所以無善不善信不信之分也注其耳目者人皆注其視聽於聖人而聖人皆以嬰兒待之故曰皆孩之此無棄人之意也第五十章出生入死吕氏曰道生一氣氣變而有形形變而有生生者氣之聚萬物之出於機者也生變而有死死者氣之散萬物之入於機者也有形則復於無形有生則復於無生物有死生性無加損蓋生者造物之所始死者陰陽之所變此乃有卒未離乎域中者也離乎域中者其出不欣其入不詎出生入死出死入生無可無不可修鍊之士以清陽而無質者為生氣以濁陰而凝滓者為死氣人者禀沖和之氣非濁非清而生也入清陽而出陰濁陽純則為上仙入陰滓而出清陽陰純則為下鬼若乃服六氣餐元精吸沆瀣皆天氣感化無形無質故能通神明而壽齊二景此之謂出死入生世之人食穀實嗜五味有形有質盜其真氣散其清陽入其陰滓此之謂出生入死吳氏曰出則生入則死出謂自無而見於有入謂自有而歸於無莊子萬物皆出於機入於機又曰其出不欣其入不詎又曰有乎出有乎入皆以出為生入為死林氏曰出生入死此四字一章之綱領也出則為生入則為死出則超然而脫離之也入則迷而自汩沒也能入而出者惟有道者則然生之徒十有三死之徒十有三人之生動之死地亦十有三夫何故以其生生之厚吕氏曰陰陽不離於大道造化不離於五行和合有無而成天地出機而生入機而死順道者寡違道者衆故養生者不妄視不妄聽不妄談不妄履動靜恬然以自滋育者生之徒也趨死者目亂采色耳聽淫聲口美非道足涉邪徑動靜沒溺以自戕賊者死之徒也且生死之道既分為二又知作而不知休知言而不知默知思而不知忘知進而不知退以及於盡則所謂動之死地生死之道以十有三言之三者各居其三而不生不死之道在於虛一而已所以不言者欲其自悟也原其十有三之說前後解者雖多終無定論然其稍可取者一二家而已古仙有云陽裏十三言有象陰中六七覓無踪此指水火之成數也天一生水地六成之地二生火天七成之七與六者乃心腎水火坎離人之根本也精神寓之心藏神腎藏精凡聖日用應酬之際無所不用其精神也黃庭經一身精神不可失精神居身生之徒也精神去身死之徒也蓋水火能活人能殺人豈非生死之徒乎赤蛇才動靈龜逐行應速於谷發疾於機豈非動之死地乎故曰生之徒十有三死之徒十有三人之生動之死地亦十有三列子指髑髏而言之曰此過樂乎此過養乎夫暖衣燠室㫖酒膏粱服食金石彼以養之之厚而反傷其生未若灰心息慮薄滋味養谷神雖若輕生可以長生也李氏曰水成數六火成數七柔弱生之徒强大死之徒柔弱者則能懲忿窒欲强大者為忿欲所使能懲忿則火降窒欲則水升水火既濟則生故曰生之徒起忿則無明火熾縱欲則苦海波翻水火相違則死故曰死之徒人之生皆賴水火動之死地水火相違以丹道言之水火既濟則聖胎凝矣林氏曰養之得其道則可以長生久視養之不得其道則與萬物同盡徒者言其類也動之死地動非動靜之動乃動輟之動也之往也死地死所也夫何故發問之辭也生者我所以生也生生者我所以養其生也養其生而過於厚所以動即趨於死地也此即外身而身存無而後能有虛而後能盈之意也何氏曰生死之徒各十有三諸家頗各有見皆不過牽合十有三之數而已要知上壽百歲中壽下壽有差與富康寧皆福也此生之徒凶短折疾憂貧弱皆極也此死之徒未說及德與惡而前之二者各受命於天誰能齊之未是患處若愚不肖貪生失理自作不靜以速其死者不但為死徒且趨死地患在人耳死地謂動於惡而不好德者泛論世人如前三者十分中各有其三不必如前人牽合數目但死之徒已十有三而之死地又十有三死之分數十居其六生之徒數僅有三可畏哉若攝生避死德人十有其一乎莊子云人之生也氣之聚也聚而為生散而為死若死生為徒吾又何患是則所患者在死地而不在死徒可見也吳氏曰之猶適也趨也生生求以生其生也厚謂用心太重或仙術延生而失宜或煉藥衛生而過劑其意正欲趨生而返趨於死地者為其求生之心太重而不順乎自然也蓋聞善攝生者陸行不遇兕虎入軍不被甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地也林氏曰言我蓋聞古之善養生者雖陸行於深山而不遇兕虎入於軍旅之中而不被甲兵惟其無心則物不能傷之兕所以不能觸虎所以不能害兵所以不能傷惟其無心故也莊子入水不溺入火不焚亦是此意夫何故又發一問言物之所以不能傷者以我能虛能無而無所謂死地也吳氏曰攝猶攝政攝管之攝謂不認生為己有若暫焉管攝之也以虛靜為裏以柔弱為表塊然如木石之無知侗然若嬰兒之無欲雖遇猛獸惡人亦不能為害也蓋其查滓消融神氣淡泊如風如影莫可執捉無可死之質縱有傷害之者何從而傷害之哉李氏曰無死地者忘其死生也何氏曰虎兕者以獸之猛者言之兕野牛也重千斤一角第五十一章道生之德畜之物形之勢成之是以萬物莫不尊道而貴德夫道之尊德之貴夫莫之命而常自然何氏曰天覆以道而萬物生物物受氣於天也地載以物而萬物畜物物受質於地也故萬物生者自形自色非待物物而雕琢之陰陽相照四時相代相生相殺其勢因成孰能禦之夫形有時而弊勢有時而傾惟道德在天地高厚悠久不壞不滅易曰乾以君之坤以藏之故道為至尊其獨無對德為至貴其高無上物雖有萬之不齊孰能如此蓋道德超然物勢之上而行乎形氣之內而無物不有無時不然盈天地之間皆蒙衣被本本元元之所共推非由於諄諄之命非有假於人為之力其生之畜之一自然也可尊可貴亦一自然也然生畜形成次第雖有道德物勢之分合而言之一道而已林氏曰道自然也無也凡物皆徇無而生故曰道生之德則有迹矣故曰畜之畜者有也物則有形矣故曰物形之勢則有對矣故曰勢成之陰陽之相偶四時之相因皆勢也莫知命者猶曰莫之為而為也非有所使然則為常自然矣尊貴者言其超出乎萬物之上也李氏曰道本無形因生育天地而形可見遣本無名因長養萬物而名始立一切有相受命于天成形于地禀氣中和皆道之蔭也故萬物莫不尊道而貴德故道生之畜之長之育之成之熟之養之覆之生而不有為而不恃長而不宰是謂玄德何氏曰莊子道者萬物所共由庶物失之者死得之者生故道生之畜之有如春道長之育之有如夏道成之熟之有如秋道養之覆之有如冬道庚桑子春氣發而百草生正得秋而萬寶成豈無得而然哉大道已行矣此也此道何道也虛無自然之道能生出萬物於始又能牧藏萬物於終乾坤動靜不翕聚則不能發散庚桑子即春生秋成而見大道老子以發生致覆藏為一道易曰顯諸仁藏諸用是矣天地無心也雖生全不傷亦不名有雖施為不辭亦不恃功雖長養不窮亦不為主四時之運功成者退太虛冥冥誰能强名玄德天德也道也林氏曰長之育之成之熟之養之覆之皆言既生既有之後其在天地之間生生不窮皆造化之力也然造化不有之以為有不恃之以為功雖為之長而無主宰之心此所以為玄妙之德玄德即造化也第五十二章天下有始以為天下母既知其母以知其子既知其子復守其母沒身不殆吕氏曰列子有太易有太初有太始有太素太易者未見氣也太初者氣之始也原夫道者未始有始也外包乾坤內充宇宙無形無名萬物之所以資始也及其有名則物得以資生焉有物混成先天地生故為天下始生育天地長養萬物故為天下母而萬物所以成也譬夫一身之天下始因三元育德九氣結形自非三元所育九氣所導莫能生也則為一身之始母焉故曰天下有始以為天下母既得其氣以為百骸之母當知其子子神也既以子為元神母為元氣母在則子存母去則子泣以其氣能生神而神能服氣也丹經謂之君臣亦云母子古之真人云子母乍逢情眷戀君臣相會喜團欒蓋形中子母氣以守神神以守氣交相戀守混融為一結就胎仙與天相畢故曰既得其母復知其子既知其子復守其母沒身不殆林氏曰天下有始以為母即有名萬物之母也母造化也子萬物也知有造化而復知有萬物知有萬物又當知有造化蓋言無能生有有出於無知有者不可以不知無常無欲以觀其妙常有欲以觀其徼亦是此意沒身不殆者言如此則終身無危殆之事也董思靖曰人受氣以生氣為母神寓於氣故為子守母則氣專神安何氏曰經曰無名天地之始有名萬物之母即此章始與母之㫖太始有無而已自無適有者為母如道生一是也自有適有者為子一生二二生三三生萬物是也塞其兊閉其門終身不勤開其兊濟其事終身不救吕氏曰夫乾坤者易之門户開闔有常衆卦從而出焉生化之機準的不差而兊者悅也散也蓋耳目諸根色塵之所由若塞愛悅之視聽則禍福之門閉矣自然而身不勤勞也倘開其愛悅之門而弗塞則嗜欲之情長矣終身危亡不可救也以己論之兊者口也門者目也常緘其口則五氣內固元精不乾常瞑其目則內境不出外境不入寂然泰定與道為一矣參同契曰耳目己之寶閉固勿發揚兊口勿以談希之順以洪此所謂塞其兊閉其門終身不勤若乃開其喜悅之門而勿塞濟其愛欲之事而弗閉物誘於外情動於中氣亡液漏精神散去其神夭閼而莫之能救故曰開其兊濟其事終身不救林氏曰兊者口也人身則有口人家則有門皆以喻萬物所自出之地塞其兊閉其門藏有於無而不露也不勤不勞而成功也開其兊出而用之也濟其事用之而求益也濟益也如此則危殆不可救也何氏曰門古注指口亦不拘此但有出有入者總謂之門閉其門者冥心大道也外想不入內想不出莊子其心以為不然者天門弗開是也蓋塞兊閉門入無滅有於子知母乃返吾初終其身而用之不勤矣若開兊濟事則一念一動迷惑本來毁無失有如母誕子托相萬狀子壯母衰轉輪無已終其身而難救李氏曰塞兊閉門內境不出外境不入終身不勤不勞而治也開其兊濟其事內境出外境入終身不救永失真道見小曰明守柔曰强用其光復歸其明無遺身殃是謂襲常林氏曰所見者大能斂而小則為至明所主者剛能退而守柔則為至强即不自見故明不自矜故長光者明之用明者光之體用其光而歸之於明則無殃咎矣知用而不知藏則遺殃之道也襲者藏也常者不易也襲常者言藏其用而不窮也何氏曰凡能大不能小能强不能弱能明不能晦則棄本徇末子復生子流落忘返其如母何是則自遺其殃矣蓋始者常無之道母者常有之道自無生有自有返無此大常不變之道也又曰用光歸明聖人光而不耀也察見淵魚者不祥吕氏曰水鏡之照物謂之光其光之體謂之明用其照外之光回光照內復反而歸藏於其內體之明也夫神太用則竭照見淵魚者不祥此用光於外而遣其身殃者能含光以混世則不為身殃矣是謂能掩藏其常光之用以復歸常明之體故曰襲常第五十三章使我介然有知行於大道惟施是畏吳氏曰我者泛言衆人非老子自謂也介音戛孟子介然用之而成路同謂倐然之頃也知字句絶施如論語無施勞孟子施施從外來之施矜夸張大也聖門顔子有若無實若虛無施勞老子之用蓋亦若此誇張最其所忌此章言不知道之人惟務誇張若使其人倐然之頃有所知而欲行大道則必專以施為畏而不敢為也李氏曰惟施是畏識法者恐柴氏曰大道之外行者皆可畏大道甚夷而民好徑吳氏曰徑小路也與大道相反卑卑欲退者大道也其道甚平夷而易行堂堂誇張者小徑也而人多好行之吕氏曰大道亨衢也平易坦然何往不通雖千萬里之遙其行必始於足下聖人患其太直躊躇興事豈貴其速達而要其近功哉世人利於速達故由捷徑然崎嶇迷惑不知所趣倒行逆施去道愈遠無由上達也煉養之道夷然如砥甚易知易行一曲之士滯於方隅欲其速得遊於傍門陷於邪徑而不知也故曰大道甚夷而民好徑何氏曰大道平夷本若大路然而捨之入邪徑則迷之甚矣朝甚除田甚蕪倉甚虛服文采帶利劍厭飲食資財有餘是謂盜誇非道哉吳氏曰此言誇張之事有廷內而弗灑弗掃者唐風之儉嗇朝甚除治則其宫室之奢靡可知矣田甚蕪倉甚虛謂奪其民時而民不得耕耨竭其民力而民無所蓍積也華其佩服以為飾豐其酒肉以為養私其府庫以為富是猶為盜之人得物之多以誇張於外者爾夏季商辛是也豈知道者所肯為哉林氏曰大道甚平人之求道不知適正好行邪徑之路譬如有國家者治其朝廷則甚整為宫室臺榭之類也朝廷雖美而田畝皆蕪倉廪皆虛而且以文彩為服佩帶利劍厭足飲食積其資財務為富强此如盜賊之人自誇其能是豈可久此譬喻之語也言人不知大道而自矜聰明自誇聞見此好徑之徒也豈知至道故曰非道哉何氏曰朝甚除此除者修治也傳曰糞除先人之弊廬又云除道皆修治意第五十四章善建者不拔善抱者不脫子孫以祭祀不輟吕氏曰善以道建國者獨立萬物之上終古不易翱翔萬物之表終古不極以是道而立身以是道而建天下守之以中體之以常鎮之以無名之朴而不為物之遷變福及後世其德彌廣其用彌大不可動搖也若夫根拔則氣竭青去木矣氣敗則精竭神明去身矣是以至人固蒂深根獨立廣漠之野無何有之鄉綿綿冥冥屹立不可拔善以道抱民者乘天地之正御六氣之辨天下之士定於一心百姓歸附矣修一己則抱元守一神全精反回風混合於丹田永無脫離矣故曰善抱者不脫夫善建善抱者豈惟不拔不脫乎亦將德澤流于上下孝慈被于子孫世祚綿遠傳之無窮豈不美哉何氏曰莊子名為建德之國其民愚而朴故善言建者無加於德則人亦與立而不拔去之矣經曰抱一為天下式故善於言抱者無出於一則人亦不離心而脫去之矣豈惟在其身將子孫亦嘉賴之承祀悠遠以道觀者故不私為子孫計而立教垂世非專為山谷枯槁者言所謂大德必得其祿位名壽而宗廟享之子孫保之是也林氏曰建者無不拔抱者無不脫建德而抱朴則不拔不脫矣有子孫之家祭祀必不輟道生一一生二二生三三生萬物萬物生而不窮亦猶子孫嗣其家者也此三句皆是比喻以言道雖有無而實長存也修之身其德乃真修之家其德乃餘修之鄉其德乃長修之國其德乃豐修之天下其德乃普吕氏曰修身之道舉措施設酬酢應變未嘗不自我而超煉氣養神少私寡欲諸僞咸盡乃為真人矣修之於家則父慈子孝兄友弟恭九族和睦積善有餘慶流來世矣修之於鄉則尊奉耆老教誨愚鄙上下信向其德久長矣修之於國則百官稱職禍亂不生萬寶豐熟物充實矣修之於天下則不教而治不言而化和於大通比屋可封德施周普矣夫修之家鄉國天下上言其德乃餘乃長乃豐乃普惟修之身言其德乃真者莊子所謂道之真以治身其緒餘土苴以治天下本在身末在彼其理備矣林氏曰修諸身則實而無僞修諸家則積而有餘慶修之鄉則一鄉之所尊修諸國則其及人愈盛修之天下則及人者愈遍吳氏曰道之真以治身其緒餘以治人家者一身之外九族之內鄉者一家之外鄉遂之內國者鄉遂之外邦畿之內天下者邦畿之外四海之內修之於家鄉國天下者言自近及遠人人各修其德也然豈是人人教之使然我無為而民自化爾何氏曰內而身與家以此道修之則真積力久且有餘矣外而鄉國天下以此道修之則源深流長且豐且普矣故以身觀身以家觀家以鄉觀鄉以國觀國以天下觀天下吾何以知天下之然哉以此林氏曰即吾一身而可以觀他人之身即吾一家而可以觀他人之家即吾一鄉而可以觀他人之鄉推之於國於天下皆然言道之所用皆同也以此者道也以道而觀則天下無不然李氏曰以之修身觀心察性心定則身之修也以之治國觀民察己民化則國之治也天下有一不善則是自己政化不善也書曰百姓有過在豫一人此之謂也反觀諸己心有一塵染著則是我之性天不明也董氏曰觀之之道其則不遠豈假他求哉蓋物分雖殊一本而已以此觀之莫不然者此意當契於語言之外道德真經集義卷之七
