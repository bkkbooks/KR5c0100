body:
  text: 盱江危大有集第八章上善若水水善利萬物而不爭處衆人之所惡故幾於道林氏曰此章又以水喻無容心之意上善者至善也謂世間至善之理與水一同水之為善能利萬物而何嘗自以為能順流而不逆不爭也就卑就濕不以人之所惡為惡也以此觀水則近道矣幾近也吳氏曰上善至極之善有道者之善其若水者何也蓋水之善以其灌溉浣濯有利物之功而不爭處高潔乃處衆人所惡卑污之地故幾於有道之善幾近也吕氏曰得天一之妙體道一之端全上善之功者莫過於水水者方圓凝釋俱協其宜是以聖人研其道法其善應變隨時如水之性或剛或柔或方或圓無可無不可故曰上善若水至人由一以貫道即道以會一故以水喻心以心造道且參同契言一者道樞知白守黑彭真人所解皆為一也蓋金液玉液為金丹之道樞灌溉五臟滋溢三田漱咽則順下斡旋則泝流黃庭經言漱咽靈液灾不干夫氣中有真一之水水中有真一之氣是以華池為上善之利源也居善地心善淵與善仁言善信政善治事善能動善時何氏曰首句上善若水非徒以水為善甚欲人皆似之與水相似俱備此善之上也若水者若道也故人之善居若水之於地水得地而流地得水而柔豈有挾其所居乎人之善心若水之於淵人無鑒於流水鑒於止水豈有失其本心乎人之善與若水之於仁則酌彼注兹豈肯以人從欲乎人之善言若水之善信則如潮之有時豈得自食其言乎人之善政若水之於治則如手中準豈復高下其手乎人之善事若水之於能則能方能圓豈不達權盡變乎人之於動若水之於時則時止時行豈不應機任運乎李氏曰居善地利物也心善淵容物也與善仁生物也言善信應物也政善治化物也事善能成物也動善時順物也夫惟不爭故無尤林氏曰上七句之善皆言有道之士其善如此而不自以為能故於天下無所爭亦無尤怨之者此即汝惟不爭天下莫與汝爭能解者多以此為水之小善七故其說多牽强非老子本㫖何氏曰兼其數善又始此不爭終此不爭善之善者也誰能似之故無尤夫不善故有尤既善矣而不免於爭則亦有尤有善且無爭又何尤為此若水之為善而與道相似者歟李氏曰水取柔和之義處下之義也利物無爭故無尤吳氏曰夫惟有道者之上善不爭處上而甘處下故人無尤之者尤謂怨咎故欲上人者不免有爭心有爭則有尤矣第九章持而盈之不如其已揣而鋭之不可長保林氏曰此章只言進不如退故以持盈揣鋭為喻器之盈者必溢持之則難也不如不盈之易持耳已者勿盈之意也揣治也鋭銛也治器至於極銛極鋭無有不折不如不鋭者可以長保吳氏曰持捧之也已止也此章謂道不欲盈盈則易至於溢也不如已之而不使盈也鋒者不可以鋭鋭者則易至於銼而不可長保其鋭矣盈之則不可長保其盈亦由是也劉氏曰盈則必虛戒之在滿鋭則必鈍戒之在進金玉滿堂莫之能守富貴而驕自遺其咎功成名遂身退天之道林氏曰富貴而至於金玉滿堂必不能長保居王公之位而至於驕盈必遺其咎故欲全其功保其名者必知早退乃為夭道功成名遂是隨其大小而能自全者故曰成曰遂若不知自足則何時為成耶何時為遂耶此四字須扔細看吳氏曰世有金玉滿堂而不能守者何哉蓋因富貴而驕自壝其咎耳是以功成名遂身退乃合天之道此言不可盈之也金玉滿堂謂富驕謂盈之者自遺由己所致非由乎人功成名遂謂貴身退謂不盈之者天之道虛而不盈故四時之序成功者去李氏曰功成名遂身退戒盈勸謙之義吕氏曰易曰知進退存亡而不失其正者其惟聖人乎陸希聲曰持大器而滿盈雖懼之不如早止居大位而亢極雖憂之不如早退至於從赤松之遊泛扁舟而去亦明於持盈之義也劉氏曰金玉必纍戒之在貪富貴必淫戒之在傲功成名遂必危戒之在不知止老子之言深欲救人非謂絶人事處山林者可以入道雖居富貴功名之域皆可勤而行之第十章載營魄抱一能無離乎專氣致柔能嬰兒乎何氏曰抱一無離子能守一一亦守子也專氣致柔能嬰兒經曰含德之厚比於赤子骨弱筋柔而握固專氣者純氣之守也致柔至和不遷也此大人者不失其赤子之心也林氏曰載猶車載物也嬰兒未有見聞則其氣專致者極也柔者順也能如嬰兒專氣致柔則能抱一矣故曰專氣致柔能嬰兒乎此老子設問語也蓋曰人能如此乎此下數句皆然吕氏曰魂强者生之徒魄壯者死之徒蓋魂者屬於陽而喜於清虛魄者屬於陰而好營擾蓋魄者陽之賊也且魄之為物喜人耽於聲色尚於浮華迷於昏寐馳騁遊走耗人精氣使人趍於死地形謝之後得以享其祭祀也是以聖人以神御氣以形制魄法地之用安靜厚載鎮以不動陰魄雖欲營營動我念慮其可得乎故曰載營魄原其載之之法則抱一無離之耳抱一者如鑒之含明明豈離於鑒乎猶恐載之不至故雖純一而不雜靜一而不變是謂不二乃能神全而不虧精用而不竭未嘗須臾離也故曰抱一能無離乎且神不治則氣亂神治則氣不妄作矣至人善於調御專於精誠乳之以虛息之以踵純粹柔弱其養氣如靈龜其養神也如嬰兒嬰兒含德之厚居不知所為行不知所之故曰專氣致柔能嬰兒乎李氏曰載營魄猶車載物之喻魄好運動好馳騁好剛鋭故曰營魄魄屬陰陰盛則害陽情盛則役性能制伏者抱一無離致柔無疵無為為雌無知使陰魄不能肆其情至於魄伏陰消則神靈性寂矣不用拘束自然不動如獲寶滿載而歸自抱一以下純是載營魄之義滌除玄鑒能無疵乎何氏曰關尹子知心無物則知物無物知物無物則知道無物故不敬玄妙之言心恩玄妙者神愈傷此言濯去玄覽除心之瑕乃無疵也吕氏曰外不為魄所蕩內不為氣所使涓滌思慮絶棄情欲是謂玄覽夫玄覽者觀其妙而非目之所見除至真之外一切屏去表裏虛徹空洞自然靈府湛寂始能玄覽既能玄覽為玄覽礙玄覽亦除則無疵矣李氏曰不見不聞塵净鑒明董氏曰夫玄妙之見不除是為解縛滌除之迹猶存是為覺礙無疵則法愛忘而能雙泯矣愛國治民能無為乎何氏曰黃帝書富國安民者鍊氣之法也聖人以身為國以心為君精氣為民民安國泰民散國虛心無為則氣和氣和則萬寶結心有為則氣亂氣亂則英華散矣吕氏曰至人治身亦猶治國愛其民所以安其國愛其氣所以保其身善愛身者以心為君以血為臣以氣為民一其性養其氣使充塞百關珍之調之使其自然又何為之有治國治身義均一體李氏曰不動不搖道泰時清天門開闔能無雌乎何氏曰莊子有乎出有乎入入出而無見其形是謂天門又曰其心以為不然者天門弗開矣此言天門即玄門也一闔一闢之變守靜守柔乃守雌也林氏曰天門者天地間自然之理也倪氏曰天門者乾也易謂之户有開必有闔開闔相為用者也能無雌諸家皆作能為雌然以上文例之曰能無雌乎是不欲其有疵也曰能無為乎是不欲其有為也今曰能無雌是不欲其有雌也老子以柔為上宜欲雌者而曰無雌蓋一於雌而無雄是能闔而不能開也非天門也故發無雌之義欲以陽濟陰也諸本皆曰能為雌獨倪氏曰能無雌然以上下文觀之不若無雌文意為順或云雌靜而不滯於靜乃無雌也又曰無雌乃無陰邪以間之也亦通明白四達能無知乎何氏曰明白四達覺也照也能若無知則覺而不照見而常寂所謂無知乃真知也吕氏曰性夭朗徹光被四表洞燭八荒實而若虛有而若無智周萬物而返智於愚明並三光而歸於昧使人曰用而不知故曰明白四達能無知林氏曰明白四達無所不通而以無知為知則能抱一矣李氏曰出聰屏智和光同塵生之畜之生而不有為而不恃長而不宰是謂玄德何氏曰為物不二則其生物不測聖人身擬夭地愛養萬物生者道畜者德雖生與不生同雖為與不為同雖為器長與不長同虛之至靜之極也玄天德也寧復有之恃之宰之以纍其通玄之妙德乎李氏曰生之畜之不有不恃不宰者忘其所自也吳氏曰生之者雖有所生而實無心以生之故曰不有畜之者雖有所為而實無心於為之故曰不恃如為官長者雖宰夫民而實無心於長之故曰不宰此所以為玄妙不可測之德也林氏曰生之畜之言造化之間生養萬物也造化何嘗恃之以為有何嘗恃之以為能雖為萬物之長而何嘗有宰制萬物之心如此而後謂之玄妙之德此章之意大抵主於無為而為自然而然第十一章三十輻共一轂當其無有車之用埏埴以為器當其無有器之用鑿户牖以為室當其無有室之用故有之以為利無之以為用李氏曰以輻輳轂利車之用即總萬法歸心全神之妙也輻不輳轂何以名車法不歸心無以通神轂虛其中車所以運行心虛其中神所以通變故虛為實利實為虛用虛實相通去來無礙即上章載營魄之義也至於無物可載輻轂兩忘車復無也猶心法雙忘神歸虛也器與室並同此義吳氏曰輻輪之轑也轂輪之心也無空虛之處也埏和土也埴土之粘膩者有此車此器此室皆所以為天下之利也故曰有之以為利車器室皆以中虛為用故曰無之以為用人之實腹有氣所以存身所謂為利也虛心無物所以生氣所謂為用也故取此二物為喻也林氏曰三者皆是譬喻虛者之為用車器室皆實有之利也而其所以為車為器為室皆虛中之用也以此形容一無字可謂奇筆吕氏曰車以虛而運行器以虛而容物室以虛而四達引此三者詳言之貴乎以物喻己存無守有焉故有則存乎器無則存乎道至人假有為之體鍊無為之神非有則無以施其利非無則無以致其用以形為存生之利以虛為致神之用有為則利於物無為則利於用何氏曰有不能用有者形也以無而用有者神也轂以一孔之虛而運三十輻之衆豈以車為車蓋以車之無處而用車也陶為壞如未冶則敗速器固以埏成苟不虛其中物於何受豈以器為器蓋以器之無處而用器也宫室雖美塞以墻壁將焉用此升堂必自户牖豈以室為室蓋以室之無處而用室也身也物也猶車器室皆形質之具也道也心也猶轂牖等有神明之妙焉易曰形而上者謂之道形而下者謂之器不但先道而後器無形而有形而一器之中自具一道所以運斯器者人見其器之實有吾見其道之妙無則沖用虛通之中有不器於器者矣第十二章五色令人目盲五音令人耳聾五味令人口爽馳騁田獵令人心發狂難得之貨令人行妨李氏曰發上章虛用虛其用則不為聲色眩故次之以五色令人目盲色聲味物皆是根塵一切世人皆受其盜惟有道者不受他瞞視聽言動非禮勿為則六賊化為六通矣林氏曰目盲謂惑視也耳聾惑聽也口爽失正味也心發狂不定也行妨謂妨害德行也此五者皆務外而失內也吕氏曰視色聽音嘗味皆為性真之纍方嬰兒之未孩敦為聲色孰為滋味及其情一開方知有青黑之色錦繡之麗隨物奔競不能徹視無色之色與盲何殊徹視者非謂外視於物見獨而已惟至人審其目者乃太乙之日月能於空寂之中收視返矚神光瑩徹冥冥之中獨見曉焉又豈為五色之盲乎五音者何宫啇角徵羽耳鄭衛鏗鏘使人耽樂蕩其真性損其靈聰不能返聽無聲之聲與聾何殊返聽者非謂外聆於彼獨聞和焉而已惟聖人察其耳者乃帝君之聽門能於大定之中徐以氣聽則天籟自鳴天樂自響或如金玉之聲或如琴瑟之韵一聞是音故外雖大風振海疾雷破山皆不聞也又豈為五音之所聾乎五味者何辛醎甘苦酸耳烹麟庖鳳食前方丈窮奢極侈使人舌端耽嗜無厭濁神穢真不能內嘗無味之味與爽何殊也爽者亡也內嘗者非謂嗜彼外味自嘗而已矣惟至人知其口者乃絳宫之朱淵是以餐沆瀣茹玉英飲金液吸瓊醴以灌溉其靈根也故曰淡然無味天人糧子丹進饌肴正黃乃曰琅膏及玉霜豈膏粱異味所能奪乎夫畋獵國之常經春搜夏苗秋獮冬狩不失其時矣若夫極流連之樂成荒亡之行晝夕不息烏得不汨僞其真乎至人內心恬淡不動絶其聲利之弊不恣其性不伐其仁太乙澄靜狂蕩奚自而發乎噫照乘之珠連城之璧世之所珍人之所重苟貪求之不厭過逾其分一念之失則一己之行悉泯然而默虧矣至人視萬物為蟬翼睹嵩嶽為贅疣不汨於嗜欲以道自沖雖有難得之貨又安能妨其行乎何氏曰莊子五色亂目使目不明五音亂耳使耳不聰五味濁口使口癘爽趍舍滑心使性飛揚意與此章同昔有好畋獵者自謂此樂令人忘死豈非狂心之發有清旦適市攫金者捕者問之則曰取金之時徒見金不見人此非妨行之貨此章言令字與莊子言使字皆物重而志反輕誘深而得反淺不知不覺被他役去莫知主宰人不知道以至於此爽字訓差乃失也非爽快之爽朝氏曰人能不耽耳目之娛縱口腹之美勿問有得决定無失是以聖人為腹不為目故去彼取此李氏曰為腹不為目者內境不出外境不入收視返聽林氏曰腹內也目外也聖人務內而不務外故曰去彼取此彼上五者此道也吕氏曰坤為腹以載物離為目以外視腹者有容於內受物以養其實道氣沖滿故內全其精神也目者有見於外著於諸色亂其真宅也故聖人治其內不治其外求諸己而不求諸人也收視返聽復命還原去彼為目之神取此為腹之精故曰去彼取此何氏曰快其情者疲其神飾其外者傷其內故為腹則惟內而精神專一為目則外而目見心動物能引而去之者衆矣忘於目則光溢無極實其腹則中有所主取此者道也去彼者物也第十三章寵辱若驚貴大患若身吕氏曰寵辱者得失之常理幼身者性真之大患寵則繼以辱辱則生於寵夫美爵厚祿錦衣玉食固足以為寵然其來則喜其去則悲而辱亦多矣豈不驚乎故曰寵辱若驚身本無貴所可貴者性與命爾人本無恚所可患者得與失爾故人之生也愆於寒暑涉於是非拘於怵迫難於進退苟惟患得失於外物亦猶一身遺患於性真故曰貴大患若身吳氏曰貴猶重也貨財之富人以為大利反觀之則大患也故知道者不貴而貴之者於此而身焉身謂不能外之而以之自纍也何謂寵辱若驚寵為下得之若驚失之若驚是謂寵辱若驚吕氏曰且寵辱奚也豈非親權操柄折節汗顔善其言辭承暇俟便覬其提撕揄揚神交氣合哺糟啜醨言聽計從謂之寵乎既受其寵是處其執事之列唯恐其不寵也安得不為之下故曰寵辱若驚寵為下然寵者辱之本福者禍之因其寵之臨也高車駟馬峻宇雕墻佩玉鳴珂位躋極品澤及後昆無施不可既得之矣悅然若驚其辱之至也一旦恩弛幸衰浸潤之譖行焉朝吹噓而暮沙汰深責厚罰禍不旋踵遽失矣凛然若驚是以一寵一辱如影隨形俱可驚也惟聖人則不為形役視寵為辱逃名棄世全身遠害齊毁譽一死生不營營於外不擾擾於內不為軒冕肆志不為窮約趍俗回視寵辱得失豈能驚乎何氏曰何謂寵辱寵為下言名起謗隨是名為下官高身危是官為下寵即為下得乃為失言不待辱而知其為下也林氏曰此即患得患失之意也何謂貴大患若身吾所以有大患者為吾有身及吾無身吾有何患吕氏曰世之所貴乎大患若身者以謂人之生也天地同根萬物資其養小人則殉利士則殉名權勢雖殊為有身則一爾世謂無其身則無患是失老子之㫖矣烏知至人所謂有身之大患者非謂忘形喪軀入於頑空也謂其逐物認己不體於道故也是以心如死灰形如枯木雖貴不辱雖辱無患外身以身為無身忘心以心為無心脫幻妄證真常遺照坐忘然後玉符保神金液鍊形形神俱妙與道合真不為有身之所病豈能為大患也哉何氏曰何謂貴大患若身貴者重也身為大患宜重而不可輕也身小而患大身忘而禍息有由矣故曰耳目聲色為子留愆鼻口是喜香味是怨身為惱本痛癢寒溫吾拘於身知有大患然一受其成形未能使遽無徒患之何益聖人一言以蔽之曰外身而身存盍思夫形非我有名非我留我所生者從虛無自然中來結氣而成體也故我受形形亦非我形也寄之以為形示之以為相故得道之士外形骸以理自勝變化氣質勤習清虛超入無形之道則人之所患吾有所不患矣抑此身固為患之本而有身必有物所以為患之招也列子身非我有也既生不得不全之物非我有也既有不得不去之身固生之主物亦養之主雖全其身不可有其身雖不去物不可有其物有其物有其身者是橫私天下之身橫私天下之物其為聖人乎公夭下之身公夭下之物此言能不以身物為我有而天下公其身物則身可忘而患亦可忘矣故貴以身為天下則可寄於天下愛以身為天下則可託於天下吳氏曰夭子之尊四海之富皆以身為天下者也知道之人愛惜貴重此身不肯以之為天下寧不有夭下而不輕用其身夫惟如此乃可以寄託於天下寄猶寄百里之命之寄託猶託六尺之孤之託舜禹有天下而不與焉所以唐虞之襌也彼寵其辱以為榮貴其大患以為大利者鄙夫耳何可付之以天下何氏曰有貴愛此身過於天下之大者此人必不以天下動其心乃可受天下之寄託莊子道之真以治身其土苴以治夭下今世俗之君子多危身棄生殉物豈不悲夫此固有隋珠彈雀之喻林氏曰寄託二字便有天下不與之意董氏曰此章明去妄情而復正性也謂遺寵則辱不及忘身而患不至天下大物也且不以為纍况於他物乎第十四章視之不見名曰夷聽之不聞名曰希摶之不得名曰微此三者不可致詰故混而為一林氏曰此章形容道之無迹夷平也希微不可見之意三字初無分别皆形容道之不可聞不可見不可得爾摶執也三者夷希微也三者之名不可致詰言不可分别也故混而為一者言皆道也吳氏曰夷謂平夷夷則泯滅無迹故視之不見希謂希疏希則間闊無聲故聽之不聞微謂微茫微則杳漠無形故摶之不得希夷微三者雖欲究極言之而不可故混同無所分别而名之為一吕氏曰夫無色之色使離朱子羽方晝拭目揚眉而望之弗見也無聲之聲使䚦俞師曠方夜俯首側耳而聽之弗聞也無形之形使賁育五丁持勇鼓臂竭力而摶之不得也目既無所施其明耳既無所施其聰形既無所竭其力則曰夷曰希曰微三者其名雖殊於道之體則一而已亦猶萬籟一風而異聲七竅同氣而用殊此三者皆不可致詰故混而為一然合而言之則混然吻合為一雖有視聽摶摸皆不可得而分矣其上不皎其下不昧繩繩兮不可名復歸於無物是謂無狀之狀無象之象是謂惚恍林氏曰不皎不明也不昧不暗也上下俯仰之上下二字亦不可拘但言此道不明不暗上下求之皆不可見耳繩繩多也多而不可名其終皆歸於無物故為無狀之狀無象之象亦恍惚耳吳氏曰其上其下猶易言形而上形而下也繩繩續而不絶也復反還也無物指道而言復還返其初則歸於無物之道莊子所謂德至同於初是也道無物也故無狀無象然其狀其象亦非如物之有狀有象也故曰無狀之狀無象之象似有似無故曰恍惚吕氏曰夫形色之物皆有涯際唯道也先天先地亘古亘今散為沖氣布為太虛與雨儀並著而其明不耀忽焉處乎九地之下與瓦礫同隱而其幽不晦循環斡旋混成不間繩繩不絶不可以名稱不可以迹見德備不顯雖欲以物喻不可得也故曰其上不皎其下不昧繩繩不可名復歸於無物蕩然巍然淵兮深兮不可擬議測度於無形中則有無狀之狀於無物中則有無象之象謂其有狀則狀孰云有謂其無象則象孰云無故曰妙有不有真無不無恍恍惚惚縹渺氤氲有無莫定故曰無狀之狀無象之象是謂光惚迎之不見其首隨之不見其後執古之道以御今之有能知古始是謂道紀林氏曰迎之而不見其首無始也隨之而不見其後無終也執古之道言其初自無而出也以其初之無而御今之有則可以知古始之所謂道者矣紀綱紀也道紀猶曰人紀猶曰王道之綱也吳氏曰惟其惚恍故迎之隨之皆不可見古謂在先今謂在後有謂萬物之源皆出於道故曰執古之道以御今之有古始者道也何氏曰此章自執古之道以上極虛本無末乃言一有字於以見萬變雖殊可以執一御也道御而王大制不割皆以至無為宗也經曰執大象天下往蓋有不能御有而御有者無也言執者持此以往也道德真經集義卷之二
