body:
  text: 盱江危大有集第六十四章其安易持其未兆易謀其脆易破其微易散爲之於未有治之於未亂吕氏曰古之君天下者治必有亂對安必有危對當其國家安靜則易爲維持及其傾危則難於守禦故周書曰制治於未亂保邦於未危蓋芽糵未堅則其脆易破悔吝未著則幾微易散取之己也少壯身安之時易於行持見功猶速蓋疾病未兆其修煉則易謀而易成暨乎嗜慾過多神衰精損疾病一作便逐逝波儻保養得宜神氣沖和或染微痾亦易治也故曰其安易持其未兆易謀其脆易破其微易散且未疾之人易爲醫也未危之國易爲謀也若預爲之防則未然之禍何由而萌若先爲之計則未形之患何縁而超是以聖人不畏多難而畏無難况禍福本相倚伏自其胎基之未兆而慮之禍可轉而爲福任其已然忽之福可移而爲禍不可救藥矣故治身調心之道盍亦預防其情慾和適其神氣而使之不亂也李氏曰按上章之義其安易持言作事謀始修眞志士正心於思慮之先抑情於感物之前則心易正情易絶茍治事於已亂遠禍於已萌不亦難乎林氏曰方其安時持之則易及至危則難持矣事之未萌謀之則易見其形見則難謀矣脆而未堅攻則易破及其已堅則難攻矣事必爲於未有之先治必謀於未亂之始合抱之木生於毫末九層之臺起於累土千里之行始於足下吕氏曰患不預防惡不杜漸其由植木乎初生於毫末可拔而絶之甚易爲力矣及其合抱青青百尋烏可伐哉又若築臺焉超土於一畚可蹴而超之又何難哉及其九層也聳百尺之勢烏可毁哉又若遠行始於跬步可旋踵而返及其千里長涉渺渺烏可還哉故曰合抱之木生於毫末九層之臺起於累土千里之行始於足下李氏曰積小成大不可救也故易有履霜堅冰之戒傳曰臣弑其君子弑其父非一朝一夕之故其所由來漸矣由辯之不早辯也林氏曰合抱之木其生也必自毫末而始九層之臺其築也必自一簣之土而始千里之行必自發足而始凡此以上皆言學道者必知幾爲者敗之執者失之是以聖人無爲故無敗無執故無失吕氏曰有爲於分别則敗其自然有執於欲利則失其精神未若安其所安守其所守則治而不知其治爲而不見其爲矣聖人察夫事之所敗超於有爲不爲則何敗之有意之所失失有所執不執則何失之有治身有爲則形勞神役心靈疲葡有執則偏滯方隅不離衆有去道遠矣曾未嘗無爲無執天眞純粹故亘萬劫而無敗無象可執何失之有何氏曰聖人作事謀始善始善終曾不敢輕於有爲執其所見蓋懷微妙抱樸質不敢超天下之爭心循理而舉事吾何爲因時而立功吾何執名各自命事由自然吾何敗何失民之從事常於幾成而敗之慎終如始則無敗事吕氏曰世人雖務於善事摩不有初鮮克有終皆初勤而後惰始樂而終厭幾於成而復敗之良由抱一不固則胎眞不凝丹液漏泄故乃曰炁亡液漏非己形若夫至人則用志不分始終如一萬神自正敦能敗之何氏曰凡民好爲者以因循爲無能好執者以通變爲無守所以事敗於垂成此言不能慎終如始而爲有初鮮終之戒是以聖人欲不欲不貴難得之貨學不學復衆人之所過以輔萬物之自然而不敢爲吕氏曰至人非無欲也欲人之所不欲不以物易性則難得之貨又奚貴之有非無學也學人之所不學不以摶溺爲心凡衆人之所過吾得以復之故曰是以聖人欲不欲不貴難得之貨學不學復衆人之所過以至不益生不助長順物自然無容私焉道可以爲親德可以爲友以道德輔佐其體觸事莫非自然而然曷敢有所爲也吴氏曰聖人之欲以不欲爲欲聖人之學以不學爲學難得之貨人所欲者不貴重之是不欲其所可欲也故曰欲不欲衆人之所趨者我則不趨衆人掉臂過之而不願者我則遣反其處是不學衆人之所學也故曰學不學凡此不欲不學者蓋以萬物之理無爲而自然故吾亦無爲與萬物同一自然如輔之以輪輻相依附而爲一也何氏曰此章先言爲之於未有中言爲者敗之末又言不敢爲然則爲者是乎不爲者是乎皆是也豈不曰爲無爲則無不治林氏曰衆人之所不欲者聖人欲之衆人之所貴者聖人不貴之借喻語也衆人之所不學者聖人學之衆人之所過而不視者聖人反而視之復返也此亦借喻語也聖人惟其如此於事事皆有不敢爲之心而後可以輔萬物之自然第六十五章古之善爲道者非以明民將以愚之民之難治以其智多吕氏曰古之時善爲治化民者以道集虚以性開天正心誠意欲導斯民於樸質之地盛德容貌終日如愚使民終身由之而莫之所以然善以道自治者非顯彰其光耀以眩惑於世俗同乎無知抱樸而已吴氏曰上古無爲而治其民淳樸而無知後世有爲而治其民澆偽而有之是以難治也林氏曰聰明道之累也聖人之教人常欲使之晦其聰明不至於自累故曰非以明民將以愚之智巧多則民愈難治故以智治國者反爲國之害也李氏曰將以愚之者謂其政悶悶也民之難治以其智多者謂其政察察故也故以智治國國之賊不以智治國國之福知此兩者亦楷式常知楷式是謂玄德玄德深矣遠矣與物反矣然後乃至於大順林氏曰以智治國者反爲國之害蓋上下相尋皆以智巧則亂之所由生故曰以智治國國之賊不以智治國國之福兩者智與不智也能知智之爲賊不智之爲福則可爲天下法矣能知此法則可以謂之玄妙之德深矣遠矣者歎美之辭也大順即自然也吕氏曰夫弓弩畢弋之智多則禽亂於上矣鈎餌網罟之智多則魚亂於水矣智詐漸毒頡滑堅白解垢同異之變多則俗惑於辯矣夫上以智御下則下以智應上故上下殽亂奸臣賊子侵權怙勢何所不有此不謂之以智治國而何且古之有國者結繩畫地其政悶悶其民淳淳不治而自治所以開人之天曾未若開天之天此不謂不以智治國而何若治身而以智自役則神明不安烏得不盜其眞氣乎生而不以智爲者謂之以智養恬也智與恬交相養則百神平泰萬氣皆融非忘形抱道者敦能此乎故曰以智治國國之賊不以智治國國之福蓋用智者蠹政害民不用智者善政養民兩者楷模而法式之也既知楷式而不用其智致斯民於富夀循天之理與天同德矣故曰知此兩者亦楷式常知楷式是謂玄德夫玄德者深不可測遠不可窺至幽至微不可察也然觀其用似與物違反究其理則與物同歸入于自然之境而無所逆也至人者與世俗萬事相反而復乎素樸同於大通大通則無礙矣故曰玄德深矣遠矣與物反矣然後乃至大順何氏曰聖人不以智治智與天下相尋於機巧法術之中而以愚治智挽之歸簡易平直之道有由也哉故曰上誠智而無道則天下大亂矣何以知其然也夫弓弩畢弋機變之智多則鳥亂於上矣網罟醫笱之智多則魚亂於水矣智詐漸毒頡滑堅白解垢同異之智多則人惑於辯矣故天下每每大亂罪在好智自三代以下是矣以智治國則賊夫民不以智治國乃福夫民知此兩者亦楷式乃有國者之良法常守此良法則德玄且深且遠矣故曰天地雖大其化均也萬物雖多其治一也人卒雖多其主君也君原於德而成於天故曰玄古之君天下者無爲也天德而已矣與物反者彼以其智我以其玄彼以其賊我以其福相反而不相入也正言若反乃至大順順之至也豈在用私用智與物相靡相刃而莫之能止也李氏曰無爲寬大治平天下民之福也有爲謹嚴宰制下民國之賊也民之難治以其多事是以聖人以無爲清靜治國使夫知者不敢爲也雖與物相反反貫自然民遂其生獲百倍之慶天下治平成大順之化盡此道者是謂玄德第六十六章江海所以能爲百谷王者以其善下之也故能爲百谷王吕氏曰江海之王百谷者謙卑處下虚以待之無爲爲求而百川自然來也由此觀之卑損之爲道也大矣人身以臍間下丹田爲氣海乃五臟六腑生氣之本一萬三千五百息之源十二經脉之祖人能謹守下丹田氣海守之不間則百關之氣自然朝之何氏曰江海不讓細流故能成其大自有王百谷氣象然非强爲大也水無分於東西而分於上下也海居下則百谷斯朝宗矣經曰譬道之在天下猶川谷之於江海此道何道也聖王知雄守雌也林氏曰百谷之水皆歸之於江海江海爲百谷王之尊而乃居百谷之下此借物以喻自卑者人高之之意是以聖人欲上人必以言下之欲先人必以身後之是以處上而民不重處前而民不害是以樂推而不厭吕氏曰聖人能體謙下之道將欲處人之上故必先以其言下於人者知滿之必招損也故言則謙柔名則孤寡以下於物而盛德日崇大寳彌固自然爲物所推而居於上矣將欲首出庶物必先身謙言遜退在人後者蓋謹身順道不以先物故能爲物所推而處於先矣故曰是以聖人欲上人必以言下之欲先人必以身後之故能處人之上而不以爲重其從之也輕處物之前而不以爲害其利之也衆不重故不輕不利故不害利害輕重付之自爾其何容心哉故天下共黄老清靜之化而無厭者以其謙卑之德所至故天下樂推而不厭上學之士天下自然欽敬上於人先於人謙光而尊德之所致何厭之有何氏曰聖人心如太虚道如天地以柔靜待天下又何欲焉欲上人欲先人示人以可則可效順人情而言之也聖人何心哉人皆取福己獨曲全故處民之上而彼不以爲重而壓己自下者人高之也人皆取實己獨取虚故處民之前而彼不以爲害而傷身自後者人先之也托小包大志弱事强常寬容於物不削於人常情所惡而忌者變爲樂推無復厭斁吴氏曰以言下之謂卑屈其言而不尊高以身後之謂退却其身而不前進然此皆聖人謙讓之盛德非有心於欲上人欲先人讀者不以辭害意可也林氏曰聖人非欲上人先人而後爲此也其意蓋謂雖聖人欲處人上人先猶且如此况他人乎以其不爭故天下莫能與之爭吕氏曰聖人常以虚爲身以無爲心心形既定物孰可爭書曰汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功此之謂也夫至人者忘其耳目遺其肝膽消殞萬縁泯絶身世和以天倪與物委蛇而天下敦與爭乎何氏曰人心天理可以道感不可以力爭也以其不爭而天下莫能嘗語文子曰聖人欲貴於人者先貴人欲卑人者先自卑第六十七章天下皆謂我大似不肖夫惟大故似不肖若肖乆矣其細吕氏曰夫道曠然無形無名充遍萬物雖有而若無其與物無一相似此其所以爲大也若肖似於物道亦物爾而何足大哉董氏曰若有所肖似則同於一物何足爲大也何氏曰聖人以玄德自持不欲見貴於世宜其天下亦以爲博大無所肖似夫惟大則混混冥冥人不可得而名如有所肖似則細行之人爾肖似也林氏曰一本於謂我下添道字其細下添也夫字皆誤也我有三寳寳而持之一曰慈二曰儉三曰不敢爲天下先吕氏曰人能抱道持身有如持寳固當愛護持守而不失也所履踐者有三體仁博施愛育群生慈也節用厚人不耗於物儉也不爲事始和而不倡不敢先也至人保持三寳者廣度衆苦衣被萬物慈之至也儉視聽則神不蕩儉言語則氣不耗儉嗜欲則心不摇此養生之至寳也能後其身謙光自隆故曰我有三寳保而持之一曰慈二曰儉三曰不敢爲天下先何氏曰聖人不以珠玉爲寳而所寳惟道何道也慈儉後三者之道也匹夫撫劍疾視是則好勇者細人自逞之氣而我以慈爲寳小器塞門反坫是則好廣者細人自侈之見而我以儉爲寳也名利都府衆人所馳是則好先者細人自矜伐以爲能而我以不先爲寳吴氏曰持謂守之而不失慈謂柔弱哀憫而不剛强儉謂寡小節約而不侈肆不敢爲天下先謂謙讓退却而不锐進持此三寳故雖大而似不肖也夫慈故能勇儉故能廣不敢爲天下先故能成器長今捨慈且勇捨儉且廣捨後且先死矣吕氏曰知謙和柔弱能勝剛强順化有情曰慈遂可以言勇知節儉爲可貴用之不可既曰儉遂可以言廣知先人後己可以克己復禮惟仁是與遂可爲器用之長夫剛强則易挫慈柔則不可敵慈也者不剛而勇儉愛精氣神明不勞而我道彌廣未嘗先人故樂推不厭遂成法器之主故曰夫慈故能勇儉故能廣不爲天下先故能成器長今世俗則不然捨棄慈仁將爲勇義費氣輕生不能保嗇節用崇奢尚侈傷財害民反招匱乏無謙退之心有剛强之志好處物先耻居人後皆非長生大道之術乃喪身之具爾故曰今捨慈且勇捨儉且廣捨後且先死矣林氏曰器形也成器即成形也凡在地之成形者我皆爲之長故曰成器長今人捨慈而用其勇捨儉而用其廣捨後而用其先此非保身之道也故曰死矣吴氏曰捨謂不用不用慈儉退後之寳而剛强以爲勇侈肆以爲廣锐進以求爲先則將不能保其生皆死之徒也夫慈以戰則勝以守則固天將救之以慈衛之吕氏曰且慈兵入於敵境也則人知有所庇矣不踐禾稼不穴丘墓不踐積聚不焚屋室則人人悦之何必陳兵以戰野而後勝重門擊柝以爲守固哉故天道福善禍淫善人自天祐之開其心志使之無所不慈無所不慈則物爲之衛矣至人能守慈勇以戰世縁則萬邪不能入千魔不敢干其道曰固蓋天道無親常與善人故曰夫慈以戰則勝以守則固天將救之以慈衛之林氏曰戰交物而動也猶莊子曰與接爲構曰與心鬬也守猶莊子純氣之守也人能以慈爲主則外可勝物内可自守前言三寳此舉其一能慈則二者在其中吴氏曰慈者生之道仁之德爲三寳之首故此以下專言慈之一寳而二寳在其中矣慈者人人親之如父母豈有子而敵其父母攻其父母者哉故以慈而戰則人不忍敵是能勝也以慈而守則人不忍攻是能固也縱有來敵來攻之寇人之助其父母者多亦必能勝能固或人力不逮天亦救助之而不令其敗且潰天之所以救助之者以其能慈而救護之也李氏曰慈之一字戰則勝守則固仁者無敵眞勇也第六十八章善爲士者不武善戰者不怒善勝者不爭善用人者爲之下何氏曰公儀伯以力聞諸侯周宣王備禮以聘之觀形懦夫也宣王曰爾之力何如公儀伯曰臣之力能折春螽之股堪斷秋蟬之翼王曰吾之力能裂犀角之革曳九牛之尾猶憾其弱汝而力聞天下何也公儀伯曰善哉王之問也臣之師有商丘子者力無敵於天下而六親不知以其未嘗用其力故也今臣之名聞於諸侯是臣違師之教彰臣之能也然則臣之名不以負其力者也以能用其力者也善爲下者不武槩事見矣莊子市南儀僚弄丸而兩家之難解孫叔敖甘寢秉羽而郢人投兵此不怒者善戰不爭者善勝也韓信解廣武君之縛東向師事之問燕齊之策此善用人者爲下也古之善爲士者不怒而威於斧鉞不戰而屈人兵則有道存故有人曰我善爲陣我善爲戰大罪也國君好仁天下無敵焉吴氏曰古者車戰爲士謂甲士三人在車上左執弓右執矛中御車掌旗鼔皆欲其强武戰卒七十二人在車下將戰必激發其勇與所敵爭雄而取勝慈者之用兵則不以此爲善也士不欲其强武戰不欲其奪怒勝敵不待與之較力兵刃不施彼將自屈古之智能林氏曰四者之善皆不爭之用也是謂不爭之德是謂用人之力是謂配天古之極何氏曰不爭之德仁不以勇也用人之力群策屈群力也配天古之極天道不爭而善勝自古以固存道合其極林氏曰以其不爭之德可以配天可以屈群力用天下自古以來無加於此故曰古之極李氏曰不爭之德用人之力皆仁慈之謂故曰配天以此修身則形存而夀永也柴氏曰惟善則合上古立極之道故曰配天古之極第六十九章用兵有言吾不敢爲主而爲客不敢進寸而退尺何氏曰吾不敢爲主而爲客者是所謂應兵也故曰救亂誅暴謂之義兵兵義者無敵加於己不得已而超者謂之應兵兵應者勝爭恨小故不忍憤怒者謂之憤兵兵憤者敗利人土地貨寳者謂之貪兵兵貪者破恃國家之大矜民人之衆欲見威於敵者謂之驕兵兵驕者滅此五者老子嘗以語文子今言不敢爲主而爲客者主先而客應之非得已不敢進寸而退尺見可而進知難而退慎之至也而非怯也臨事而懼好謀而成也吕氏曰古之有言兵略者必以先舉爲主後應爲客也主造事者也客應敵者也且聖人之兵沉機密用雖有敵至我則坐觀其變隨變而應迫而後起不得已而後動若輕動者所謂輕敵也大抵有意於爭爭之未必勝無意於爭爭之未必負機謀進止其亦有待焉至人應世一視一聽一語一笑萬縁交接皆謂之魔也戰勝之决不敢爲主之先倡儼然若客常居靜定之中精神不亂進寸則有敵退尺則無爭故曰用兵有言吾不敢爲主而爲客不敢進寸而退尺是以行無行攘無臂扔無敵執無兵何氏曰兵之常勢行有行陣攘有手臂扔有對敵執有兵徒而乃一無有焉如無手行拳又如枕席上過師不戰而屈人兵之意所以然者重而不輕也扔引也如攘臂而扔之扔扔古本並從才音同有揮敵意河上公曰彼遂不正爲天下賊雖欲行誅之不成行列也雖欲大怒若無臂可攘也雖欲扔引之若無敵可扔也雖欲執持之若無兵可持也林氏曰此皆兵家示怯示弱以誤敵之計扔引也引敵致師也如此用兵方有能勝之道也輕敵而自矜自眩則必至於喪敗王弼本仍作扔禍莫大於輕敵輕敵幾喪吾寳抗兵相加哀者勝矣何氏曰勿曰何害其患甚大此輕敵之戒禍之大者聖人以慈爲寳而天將救之以慈衛之今對敵而輕用其鋒以求勝於天下則是先自喪其道之寳矣故兩兵相遇哀矜者勝故曰視卒如愛子故可與俱死以慈戰則勝一言而三軍如挾纊吮疽而士卒父子爭死夫誰與敵此章言兵不可輕用而不用爲之大用有出于兵之外吴氏曰行三軍者臨事而懼不敢輕敵也輕敵則輕戰以致殺人而喪吾慈寳矣禍莫大焉雖未進戰然一有輕敵之心則以有殺人喪寳之漸故曰幾喪吾寳抗舉也哀者慈心之見而天人助之勝也蘇氏曰兩敵舉兵相加而吾出於不得已則有哀憫殺傷之心哀心見而有天人助順之勝矣林氏曰擊鼔其鏜踴躍用兵則非哀者矣此章全是借戰事以喻道第七十章吾言甚易知甚易行天下莫能知莫能行何氏曰道者何清靜是也簡易爲上耳道本清也人自濁之道本靜也人自動之道本簡也人自繁之道本易也人自難之玄聖所言以我觀甚易知易行以人觀乃不能知不能行術豈異哉蓋亦反其本矣且言剛强則難言柔弱豈不易言華飾則難言樸素豈不易而惟其易知反成不知惟其易行反成不行爲其太近也列子善力舉秋毫善聽聞雷霆知道之言也李氏曰前章云哀者勝謂仁慈無敵故次之以甚易知易行世人莫能知莫能行者信不及也間有信者又不能行力不及也吴氏曰老子之言教人柔弱謙下而已其言甚易知其事甚易行也世降俗末天下之人莫能知其言之可貴故莫有能行柔弱謙下之事者言有宗事有君夫惟無知是以不我知知我者希則我貴矣何氏曰老子兩語文子以言有宗事有君而曰至言去言至爲去爲曰失其宗本伎能雖多不如寡言此也秉要執本則得所以知所以行所以易也無他泛知則難寡者衆宗於此而知斯易矣泛行則難靜爲躁君於此而行斯易矣然知道之說有三甚易者近也莫能知者味也而惟無知者忘也故道由易知而至於無知聖人事也吾超然不識不知之境又誰得而測識之關尹子能忘道乃能有道又曰有人問於我我尚不知我將何爲我所此無言無事内知而抱玄也吾尚不自知宜其人之不吾知人之得以知其道亦何貴哉故得道畏人知又先畏自知人己兩忘云爲俱泯至貴者道大音希聲豈在求知哉而難易之知又不足言矣林氏曰衆言之中必有至言故曰言有宗舉世之事道爲之主故曰事有君世無知至言至道之人所以莫有知我者故曰夫惟無知始不我知是以聖人被褐懷玉何氏曰列子居鄭圃四十年無識者國君卿大夫視之猶衆庶也君子盛德容貌若愚由是觀之聖人譬如被者褐懷者玉外不自貴而中有至貴者存褐毛布賤者之服故云褐寬博吕氏曰聖人無名至人無己神人無光雖衣弊履穿蒙以養正心如玉石積蓄至寳韜藏光耀未嘗顯露默養道胎故曰是以聖人被褐懷玉林氏曰聖人之道足於内而不形於外猶被褐而懷玉故人不得見之也第七十一章知不知上不知知病夫惟病病是以不病聖人不病以其病病是以不病林氏曰於其至知而若不知此道之上也於不可知之中而自以爲知此學道之病也人能病其知之爲病則無此病矣聖人之所以不病者蓋知此知爲病而病之所以不病此一章文字最奇李氏曰知不知上接上章吾言甚易知聖人無所不知不自以爲知眞知也世人無所知自以爲知妄知也故曰病若知妄知爲病而病其病則妄知之病瘥矣聖人所以不病者以其病其多知是以不病也吕氏曰至哉妙道沖默淵奥不可以智知不可以識識不可得而測度不可得而擬議知之外矣不知内矣知之淺矣不知深矣聖人禀氣沖粹天性高明内懷眞知萬事自悟始能無知不以自矜是謂眞知眞識乃知不知不識者也且世之人不知至道之精而知事物之粗不知至道之極而知事物之末方且爲緒使方且爲物駭内多機智徒事誇大而實不知道弊精神役思慮以文滅質以博溺心而强辯飾說以爲知之是德之病也至士達道明眞得之固窮鉗口結舌保而秘藏不敢宣泄常若不知而况不知其道而乃肆高雄之辯辯者不善知者不博博者不知也何氏曰莊子聞以有知知者矣未聞以無知知者也故深知而不自以爲知於道爲上始於不可知之中强自以爲能知於學爲病莊子太清問乎無窮曰子知道乎曰吾不知也又問無爲曰吾知道問無始曰弗知深矣知之淺矣弗知内矣知之外矣太清知而歎曰弗知乃知乎知乃不知乎孰知不知之知第七十二章民不畏威大畏至矣河上公曰威害也人不可不畏小害不畏小害大害至矣吕氏曰君子有三畏畏天命畏大人畏聖人之言人能體常盡變以全性命之理則内眞赫然充塞于外思慮憂愁無自而入衆之所畏不可不畏世愚不知天命樂高好大負威任勢矜尚賢能南華經大愚者終身不靈大惑者終身不解勿謂小惡無傷遂闊略而不知悔苟積累之乆人威將不能加天威必至何氏曰昔人有言畏威如疾民之上也從懷如流民之下也見懷思威民之中也是則人心最不可無所畏孔子曰君子有三畏畏天命畏大人畏聖人之言小人不知天命而不畏也狎大人侮聖人之言大人者君父之嚴及大德之人固可畏不可狎聖人所言犯其告戒必不免其有身固可畏不可侮而三畏之中又以畏天命爲先天命者乃天所付與萬物當然之理畏之一念一動一言天地鬼神臨之罔敢玩易道者萬物共由得之者生失之者死民受天地之中以生能者取福敗者取禍故君子畏義小人畏刑皆畏天也不此威之畏則威有大於此者易曰惡不積不足以滅身小人以小惡爲無傷而弗去故惡積而不可掩罪大而不可解荷校滅耳凶豈非不畏威而來大威哉林氏曰不畏刑者常遭刑也無狹其所居無厭其所生是以不厭河上公曰謂心居神當寬柔不當急狹人所以生者爲有精神若忽其道好其色是謂伐本厭神夫惟獨不厭精神之人洗心滌垢澹泊無欲則精神居之不厭也何氏曰人與道居則能居天下之廣居故欲無狹所自居不則室無空虚婦姑勃磎矣人以道生則能生天地之所生故欲無厭所自生否則心無天遊六鑿相攘矣夫惟樂遣而内不自厭則上不見厭於天下不見厭於人是以皆不厭也林氏曰居廣居也生長生乆視之理也人皆自狹其所居自厭其所生不能安於退而務於進不能觀於無而惑於有是自狹也自厭也無者戒飭之辭言不可如此也夫惟不厭者而能乆安故曰是以不厭董氏曰狹隘也厭棄也無當作毋居者性之地居天下之廣居則與太虚同體矣生者氣之聚含太乙之至精則與造化同其用矣惟曲士不可以語道苟不溺於小術而實諸所無以自狹其居則必棄有著無而蔽於斷滅以厭其所生矣是以告之以無狹無厭使學者知夫性者氣之帥而其大無量當擴而充之以全其大生者道之寓而其用不窮當葆而養之以致其用則養氣全生盡性至命而不生厭棄之心所以體無非强無而無非頑也長生非貪生而生非下也夫如是則生與道居而道亦未嘗厭棄於人矣是以聖人自知不自見自愛不自貴故去彼取此河上公曰自知者自見己之得失不自見者不自顯露德美於外藏之於内也自愛者自愛其身以保精氣不自貴者不自貴高榮名於世也去彼者去彼自見自貴也取此者取此自知自愛也何氏曰聖人自知則是非美惡不敢昩而自見則自足之心生矣自愛則安危去就不敢輕而自責則自驕之氣動矣此乃畏不畏之所以分一彼一此何去何取可不知所擇哉道德眞經集義卷之九
