body:
  text: 盱江危大有集第一章道可道非常道名可名非常名無名天地之始有名萬物之母何氏曰夫道者元氣虛無混沌自然二儀從之而生萬有資之而形不可得而名强為之名曰道故首章之首宜以道一字句絶如經中道沖而用之之章亦是首揭一道字尊而稱之以示人於以見其高無上其大無對名以道立故併標云下句可道可名者所謂道術為天下裂以名為表者也常道常名者所謂虛無生自然自然生道繩繩不可名者也夫道乃常道則名乃常名而可道可名皆其暫也曰可則有可有不可云胡而常所謂强然即不然也曰常則無可無不可云胡而變所謂自然即常然也道其體而名其用也有固為名而無亦名也道原於無窅然空然以名天地之始物生於有油然勃然以名萬物之母李氏曰虛無自然真常之道本無可道可道之道非真常之道元始祖氣化生諸天隨時應變之道也道本無形可名之名非真常之名天地運化長養萬物著於形迹之名也林氏曰道不容言才涉有言皆落第二義故常無欲以觀其妙常有欲以觀其徼此兩者同出而異名同謂之玄何氏曰無非暫無自古固然故曰常無列子太易者未見氣也太初氣之始也太始形之始也太素質之始也循之不得故曰渾淪於無而觀豈不微妙有非暫有無時不然故曰常有列子易變而為一一變而為七七變而為九九復變而為一一者形變之始又曰有形則復於無形於有而觀豈無歸徼此徼字老列二注皆云歸也乃歸宿之義莊子至無而供其求時騁而要其宿此也一有一無欲於兩者並觀而得之他有所不欲觀者非其道也觀此兩者本同也因出而異名經曰天下萬物生於有有生於無故本同而名異妙無非無妙有非有故曰有常可使無無常可使有有無同名為常故得同稱為玄也有無一也無固玄也有亦玄也故曰同玄經曰萬物並作吾以觀其復復命曰常經中三觀曰妙曰徼曰復然後知觀復之觀徼妙一也林氏曰常無常有兩句此老子教人究竟處此兩欲字有深意欲者要也要如此究竟也有與無雖為兩者雖有異名其實同出能常無常有以觀之則皆謂之玄玄者造化之妙也以此而觀老子何嘗專尚虛無若專主於無則不曰兩者同出矣不曰同謂之玄矣倪氏曰無與有皆道之常常無道之未形者也常有道之已著者也道常無亦常有有無相生不可缺一道之常無者欲人觀道之妙也妙者精而在其中者也道之常有者欲人觀道之徼也徼者粗而在邊者也世謂老子專言無不言有以此首章有無並舉未嘗偏有所取舍也於首章言之可見其作書之意也諸家說多以無欲有欲為句夫欲者道之蔽也無欲可爾豈可有哉吕氏曰觀妙者觀於內也妙者神也神者妙萬物而為言也故內觀者攝動心止欲念聚神光結正氣凝胎真也太上有內觀定觀之經仙真有收視返聽之訣真誥曰內觀者為靈仙之根也徼邊隅也又歸也董氏曰凡遠而無所至極則其色必玄其在人心乃淵默無象之義關尹子所謂不可測不可分故曰天曰命曰神曰玄合曰道是也或曰諸家皆以常無欲常有欲句解之今獨取常無常有句解者何也曰諸家皆以常無欲常有欲句解者理非不通也但與下文同謂之玄意不相屬若常有欲豈可謂玄又曰有欲者亡身亡身為玄可乎又有以常有欲為運用工夫此說非不妙亦未免牽强耳不若常無常有句絶者平易而理長也今故取之玄之又玄衆妙之門何氏曰妙固妙也徼亦妙也故曰衆妙林氏曰玄之又玄者贊言其妙也衆妙即易所謂妙萬物者也門言其所自出也此章人多只就天地上說不知老子之意正要從心上理會吕氏曰玄者微妙之極也又曰玄天也玄之又玄則天中之天鬱羅簫臺玉山上京在人乃天谷神宫也為腦血之瓊房津液之山源百靈之命宅自已長生大君居之人能以神內觀於天中之天則胎仙自成天門自開萬神從兹而出入故曰衆妙之門柴氏曰乾坤闔闢體用出入之所何莫由斯門也劉氏曰玄之又玄謂元之始自然也此乃衆妙之門户此章首論道次論天地又以次論人心可謂盡之矣學者當默識之董氏曰理事皆從此出故云衆妙之門第二章天下皆知美之為美斯惡矣皆知善之為善斯不善矣何氏曰夫道者無狀之狀無物之象陶冶變化天地之美具焉一陰一陽之道繼善成性知之者不如忘所知况天下皆知乎哉故知美為美不如不知之美為至美人皆知為美則美中有惡以知之淺也知善之為善不如不知之善為至善人皆知為善則善有不善以知之外也吕氏曰夫體道全德之士與物混成等其自然夭下皆知其美者自美吾不知其美善者自善吾不知其善大齊物我超乎對偶之外豈有美惡善不善之為對哉世人不悟乎未始有物溺於私見或以貌象聲色為美功名富貴為善妄心一起雖惡而美之雖不善而善之今之所棄後或用之昔之所是今或非之則美與惡善與不善奚擇焉吳氏曰美惡善不善之名相因而有以有惡故有美以有不善故有善皆知此之為美則彼為惡矣皆知此之為善則彼為不善矣欲二者皆泯於無則無美惡善不善矣林氏曰此章即有而不居之意有美則有惡有善則有不善美而不知其美善而不知其善則無惡無不善矣故有無相生難易相成長短相形高下相傾音聲相和前後相隨何氏曰夫言無必有言有必無相生也難作於易易圖於難相成也尺有所短寸有所長相形也高岸為谷深谷為陵相傾也鶴鳴子和如聲音形動影隨如前後善否美惡常對立於天下凡小知小識有美有善不如不識不知盡善盡美也李氏曰有生於無無生於有難事易易事難長則短短則長才有高便有下有聲音便相和前隨後後隨前故有無難易互相倚伏有美便有惡有善便有不善也吕氏曰兩儀既立物物為對故相生之以有無相成之以難易相形之以長短相傾之以高下相和之以音聲相隨之以前後動涉有為也林氏曰此六句皆喻上面美惡善不善之意歐陽修曰前後之相隨長短之相形推而廣之萬物之理皆然也老子之為書其言雖若虛無而於治人之術至矣是以聖人處無為之事行不言之教何氏曰聖人能知無知道之樞機故人皆事事我處無事之事於物與之為娛吾何心於事人皆言言我行不言之言言未嘗言與人並立而使人化吾何心於言吕氏曰且有無難易長短高下音聲前後既有對偶未免乎纍是以聖人遺物離人獨立乎萬物之上不與物為對經所謂獨立而不改物無能偶之者故能為無為事無事忘言忘象默符自然豈假容聲哉南華言至為去為至言去言故曰處無為之事行不言之教萬物作而不辭生而不有為而不恃功成不居夫惟不居是以不去何氏曰聖人作而萬物睹萬物作聖人烏得而辭雖不辭生之為之之責而亦不有不恃不居其成而功在聖人自不可却而去者勢也非聖人意也林氏曰天地之生萬物千變萬化相尋不已何嘗辭其勞萬物之生盈於天地而夭地何嘗以為有如春生秋殺而造化何嘗恃以為能故曰生而不有為而不恃其意只在於功成而不居故以萬物作焉而不辭三句發明之作猶易坤作成物也此即舜禹有天下而不與之意有其有者不能有無其有者能有之書曰有其善喪厥善故曰夫惟不居是以不去李氏曰不辭不有不恃不居彼此兩忘有無不立是以真一常存而不去也吕氏曰聖人體道在己其用心也不勞其應物也無方故萬物並作隨感而應若谷應聲美惡皆赴無所辭也故曰萬物並作而不辭自形自色自生自化各極其小大而遂其性孰有之哉關尹子物非我物不得不應我非我我不得不養故應物而未嘗有物養我而未嘗有我故曰生而不有澤及萬世而不為仁覆載天地而不為大故曰為而不恃功蓋天下而似不自己出認之則惑矣故曰功成不居有居則有去古今是也在已無居物莫遷也惟其不自居不自有不自恃所以與物翱翔於萬物之上而自若未始或去也吳氏曰作謂物將生不辭不有不恃不居此天地無為之事也不去常存也天地不居成物之功故其功常久而不去董氏曰此章進學者於名迹兩忘之地也第三章不尚賢使民不爭不貴難得之貨使民不為盜不見可欲使心不亂李氏曰不矜自己之賢能則民淳不貴奇貨則民富不見可欲則心定吳氏曰尚謂尊崇之貴謂寶重之見猶示也不尚之不貴之是不示之以可欲使民之心不爭不為盜是不亂也林氏曰尚矜也我以賢為矜尚則必起天下之爭禹惟不矜天下莫與汝爭能便是此意我以寶貨為貴則民皆有欲得之心其弊將至於為盜人惟不見其所可欲則其心自定是以聖人虛其心實其腹弱其志强其骨李氏曰虛其心全性也實其腹全命也弱其志全神也强其骨全形也吕氏曰前言不貴難得之貨不見可欲即是虛其心也不尚賢即是弱其志若曰止是虛其心則恐泥於頑空若曰止是弱其志則恐不能自立故復言聖人之治身也須虛其心更須實其腹既弱其志更須强其骨虛者實之對弱者强之敵靈臺朗徹虛室生白不受一塵是虛其心也心既虛矣不能吐納太和咀嚼沆瀣飲玄英之氣母食大梵之夭粱以實其腹徒守性空安能脫胎神化白日上升也哉由是觀之虛心實腹不可偏廢也明矣以謙自下以卑自牧是弱其志也志既弱矣然聞道不能鋭於力行則無所卓立安得如易所謂天行健君子以自强不息內鍊之士或斡旋泝流上通三關而補於腦腦滿則骨强矣弱志强骨不可偏廢也亦明矣何氏曰虛心者清本超原也實腹者積精纍氣也離虛坎實之道其神全矣弱志者專氣致柔也强骨者聞道勤行也坤順乾健之道其德全矣柴氏曰無自賢無貴貨無所欲則心中自虛靈腹中氣自實心虛無物志自柔和腹中有養骨自强健矣常使民無知無欲使夫知者不敢為也為無為則無不治何氏曰神與德俱全自有不言之化使民由之而不自知也昔有知而今無知昔有欲而今無欲莊子同乎無知其德不離同乎無欲是謂素朴素朴而民性得矣豈敢自私用智而他為哉下之人則不敢為上之人則為無為薰然至治之感無迹可尋林氏曰古者其民淳朴而無所知無所欲雖其間有機巧心者所知雖萌於心而亦不敢有作為也聖人之治天下也如此聖人於世亦無所容心其為治也皆以無為為之所以無不治也吕氏曰無為即道也聖人以道唱於上百姓以道和於下朝斯夕斯顛沛必於是造次必於是非道不行非道不言凡所作為則無為之道若為於有所為則心勞形役而終於憊矣為之於無所為者雖服餌英華嘻吸天氣漱咽雲液運鍊玄珠上際於天下蟠於地妙用縱橫神凝迹移百體俱理矣故曰為無為則無不治董氏曰此章言忘貴尚泯思慮則復於無為而合至理也第四章道沖而用之或不盈淵兮似萬物之宗吳氏曰或疑辭不敢必也道之體虛人之用此道者亦當虛而不盈盈則非道矣淵深不可測也宗者宗祖之宗族之統也道者萬物之統也故曰萬物之宗似者亦不敢必之辭也何氏曰沖虛也道貴以沖虛為至用也莊子知無用而始可言用如盈則中不虛其用小矣似者杳乎難正言之也虛之至也林氏曰沖虛也道體雖虛而用之不窮或盈或不盈隨時而不定也似者以疑辭贊美之也萬物之宗即莊子所謂大宗師也李氏曰道沖而用之或不盈謂不自滿也不自滿者必受益挫鋭解紛虛中忘我之謂也吕氏曰天一生水其用在中故曰沖沖字從水從中言氣中有真一之水是名為沖沖者氣也和也金華真人曰沖和入體以活谷神能知沖用飛升崑崙正言道以沖氣為用也嚴君平曰沖以虛為宅和以無為家以虛無為之用自然不至於盈溢也惟其不盈故能淵兮似萬物之宗夫淵者至深而不可測至靜而莫能動之謂也萬物之宗即至道爾宗者祖也生一生二生三生萬物則道者豈不為萬物之宗祖乎挫其鋭解其紛和其光同其塵吳氏曰夫鋭者必鈍光者必暗猶盈者之必溢道不欲盈故鋭者挫之而不欲其鋭光者和之而不欲其光此四句言道之用不盈也林氏曰挫其鋭言其磨礱而無圭角也解其紛言處其紛擾之中而秩然有條也光而不露故曰和其光無塵而不自潔故曰同其塵李氏曰挫鋭解紛和光同塵者虛中忘我之謂也吕氏曰挫其鋭者摧挫其剛鋭名利之氣淡泊自居不露圭角之謂也解其紛者解釋其紛譁擾亂之心沉默自處不與物交之謂也光者光華也塵者塵俗也莊子曰宇泰定者發乎夭光儒者曰充貪而有光輝之謂大今也以沖為用則雲腴夭光日精月華流入四肢內既充實光輝自然發越莫不粹然見面而盎背其與常人亦異矣沖和既實於內神光又發於外直須溫柔平易混世同塵並處雜居而不决擇不然則人將指為傲世怪誕不經之人也何氏曰其虛云何挫其鋭解其紛和其光同其塵也此四者泯然無迹則心如太虛谷以虛應道以沖用此章兩言似或者所謂活句宜詳味湛兮似或存吳氏曰湛澄寂之意道之體虛故其存於此也似或存而非實有一物存於此也此一句言道之體虛也吕氏曰湛澄清瑩徹似或存者如在而非在非有非無之象也仰之彌高鑽之彌堅瞻之在前忽然在後是也林氏曰若存若亡似有似無故曰湛兮似或存也吾不知誰之子象帝之先吳氏曰吾不知誰之子問辭也象帝之先答辭也象言天有象帝言天之主宰也夭亦由道而生故曰象帝之先李氏曰象帝之先者太極未分前也吕氏曰黃庭經問誰家子在我身即所謂吾不知誰之子也即自己性真自古以固存長於上古而不為老故曰象帝之先董氏曰此章言妙本沖虛而其用不測也第五章天地不仁以萬物為芻狗聖人不仁以百姓為芻狗吳氏曰仁謂有心於愛之也芻狗縛草為狗之形禱雨所用也既禱則棄之無復有顧惜之意夭地無心於愛物而任其自生自成聖人無心於愛民而任其自作自息故以芻狗為喻蓋聖人之心虛而無所倚著若有心於愛民則心不虛矣林氏曰生物仁也天地雖生物而不為功與物相忘也養民仁也聖人雖養民而不以為恩與民相忘也不仁不有其仁也芻狗祭則用之已祭則棄之喻其不著於意而相忘爾經曰上德不德是以有德不仁猶不德也莊子大仁不仁又曰至德之世相愛而不知以為仁也亦是此意吕氏曰天地無恩而大恩生聖人不仁則大仁成以其無私也故謂之不仁夭無私覆地無私載聖人無私化當生則生當死則死惟元氣之所運天地聖人未嘗容心於其間譬猶芻狗耳芻者草也束芻為狗以供祭祀當其用也盛以中篋被以文繡尸祝齊戒以將之敬之至也及其已事行者踐之爨者焚之抑無用之棄物耳夭地於春生夏長之時疑若仁愛之厚及其凋落之際天地所不能生聖人於矜憐撫養之時疑若仁愛之厚及其死亡之際聖人所不能救亦猶尊芻狗於未祭之前而棄之於已祭之後未祭之前所當敬也已祭之後所當棄也故以芻狗為萬物百姓生殺之喻不如是則不足以見天地聖人之無私因其不仁乃所以見天地之大也李氏曰天覆地載化民育物可謂至仁言不仁者忘其所自也聖人愛民治國亦復如是修身養命亦復如是天地之間其猶橐籥乎虛而不屈動而愈出多言數窮不如守中吳氏曰橐籥噓風熾火之器也天地間猶槖籥者橐象太虛包含周遍籥象元氣氤氲流行之用不屈謂其動也直愈出謂其生不窮惟其橐之虛而籥之化化者常伸故其籥之動而橐之生生者日富在天地之間如此其在人也則惟心虛無物而氣之道路不壅故氣動有常而虛中之生出益多數猶速也窮謂氣乏人而多言則氣耗損是速其匱竭也不如虛心固守其神使外不入內不出則其中虛也無涯而所生之氣亦無涯矣林氏曰橐籥用而風生其體雖虛而用之不屈動則風生愈出愈有天地之間其生萬物也亦然橐籥之於風何嘗容心焉天地之於生物亦何嘗容心焉故以此喻之多言數窮不如守中者意謂天地之道不容以言盡多言每每至於自窮不如默然而忘言孔子曰子欲無言天何言哉四時行焉百物生焉正此意也李氏曰此章乃結上章道沖而用之之義夭地之間其猶橐籥者虛中也虛而不屈者無心也動而愈出者應變無窮也不如守中者亦虛中而已陸氏釋屈作竭文始妙道真人問老子曰道德修身至要在於何章老子曰在於守中抱一深根固蒂曰何謂守中老子曰中者中宫也原夫赤子在母腹中臍蒂與母臍蒂相連暗注母氣母呼亦呼母吸亦吸綿綿十月氣足神備脫蒂而生亦猶果之受氣既足脫蒂而下也臍間深入三寸謂之中宫亦曰黃庭男子謂之氣海女人謂之子宫吾昔受太上道君訣曰勤守中莫放逸外不入內不出還本元萬事畢勤守中者一意以守元海也不出入者令往來之息兀然注於中宫氣海勿使息之出入也還本元者臍間乃一萬二千五百息之源五臟六腑生氣之本以息還歸本源以神御之使息定息住也右此乃吕氏本所載第六章谷神不死是謂玄牝吕氏曰谷者天谷也神者一身之元神也天之谷含造化容虛空地之谷容萬物載山川人與天地同所禀亦有谷焉其谷藏真一宅元神是以人之頭有九宫上應九天中間一宫謂之泥丸又名紫府九宫之外别有一宫亦有數名一名寥天又名天關又名玉京山崑崙頂太淵池又名天谷乃元神所住之宫其空如谷而神居之故謂之谷神神存則生神去則死且日之接於物夜則交於夢者神不安其居也使其去而不還游而不返則死生之途隔矣由是觀之人不能生而神生之人不能死而神死之然谷神所以不死者由玄牝也玄陽也天也牝陰也地也玄者夭之色純陽虛無之氣輕清而浮於天其字從無從火自無而生居於玄元之宫故為玄也牝者地之性也純陰穀實之氣重濁而沉於地其字從氣從米自有而生居於牝元之府故為牝也二氣升降於呼吸之間有法以制之逆其所順使陰不得而長還其所生使陽不得而微以無為有易有為無以坤元穀實之氣升而出之以天元虛無之氣降而歸之天氣既歸於身則陰滓自然蕩盡復為純陽之人矣故曰還將上夭氣以制九天魂然則玄牝二氣各有深㫖非遇至人授以口訣不可得而知也苟知二氣之所由則知玄牝之妙食其太和襲其氣母以養其神神依其氣得以歸其谷而不死豈非玄牝之功乎故曰谷神不死是謂玄牝靈樞神景內經天谷元神守之自真上下玄牝子母相親又曰玄牝乃天地之器奪之以神得之以真升降之道也何氏曰谷虛也神所舍也人自壯趍老自老趍死以精神耗散不知安靜頤神雖日宴坐而馳心於外則谷不虛而神不存何以不死惟求精於杳冥求物於恍惚形神洞達與道合真可以長生玄天也虛也牝地也靜也人能積虛以通神致靜以養真則玄牝不死之道得矣李氏曰谷神不死虛靈不昧也玄牝者一陰一陽也玄牝之門是謂天地根吕氏曰既以升降為玄牝則門者乃玄牝二氣出入之門户也泥丸宫之前有明堂明堂下通於鼻故鼻為玄門鼻通六府出入者輕清之氣以接於夭故謂之夭根牝元宫之上有黃庭黃庭通重樓而至口故口為牝門口通五臟出入者重濁之氣以接於地故謂之地根世人不窮其本不究其源便以鼻為玄口為牝則玄牝之門又將何以名之此由不造其妙也何氏曰致虛極守靜篤入得此門夭地之根盡在是矣蓋天付以氣地付以精聚而為神此其根也根不拔則命可久也故曰我命在我不在夭地又曰我與夭地分一氣而治自守根本是也倪氏曰玄者陽也乾也天玄是也牝者陰也坤也牝馬是也門者所由出入乾坤一闔一闢也根者猶木之根生之本也易所謂易有太極是生兩儀又曰乾坤易之門是也李氏曰一闔一闢生天生地劉氏曰玄陽也牝陰也門者二氣橐籥之門如前章云衆妙之門亦如語云誰能出不由户何莫由斯道也未有天地先有元氣是謂天地之根也綿綿若存用之不勤吕氏曰綿綿者不絶如線之謂也當其玄牝二氣入乎其根閉極則失之於急任之則失之於蕩皆非正也欲其綿綿續續勿令間斷若存而非存若無而非無真息來臻於泰定之中如龜之藏如蛇之蟄未嘗至於勤勞迫切也莊子云古之真人其息深深息之以踵靈樞內經混沌靈感升雲煉根綿綿不息用之胡勤何氏曰綿綿永存繩繩不窮湛兮似或存也用之雖不可既終身有不勤者勤則勞且竭矣太史公曰几人所生者神也所托者形也神太用則竭形太勞則弊形神離則死吳氏曰綿綿謂長久不絶存謂神之存勤勞也凡氣用之逸則有養而日增用之勤則有損而日耗言神長存於中則氣不消耗也李氏曰一闔一闢往來不息莫知其極動靜不惑不勞功力生生化化而無窮也列子全載此章乃曰黃帝書曰云云按葛仙公內傳黃帝時老君為廣成子為帝說此經故帝著書乃引此章云天地長久天地所以能長且久者以其不自生故能長久何氏曰天地一於生物而不自生經曰生而不有長而不宰是謂玄德皆言夭地不自生乃能長生故曰博厚所以載物高明所以覆物悠久所以成物記三言物皆主於生物而不言天地之自生李氏曰天不自天地不自地故生不息林氏曰此章以天地喻聖人無容心之意天地之生萬物自然而然無所容心故千萬歲猶一日也是以聖人後其身而身先外其身而身存非以其無私邪故能成其私何氏曰聖人配夭地而無疆奉覆載以無私以勞天下豈不以夭地與我同根萬物與我同體人皆取先己獨取後自後而人先之人皆取實己獨取虛形外而道存之又曰聖人以道為身而無身何私之有此其所以參天地而無窮歟吳氏曰後謂卑賤在下先謂尊高在上外謂清靜無為存謂長生住世無私謂後其身外其身成其私謂身先身存聖人非欲成其私也而自有身先身存之效假設衆人有心成其私者言之則為能成其私也李氏曰聖人不自聖故與天地合德林氏曰聖人之修身無容心於先後無容心於內外故莫之先而常存是以無私而能成其私此一私字非公私之私也若以為公私之私則不得謂之無容心矣此語是老子誘人為善之意及釋氏翻出來則曰真空實有真空便是無私之意實有便是能成其私之意河上公曰人以為私者欲以厚己也聖人無私而己自厚故能成其私道德真經集義卷之一
