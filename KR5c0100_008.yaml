body:
  text: 盱江危大有集第五十五章含德之厚比於赤子林氏曰含德含蓄而不露也厚者至也含德而極其至則如赤子然何氏曰大丈夫處其厚不處其薄則厚德者大人事也護精保氣執沖合和大人者不失其赤子之心是也李氏曰含德之厚比於赤子者不失赤子之心也吳氏曰含懷至厚之德於內者有如嬰兒也上篇曰專氣至柔能嬰兒常德不離復歸於嬰兒孟子曰大人者不失其赤子之心也蘇氏曰老子之言道德每以嬰兒比之者言其體未及於用也吕氏曰聖人抱道懷德深厚純粹無為無事用志不分乃凝於神如赤子焉赤子者取其始生之色而喻之也又曰上一赤子乃泥丸天帝之名也素抱內藴真純不散若嬰兒之未孩也毒蟲不螫猛獸不據攫鳥不搏林氏曰毒蟲不螫猛獸不據攫鳥不摶言物不能傷之也亦入水不濡入火不熱之意吳氏曰毒蟲蜂蠆之屬以尾端肆毒曰螫猛獸虎豹之屬以爪足拏按曰據攫鳥鷹隼之屬以翼距擊奪曰摶董氏曰全天之人物無害者何氏曰含蓄厚德不露于外與物兩無傷閡而物亦無得而傷之李氏曰赤子之心純無害於物物亦不能害蘇氏曰無心之人物無與敵曷由而傷之吕氏曰至人其神全其道大透金貫石坐在立亡驅龍伏虎役鬼制魔毒蟲不敢肆其口尾猛獸無所施其爪牙攫鳥不能逞其爪距骨弱筋柔而握固未知牝牡之合而峻作精之至也終日號而嗌不嗄和之至也林氏曰赤子骨至弱其筋至柔而手之所握甚固未知有雌雄之事而其峻亦作者精氣盛也峻赤子之命元也終日雖號而其嗌不嗄者心無喜怒氣本和也嗌咽喉也嗄氣逆也赤子純一專固故能如此而有道者亦然只是不動心也何氏曰脧赤子陰也人之初生飭骨未勞柔軟綽約所握堅固而陰陽作怒非知牝牡之欲以其精氣之盛也而有德者固精固氣固神積至易筋易骨易形者似之嗄聲破也號雖終日而聲不破以其和氣之全也而有德者敬之不喜侮之不怒同乎天和者似之李氏曰不知有男女之别其峻亦作精氣全也雖作而無心故能全其至精終日號而其聲不變沖和所至也修身以此純全其本然是謂含德之厚也知和曰常知常曰明益生曰祥心使氣曰強林氏曰和者純氣之守也知此至和之理則可以常久而不易也知此常久之理可謂明於道矣生不可益強求益之則為殃矣祥祅也故曰益生曰祥傳曰是何祥也即此祥字之意以心使氣是志動氣也強者暴也暴則非道矣故曰心使氣曰強何氏曰日夜無隙而與物為春何常如之和也是非美惡不藏靈府何明如之常也人生有涯欲益反損惠子曰不益生何以有身莊子曰言人不以好惡內傷其身常因自然而不益生又曰過度益也故曰無以生為者乃賢於貴生如餘食贅行則為妖為孽之祥矣志氣之帥氣體之充如心使氣則氣反動心為猛為隘之強矣吕氏曰和之為言以直自養初無趨蹶謬戾之患豈為自暴而失其常哉既知其和終不失其所守靜一而不變與天地為常既知常道朝徹見獨無古無今明白四達與日月參光故曰知和曰常知常曰明然而謂之神者寧不為生之所纍若非理益之必至凶祥故有喪於執迷謂之氣者寧不為心所使氣血妄作強暴滋甚故溺於邪僻若夫生生之厚妄念不斷弗知常道凶祥至矣專氣至柔攝生之理今反為心所使役其氣勇暴豈道哉惟知道者常因自然而不益生也物壯則老謂之不道不道早已林氏曰早已速已之而弗為也已者止也吕氏曰物之壯者必至於老心之強者必至於凶且道以柔弱含德為用今以壯強為心謂之不道故不道者早亡而已夫人萬物中最靈者有生則有少有少則有壯有壯則有老有老則有死此皆不知道而不能逃於造化之內者也倘能奪天地之機達陰陽遣返之妙則形可以不生神可以不化我命在我不屬天地矣如其未達非欲壯不得不壯故曰物壯則老是謂不道不道早已吳氏曰常如赤子則不壯矣惡乎老既不老惡乎已何氏曰善養德者辨之在早素不以事變滑其和故德全而神不虧所以為含德之厚也不見少壯老之氣有三變者此也第五十六章知者不言言者不知塞其兊閉其門挫其鋭解其紛和其光同其塵是謂玄同林氏曰知者不言言者不知謂道不容言也必塞兊閉門而藏之於密必挫其鋭而磨礱之使無圭角必解其紛而調理之使不紊亂必和光同塵而自不眩露此所謂至玄至妙同然而然之理也何氏曰知道易勿言難知而不言所以天也知而言之所以人也古之人天而不人道本自然行者能得聞者能言知道者以道深妙故不言昧道者以道相煩故不知塞其兊者悅不以道不悅也閉其門者由不以道不由也挫其鋭者破險峻之圭角也解其紛者離邪見之纏網也和其光者守智如愚也同其塵者忘機混迹也此六者必以其道則行真歸身能通其玄德與天為徒故曰玄同吕氏曰天地有大美而不言四時有明法而不議蓋道存乎默貴乎簡默而辨簡而當莊子曰知之者終日言而未嘗言不知者終日言而未嘗知至人知道以心而不以辨貴行而不貴言談道者以辨而不以心喪道而不喪説倘然而齧缺之問王倪四問而四不知乃真知也故曰知者不言言者不知至人能塞其兊收視返聽沉默守神胎仙泰定矣能閉乎門退藏於密禍患不能入邪氣不得襲矣能挫乎鋭則以深為根剛強息矣能解其紛則以約為紀繁亂除矣能和其光則不眩耀能同其塵則不與物競夫如是則復於至幽歸乎至一至幽謂之玄至一謂之同無可無不可矣李氏曰多言獲利不如默而無害也故不可得而親不可得而疏不可得而利不可得而害不可得而貴不可得而賤故為天下貴林氏曰有此玄同之道則天下不可得而親不可得而疏言其超出於親疏利害貴賤之外此道之所以為天下貴也吕氏曰造道之微不與陰陽為用超於形數之外上與造化者遊下與外死生無終始者友無外於物安能親也無求其惡安能疏也無求於用利莫侵也無心於物害莫及也高爵厚祿不足動其心是不以榮為貴也蒙垢受耻不足移其志是不以汙為賤也可以存生可以養形所謂道之至高至極舉天下不可得而及之吳氏曰我既玄同則不能親踈利害貴賤我矣恩雖如父母而人與之相忘不可得而親也邈然如途人而人不認相遠不可得而疏也外名位貨財而人莫能相益不可得而利也外死生禍福而人莫能相損不可得而害也勢雖如君長而人與之相狎不可得而貴也眇然如匹夫而人莫能相慢不可得而賤也凡此六者人所不能而已獨能之故為天下之最貴也第五十七章以正治國以奇用兵以無事取天下吾何知其然哉以此吕氏曰正者道之常也奇者道之變也無事者道之真也以正教為治則足以盡為政之道以奇謀用兵則足以應一時之變古之聖人立可久可大之基初非所以用兵為心也不得已而後有征伐之事故以治為正以兵為奇也天下神器不可為也為者敗之執者失之取天下常以無事及其有事不足以取天下惟體道者恬然無事順物自然何思何慮雖不取天下而天下自歸之矣以己言之心平志定氣血和暢則外魔不侵自然神宇泰定天光秀發亦猶治國之行其道則邊境寧謐也若乃六賊未除七情未去則吾身之患猶在方其塵念一起業火自焚是不得己之時也強兵不得以不用殺機不得以不發亦猶四夷八蠻交侵中國而六軍之師有不能自已者矣故曰以正治國以奇用兵以無事取天下且何以知天人之意哉蓋以治國用兵取天下之事而見之也吳氏曰正者法制禁令正其不正之謂管商之徒以正治國者也帝王之治國則以修身齊家為本而不恃法制禁令以為正奇者權謀詭詐譎而不正之謂孫吳之徒以奇用兵者也帝王之用兵則以吊民伐罪為心而不尚權謀詭詐以為竒故奇者僅可施之於用兵而不可以治國正者僅可施之於治國而不可以治天下無事者三皇無為之治也如天不言而四時行百物生不期人之服從而天下無不服從故惟無事者可以取天下也林氏曰以正治國言治國必有政事以奇用兵用兵則必須詐術二者皆為有心無為而為則可以得天下之心故曰以無事取天下吾何知其有心之不可而無心之為可以此道也夫天下多忌諱而民彌貧人多利器國家滋昏民多伎巧奇物滋超法令滋彰盜賊多有吕氏曰夫生民之所以貧富壽夭付之自爾未嘗容心於其間茍禁網繁密民多避忌不敢云為舉措失業日愈貧窮矣故至人之接物以無事為真定以有事為應迹有事無事常在定中若處喧而無惡涉事而無惱此為真定以無事無念為常也且心猶君也氣猶民也多忌則心神不安元氣雕零矣故曰天下多忌諱而民彌貧夫利器者權也權勢人主之斧斤人臣豈得而用之哉且一人之器天下皆得而用之是倒持太阿而授之以柄也權既下移則國家昏亂矣其於己也心不能純一反為七情六欲之所制神明安得而不昏濁矣故曰人多利器國家滋昏夫技巧者工妙也人君不能無為志在淫奢則民為雕琢服玩金玉奇怪之物苟容取媚投其所欲矣其於己也不能絶物而溺於異服玩好日已滋深則大朴耗散去道遠矣故曰人多技巧奇物滋起夫法令者刑教也剋核太至嚴威酷烈而舞文弄法姦宄之吏得以滋其惡民不勝其弊小則盜財大則盜國矣其於己也拘於小法執著傍門外境滋奪心靈攖亂盜我之真賊我之性者紛如也故曰法令滋彰盜賊多有何氏曰天下多忌諱而民彌貧言國之多制也山澤各有守關市各有征徵斂無度民人苦病如晏子所對齊侯者觸手犯禁民不堪命豈非忌諱多而彌貧乎忌諱少則安業矣經曰國之利器不可以示人若民多利器則國家滋昏慮其竊上之機權也故曰工無淫巧其器完而不飾若人多技巧奇物滋超慮其敗俗之朴素也上無苛令其事任而不擾若網密文峻姦宄不勝則流為盜賊之歸者慮其法令之過也然後益知我無為而民自化等語古聖人不我欺也李氏曰多忌諱多利器多技巧多法令皆不正也上無忌諱則民裕絶權謀則民化薄稅斂則民富道之以德則民朴故聖人云我無為而民自化我好靜而民自正我無事而民自富我無欲而民自朴吕氏曰老君為萬教之祖猶舉故聖人云守之以謙不敢自陳也故有國有民無所制作未嘗不以無為為治則民遂其生庶俗自化矣夫煉真之士以我為神以民為氣神凝無為元氣自化為液液自化為血血自化為筋筋自化為骨骨自化為髓髓自化為精精自化為玄珠玄珠自化為金丹陰符經所謂萬化生乎身是也故曰我無為而民自化節用愛人去華務實未嘗不以儉嗇為先則民厚其業家自富已煉真之士常無欲則息長息長則氣滿於三田之內故曰我無事而民自富安靜不言淡泊自守未嘗不以厚本為意則民抱天全其俗純正矣夫人神躁動則氣息粗驟神寧謐則百關調暢元氣自正矣故曰我好靜而民自正無欲沖虛崇本棄末未嘗不以簡要為務則民誇企其性自朴矣煉真之士元神恬寂欲念不生氣煉真凝成胎結象故曰我無欲而民自朴何氏曰我無為而民自化若為者敗之民反不化矣我好靜而民自正若動而失之民反不正矣我無事而民自富若多爭則多患民反不富矣我無欲而民自朴若多欲則多纍民反不朴矣此至治之要道也昔蓋公善治黃老所與曹參言者惟治道貴清靜而民自定推此類具言之曹參得其術相齊國九年大治李氏曰無為無欲無事好靜皆正也以此治國則海晏河清以此行道則道泰時康以此修身則氣固神凝一人正萬人皆正一心正萬化皆正一身正萬事皆正正之義大矣哉第五十八章其政悶悶其民淳淳其政察察其民缺缺福兮禍所倚禍兮福所伏孰知其極其無正邪正復為竒善復為訞民之迷其曰固已久矣林氏曰悶悶者不作聰明也察察者煩碎也淳淳自樂也缺缺不足也此亦有心則為害無心則自治之意禍福無常更相倚伏敦知其所極止正者定也其無正耶言倚伏無窮不可得而定也天下之事奇或為正正或為奇善或為訞訞或為善利害是非莫不皆然此亦禍福倚伏之意世人迷而不知徒分奇正徒分訞善其迷蓋非一日矣李氏曰上章無為無事使民自化寬大之治也故次之以其政悶悶是謂上寬裕則民純實上多事則民昏暴悶悶寬也察察謹也寬則得衆盡法無民禍福自倚正奇相待善訞相反理之然也可不戒諸修福不如避禍用正不若間邪正雖為善茍自矜為奇德則反為訞正之為正斯不正矣善之為善斯不善矣吕氏曰古之人體天之行政教寬大任物自然常若悶悶故其俗淳朴修真之士抱神溟涬漠然寬大忘乎視聽無所分别其息深深淳淳仙道得成矣故曰其政悶悶其民淳淳後世有為之君其政峻急以法繩人察見淵魚猶以為未至民之失性莫甚於此由是動觸禁網雕弊離散風俗日益衰矣末學初真之士未造道妙真氣不凝役心運思於事物之中專務苛察崇尚機變以是而治身則缺缺然喘息粗急真元離體非養生之道也故曰其政察察其民缺缺且治亂之首禍福之源自古有之亦由人所召夫禍之藏於福中也福至于極若不能謙抑祗畏而乃妄自驕奢未有不為禍者矣福之隱於禍內也若處患難之中頓改前非內自修省則必反為福矣天地之道有休否日月之運有虧盈此倚伏之數禍福相因莫知紀極也有天下者曾未若守之以清靜任其自然不利貨財不樂壽不榮通不醜窮如是則禍福倚伏何有於我哉造真之士不為福先不為禍始物我兼忘豈禍福倚伏之可纍乎故曰福兮禍所倚禍兮福所伏敦知其極陰陽之運生殺係焉動靜之間吉凶倚焉邪之與正善之與訞敦能定之哉正則正道也奇則邪徑也善則善性也訞則異類也本乎一心流而為四非一氣之正也其正之者必聖人有心正之恢譎詭怪反害于正有心為正訞祥變異反害乎善善訞奇正迭相用事民性不一處於邪正之間迷惑其所由來久矣譬諸中下之士有聞道者方且隙然生善之一念而無卓然獨立之定力乃惑於見聞一彈指間妄念忽起而正復化為奇怪善復化為訞邪莊聖所謂神奇復化臭腐是也聖智難知鬼神莫識况常流乎故人迷妄其來久矣豈獨今哉故曰其無正邪正復為奇善復為訣民之迷其日固已久矣是以聖人方而不割廉而不劌直而不肆光而不耀何氏曰割害劌傷也方則易割廉則易劌吾以方以廉以身率民使化而遂以此為害人傷人之事有不為也肆逞耀眩也直則易肆光則易耀吾以直以光以道示民使化而遂以此為自逞自眩之事有不為也廉而不劌古全句見聘義經注甚明改劌作穢者非是莊子廉劌雕琢字義相近董氏曰行方而德圓故無割截之迷劌傷害也清而容物故不劌肆布列也大直若屈而不肆光而不耀者復歸其明也此四者皆悶悶政也蓋聖人惟恬淡無為而方廉直光之用整然於其中而人不知使天下各安其性命之情而不陷於一偏所以無割劌肆耀之過而禍福何有哉第五十九章治人事天莫若嗇吕氏曰聖人之治無為無事省財節用則倉廪充實民康俗阜然後保精愛神齊心潔己以昭祀上帝則人神皆和矣且夫聰明睿智動靜思慮是其心內受用者屈伸俯仰貌像聲色是吾身外受用者兩者交通吻然契合要在各得其宜此嗇之為義也修諸內者以修身為治人治自己之人也以養元為事天事自己之天也天則腦宫是矣純陽赫赫在乎上九天之上無陰也自玉京關之上皆天也嗇者保愛也愛視則養神愛聽則養虛愛言則養氣愛息則養和愛腦則養血故曰治人事天莫若嗇何氏曰有國者處天人之際凡所以上事天下治人多求之外而不求之身太史公以道為六家首專取其精神專一謂之大道其曰動合無形則與天符合者此精神也曰贍足萬物則使民贍給者亦此精神也又曰凡人所生者神也所托者形也精太用則竭神太用則疲精神離則死故聖人重之夫重之即嗇之之説嗇者吝惜之至也聖人守內不守外夫曰節曰愛曰守皆嗇之意也不嗇口則多言損氣五味厲爽不嗇耳目則五聲亂耳五色亂目如曰快其情者疲其神其嗇也哉嗇精嗇氣嗇神此道上可賔九清下可福群生吳氏曰嗇也者留形惜氣之要術也李氏曰治人事天莫若從儉以國言之省刑罰薄稅斂以身言之也省言語節飲食以心言之省思慮絶視聽存其心養其性可以事天也夫惟嗇是謂早復早復謂之重積德重積德則無不克無不克則莫知其極莫知其極可以有國吕氏曰且嗇者愛育精神勤儉有常如性無易如德不遷省費儲用自足儉嗇而智恬交養情不外簜性自內復若夫愛其形保其神貴其氣固其根精神腦血不致耗散早得復本還元故曰夫惟嗇是謂早復夫節儉理民愛嗇其神以上心德之一也服從于道積而彌新人皆和悅德之二也有一有二德之重也修之內者早能嗇復則氣柔和萬神安暢復我本來不隨物轉深矣遠矣故曰早復謂之重積德然重積者克己復禮修道以仁未嘗眩鬻天人信順無一物敢違是以四方向慕無不克服矣故曰重積德則無不克而無不克者萬物歸化道德無窮何往不通內煉之士大德有容以其不爭奚往不克至一不逆真常不變參萬歲而不老豈知其極故曰無不克則莫知其極夫其極之莫知後其身而身先天下樂推而不厭被堯之仁樂堯之化其國可保而有餘裕矣內煉之士體道之無窮育德之無極國可以有者喻乎身可以存也故曰莫知其極可以有國何氏曰重積德則積水成海積氣成神也無不克則應物變化無所不宜也莫知其極乃合大道混混溟溟也為國者果能此道亦可以有其國而久安矣林氏曰早復者言嗇則歸復於根返本遣元也德至此則愈積而愈盛矣重愈積之意也有國之母可以長久是謂深根固蒂長生久視之道也吕氏曰始也修性以反德今也積德而入道為有國之母也則可以茂養百姓福祚社稷亘萬古之長久矣喻之於身有國之母者氣也形為受氣之本氣是有形之根氣因神識而生形乃因氣而立故伏義得之以襲氣母蓋神是氣之子而氣是神之母也形不得氣無因而成氣不治形將何為主氣散則身謝氣在則身存且久也故曰有國之母可以長久積德之君治人事天厚國養民者植根於無為固蒂於清靜社稷綿遠故謂之長生臨御常照故謂之久視己之根者腦也蒂者臍也深根運元氣以補腦也仙諺云欲得不老遣精補腦然後密樞機閉欲户藏元精於杳冥之府結胎息於丹元之宫上赤下黑左青右白中央黃暈之間乃黃庭結寶之處正當臍間是謂固蒂也今欲修長生當先固蒂呼吸太和返神服氣胎息綿綿伏住臍間長生與天地為常久視與日月參光矣仙諺曰欲得長生先須久視久視者內視也林氏曰此章以治國喻養生也養生而能嗇則可以深其根固其蒂可以長生可以久視也蘇氏曰以嗇治人則可以有國以嗇事天則深根固蒂古之聖人保其性命之常不以外耗內則根深蒂固而不可拔雖長生久視可也蓋治人事天雖有內外之異而莫若嗇一也第六十章治大國若烹小鮮吕氏曰治大國者不可煩煩則民亂烹小鮮者不可擾擾則魚爛故善治國者若烹膚寸之魚調其水火使之自熟則魚可全若乃擾之則魚傷魚傷則糜爛於釜矣善治民者和其政教使其自得其民自安若乃擾之則民傷民傷則潰於國矣是以治道貴清靜國以民為本身以氣為本愛民治國則國昌愛氣治身則身久故設此喻愛民惜氣之法如烹小鮮不可攪擾動則耗廢矣李氏曰以正治國其政悶悶治人事天皆治國之義小鮮者細小之魚也譬以烹鮮撓之則糜言平治天下撓之則亂也林氏曰烹小鮮者攪之則碎治國者擾之則亂清靜無為安靜不擾此治國之道也以道蒞天下其鬼不神吕氏曰聖人神明萬物之主也不得已而臨蒞天下以無為之道治之故風雨時若水旱不作人心沖和鬼神咸服於明德鬼既安於幽趣不敢出其靈響現其神變矣以道治一身之天下者智恬交養神宇泰定天光內發祅氣淪滅邪鬼豈敢現其神變哉吳氏曰蒞臨也鬼謂天地之氣神靈怪也人之氣與天地之氣通為一有道之主以道蒞臨天下者簡靜而治不擾動以傷害其民故民氣和平充塞兩間相為感應而天地之氣無或乖戾故其鬼不為靈怪以興災也何氏曰夫以道蒞天下神民安之莊子聖人得不已而臨蒞天下莫若無為無為則人安其性命之情莫之為而常自然萬物莫能為之害也河上公以道德居位治天下則鬼不敢現其精神以犯人也非其鬼不神其神不傷人非其神不傷人聖人亦不傷人吕氏曰非其鬼無神變靈響蓋聖人守其常位宜其幽贊天地之大美戬助協順惟福是宜非特鬼不敢神神亦不敢妄肆妖禍傷吾之民矣且有道之士非其鬼無神變以其不能傷犯自然之人也故曰非其鬼不神其神不傷人神既安於正直非不傷害於民以其服聖人之明德自處幽暗而不敢示其怪變爾聖人憫一夫之失所未嘗不思所以救之之力父臨子育雖紬繹帡幪保惜之不暇何傷之有喻於人得道自然非獨神明不敢犯聖人亦不傷之也聖人方且尊道貴德豈傷於有道之民哉故曰非其神不傷人聖人亦不傷人吳氏曰鬼之所以不靈怪者非不靈怪也雖能靈怪而不為妖災以傷害人也又謂鬼之靈怪所以不傷人者非自能如此也以聖人能使民氣和平而不傷天地之氣故天地之氣亦和平而不傷害人也曰鬼曰神皆天地之氣名二而實一河上公其鬼非無精神也不能傷自然之人也夫兩不相傷故德交歸焉吕氏曰人得治於陽鬼得治於陰人得全性命鬼得全至神兩者交悅無所傷焉遂至天清地寧陰陽調泰年穀常豐物無札傷國無疵癘鬼無靈響其德交歸之矣林氏曰幽則為陰陽明則為聖治此兩者自不相傷則其德皆歸之言天地得其自然之道聖人亦得自然之道各有其德而不相侵越故曰交歸焉不相傷不相侵也此章先頓一句以言不擾之意既提起一句如此下面却言三才之道皆是不擾而已以道蒞天下此天下字包三才而言之凡在太虛之下臨之以道天則職覆地則職載聖人則職教三者各職其職而不相侵越則皆得其道矣河上公鬼與聖人俱兩不相傷也夫兩不相傷人得治於陽鬼得治於陰人得全其性命鬼得保其精神故德交歸焉何氏曰古之人在混茫之中與一世而淡漠焉當是時陰陽知靜鬼神不擾四時得節萬物不傷群生不天人雖有知無所用之是之謂至一莫之為而常自然此也第六十一章大國者下流天下之交天下之牝牝常以靜勝牡以靜為下林氏曰借大國小國之得所欲以喻知道之人宜謙宜靜非教人自下以取勝也三代而下世有取國之事故因其所見以為喻爾下流者自處於卑下也大國之人能自卑下則可以合天地之交譬如牝者以靜而勝其牡也自下者以靜為道故曰以靜為下吕氏曰江海所以能為百谷王者以其善下之也百川朝宗亦猶大國能自下無不包容則民交趨而會之矣傳曰天地交萬物生人道交功勛成此之謂與一身之設一國之象也忘其身則百骸理虛其心則和氣歸虛無者聖人之所居可謂大國矣以其不爭故天下莫能與之爭至於萬物之精華交而會之猶衆水之趨下流也故曰大國者下流天下之交天下之牝者初不容心於勝惟其靜是以常勝以勝為下故天下之交歸焉牝靜牡動柔靜剛動也剛為柔所制動為靜所伏經曰知其雄守其雌為天下溪此實用謙下之德有國有民故無往而不克也取之己也天一生水在人為精地二生火在人為神神者陽中之陰故謂之雌亦天下之牝也知雄守雌專氣致柔以陰煉陽為神機妙用也故牝常以靜勝焉靜則群動趨也下則衆齊赴之此修真之要也故大國以下小國則取小國小國以下大國則取大國或下以取或下而取林氏曰以大取小曰以取以小取大曰而取此兩句文字亦奇特吕氏曰以大事小唯仁者能之以小事大唯智者能之以大事小者樂天者也以小事大者畏天者也樂天者知天命畏天者保其身吳氏曰大國本在小國之上者不恃其尊而謙降以下小國則能致小國之樂附小國素在大國之下者甘處於卑而俯仰以下大國則能得大國之見容下以取謂大國能下以取小國之樂附下而取謂小國能下而取大國之見容也何氏曰大國以下小國如湯事葛文王事昆夷小國以下大國如太王事獯鬻句踐事吳之類李氏曰上以下下下下以下順上上遜下順德交歸焉修身以此心愈下而道愈高身愈退而德逾進大國不過欲兼畜人小國不過欲入事人夫兩者各得其所欲故大者宜為下林氏曰大國之意不過欲兼畜天下之人小國之意不過欲鎸刺入求於人二者皆非自下不可惟能自下則兩者各得其欲然則知道之大者必以謙下為宜矣黃茂林解云此一章全是借物以明道此語最的當吳氏曰大國之下小國者欲兼畜小國而已小國之下大國者欲入事大國而已兩者皆能下則大小各得其所欲然小者素在人下不患其不能下大者非在人下或恐其不能故專言大者宜為下吕氏曰大國以下小國者不過欲兼并畜聚小國之衆為其君長爾小國以下大國者不過盡禮以敬事大國資為援助爾然小大各當其分互有所持不相侵撓安其居樂其俗而小國柔服理之常也大國謙下故宜曲而下全之使可小可大所以致天下之交也何氏曰此章首言大國者下流末言大者宜為下中間雖合大國小國並言而先後惟主於大國而言者小者易為下此不待教大者易以盈難為下雖教未必行故再三言之與易同道也第六十二章道者萬物之奧善人之寶不善人之所保何氏曰道者陶治萬物修治無形寂然不動大道混冥深闊廣大不可為外析毫剖芒不可為內此所謂物之奧也如屋之堂奧非造次所得見莊子道者萬物所共由故此章先曰寶後曰貴也道不遠人人自遠道雖有善不善之判而不善人之所保亦隱然藉此道以為安也吳氏曰萬物之奧謂萬物之尊貴者奧室西南隅也尊者所居故奧為貴道之尊貴猶奧也寶謂善人所重善人向道而進修則可以取重於人故曰善人之寶不善人向道而改悔亦可自保其身故曰不善人之所保美言可以市尊行可以加人人之不善何棄之有故立天子置三公雖有拱璧以先駟馬不如坐進此道李氏曰美言可以市足以悅衆尊行可以加人足以出衆也人之不善我亦善之何棄之有立天子置三公作之君作之師教化下民使不善者從其化拱璧駟馬不足為貴不如坐進此道修己以安百姓先之以敬讓而民不爭陳之以德義而民興行示之以好惡而民知禁是以聖人常善救人故無棄人柴氏曰道味有益如寶入市故曰美言可以市德重無不服故曰尊行可以加人人之不善何棄之有教以化之何敢棄之故立天子置三公所以輔行此道也吳氏曰善人以道而取重於人者其嘉言可愛如美物可鬻於市其卓行可宗可以高出衆人之上不善人以道自保其身者畏威寡罪身獲全安是此不善之人道亦何嘗棄之也拱璧合拱之璧駟馬一乘之馬拱璧駟馬為至貴然未足為貴也不如進此道之為尤貴拱璧駟馬之貴不如此道也故萬物貴之而以為奧也何氏曰不以寶玉車馬為榮而以坐進此道為貴古之所以貴此道者何也不曰求以得有罪以免耶故為天下貴林氏曰且古之以此道為貴者何也求則得之道本在我為仁由己而由人乎哉有罪以免者言一念之善則可以改過即惡人齋戒沐浴則可以祀上帝也不曰如謂詩不云乎道無賢愚悟則得之此所以為可貴故曰故為天下貴何氏曰無一夫不獲所欲與聚所求皆得君子樂得其道而止於善小人樂得其欲而耻為不善雖有不善者亦莫不回心向道遷善遠罪而不自知者此有道之士獲大用於世而亦以見斯道之功用貴而益貴也謂之古之貴此道者匪今斯今振古如斯第六十三章為無為事無事味無味吕氏曰聖人為無所為而任物性之自為則無為而無不為心曷常動哉事無所事而從物務之自事物自事而無不事身曷常勞哉味無所味而隨物氣之本味物本味則無味而無不味口曷常嗜哉心不動則衆妙可觀身不勞則精神不虧口不嗜則靈液不竭至人為於鍊養而不為妄作事於修真而不事於塵務味於道德而不味於腥羶故曰為無為事無事味無味林氏曰無為而後無不為故曰為無為無所事於事而後能集其事故曰事無事無所著於味而後能知味故曰味無味李氏曰為無為發上章萬物之奧為無為無所不為事無事事事有成味無味其味幽長此三者道之奧也大小多少報怨以德圖難於其易為大於其細天下難事必作於易天下大事必作於細吕氏曰涉乎有形則有小大係乎有形則有多少物量無窮原其有用應而不藏付之素定可以大則大可以小則小可以多則多可以少則少萬有不同俱歸于一一皆以道御之報之以德人無重惡何怨之有至人其道甚大其朴甚小其用雖多其要甚少大小含太虛於方寸多少總萬有於一真大同於物而萬物與我為一奚所怨哉故曰大小多少報怨以德夫是非美惡怨怒恩德皆生於微漸始於易終成難初於細而後成大今使圖度於始易之時則於終無難矣營為於初細之日則於後必大矣故艱難之事必啓於容易欲令於容易之時而圖之重大之事必興於細微欲令於細微之時而去之己之難事者修仙也己之大事者行道也莫難於修真苟如易以圖之其志固心堅何難之有莫大於行道苟如細事以為之為之不輟積細而漸至於大矣林氏曰能大者必能小能多者必能少能怨者必以德能圖難者必先易能為大者必先於其細自味無味以下皆譬喻也難事必作於易大事必作於細只是上意申言之也劉氏曰或謂孔子以直報怨今也以德報怨何也然老子教人惟欲處其柔弱與天為徒而無所爭可以弭天刑遠人禍若以直報怨怨何由已當時孔子故有所激而言終不若報之以德為善也是以聖人終不為大故能成其大吕氏曰聖人不為難大之事而無為無事易簡易知故能成其可久可大之基聖人懷抱道德自知不自見自愛不自貴終不為大方寸之中真性之內無不忘也無不有也淡然無極而衆美從之故曰是以聖人終不為大故能成其大李氏曰聖人功業大成不自為大天不自天成天者物聖不自聖成聖者民以其不自聖故能成聖林氏曰聖人不自大而能謙能卑所以成其大夫輕諾必寡信多易必多難是以聖人猶難之故終無難吕氏曰輕諾者不誠信也妄應之必為虛誕矣多易每事忽略也妄為之必為難矣夫以聖人之材尚難於細易輕諾至於每事不敢輕易其於道則勤而行之終亦無難矣輕諾之後其信必寡多易之後其難必多故謂先難而後獲者難易相成也李氏曰難事易成易事難成易事不可輕是輕則人忽之故聖人猶難之得之難失之難凡事不輕易故終無難林氏曰輕諾者多過當故必至於失信以易心處事者多至於難成此亦借喻語也但添一夫字其意又是一轉前言易矣恐人以輕易之心視之故如此斡轉曰易非輕易也聖人猶以難心處之遂至於無難况他人乎此意蓋謂前言易者無為無事而易行也非以輕易為易也何氏曰口惠而實不至災必及其身輕諾者信亦輕也言之得無訒易者多則難亦多也聖人處無為之事沖淡無之味已深入無形之道而有無相生細大難易相成隨物而形皆道也雖物物而不物於物又能曲成萬物而不遣故曰無不忘也無不有也乃見聖人之心非有亦非無也道德真經集義卷之八
