body:
  text: 盱江危大有集第七十三章勇於敢則殺勇於不敢則活此兩者或利或害天之所惡孰知其故是以聖人猶難之林氏曰勇於敢爲者必至於自戕其身臨事而懼是勇於不敢也活者可以自全也敢者之害不敢者之利二者甚曉然天道惡盈而好謙則勇於敢者非特人惡之天亦惡之也而世人未有知其然者故曰敦知其故聖人猶難之者言聖人於此道爲難能也何氏曰强梁者不得其死好勝者必遇其敵此勇於敢則殺之戒也臨事而懼好謀而成此勇於不敢則活之道也爲此說者言君子則吉小人則凶也然此二者或利或害爲善得吉故多其幸而罹於凶者有矣爲惡未始不及於凶其幸免者亦時有焉由前之說吉凶之於善惡猶影響也由後之說禍福之來似不在我常人之慮遂以天道好惡有不可知其故有不可知其事有不可信者聖人畏天命修身以俟曾不敢以常人之見而輕用其心也惟知天之不假易而其難其慎又豈無其故哉李氏曰接上章民不畏威言世人不畏公法敢以好勇殺身之本也勇於不敢終身無害勇於敢血氣之勇也勇於不敢者義理之勇也天之所惡造化不容也孰知其故知則不敢是以聖人猶難知者不敢輕示也天之道不爭而善勝不言而善應不召而自來觶然而善謀天網恢恢疏而不失林氏曰聖人之於道雖以無爲不爭而是非善否一毫不可亂此數句又以天喻道也何氏曰天雖剛德猶不于時此不爭也而人衆勝天天定勝人乃勝之善者天不言以行與事示之而感必有應應復爲感乃應者不召而自來如日月寒暑之往來天高日鑒於陟降誰其召之繟然而善謀古韵繟緩也寬也於義爲長如作默然則與不言之意重如作坦然則與不爭之意復天道雖似悠緩而其巧於報應尤甚於人之機謀則似有神其筭者繟然寬緩如書云須暇之意故天網恢恢乎有容雖不密亦不漏也河上公曰繟寛也天之網羅恢恢甚大雖曰踈遠而察人之善惡無有所失董氏曰此章告人當勇於道不當勇於力繼明天道之自然而末又戒之天網之不漏使人信之無疑也第七十四章民不畏死奈何以死懼之若使民常畏死而爲奇者吾得執而殺之孰敢林氏曰此章言人之分别善惡自爲好惡至於泰甚者皆非知道也故以世之用刑者喻之言用刑者不過以死懼其民而民何常畏死使民果有畏死之心則爲奇邪者吾執而刑之則自此人皆不敢爲矣故曰吾得執而殺之敦敢今奇邪者未嘗不殺而民犯者日衆則民何嘗畏死哉吴氏曰奇不正也使民常有畏死之心而奇邪爲惡之人吾得以執而殺之則人人知畏孰敢爲惡然雖殺惡人而人之敢爲惡者不止則是民愚不知畏死雖爲惡者必遭刑殺彼亦無所惧上之人奈何欲以死懼之而輕易殺人乎河上公曰老子傷畤王不先道德化民而先刑罰常有司殺者夫代司殺者殺是謂代大匠斲希有不傷其手矣林氏曰殺者造物也天地之間爲善爲惡常有造物者司生殺之權其可殺者造物自殺之故曰常有司殺者爲國而切切於用刑是代造物者司殺也以我之拙工而代大匠斲削則鮮有不傷其手者此借喻之中又借喻也此章亦因當時嗜殺故有此言其意亦豈盡廢刑哉天討有罪只容無心可也吴氏曰不以殺人懼其民則爲惡之人可不殺乎曰有司殺者在司殺者天也惟天能殺人惟大匠能斲木人而欲代天殺人猶非匠而欲代匠斲木也代匠者其手必多有傷以譬代殺者其身必有害也蓋不有人禍必有天刑何氏曰夫刑威雖一人之權而非一己之所得私常有司其刑殺者人主政不欲以己代之孰爲司殺之司上有司於冥冥之中者天討有罪五刑五用是也下有司於昭昭之中者書曰士制百姓于刑之中是也人主中持其柄折民惟刑有不得已者則奉天憲付有司以示平民之治曰百姓自有罪爾自有罪子一人何心焉殺人者天也士也非我也人誰得而怨其上者此而不行乃拂天之理倚官之刑認作威爲己事是猶大匠宜斲彼袖手旁觀而吾血指汗顔以代之豈不傷哉人主以天人之心爲心欲善而民善矣焉用殺有君如此則天下遷善遠罪皆樂其生而重其死導迎和氣之大者此聖人言外之意也第七十五章民之饑以其上食稅之多是以饑民之難治以其上之有爲是以難治林氏曰食稅之多言取於民者太過也上之有爲言爲治者過用智術也上貪利則民愈饑上好智則民愈難治吴氏曰食謂君所食於民者稅則民之所出以供上之食者也上多取於民則民貧而饑矣上有爲而以智術御其下則下以奸詐欺其上而難治也吕氏曰民者國之本也八政以食爲先食之爲論以鄙而司農以爲大計其如此用在於民稍失其宜爲害亦大聖人授之田勸督百官使不違其時征輸有制使不傷其力疏爲九一之法定爲什一之賦務從其輕耳倘或違民之時奪民之力以非常之求供無厭之欲民困其稅斂之重爾爾疲瘵民有饑色野有餓盜賊貧窮變詐百出奸生於國人莫之知矣身以氣爲民氣足則神全今言其饑是氣之不滿也是其不能忘言塞慾故曰民之饑以其上食稅之多是以饑古之民安居樂俗耕而足食織而足衣孰云難治乎若上以有爲有欲有事網密令苛政煩信弛故擾其民而民不勝其擾故難治也譬之己也氣之難清而易濁息之易粗而難柔况有爲而擾之乎民之輕死以其求生之厚是以輕死夫惟無以生爲者是賢於貴生林氏曰凡人過於自愛反以喪其身飲食太多亦能生病此其一也過於自愛自養欲其謀生故曰求生之厚輕用其身以自取死故曰輕死忘其身而後身存故曰無以生爲者賢於貴生貴生猶前章曰益生求生之厚者也貴猶勝也吴氏曰輕易也生生之厚謂求生之心太重也賢猶勝也貴生謂重其生即生生之厚者也求生之心重而保養太過將欲不死而適以易死至人非不愛生順其自然無所容心若無以生爲者然外其身而身存賢重於其心以貴生而反易死者也何氏曰夫無以生爲者是賢於貴生所謂與造物者爲人而遊乎天地之一氣忘其肝膽遺其耳目反覆始終不知端倪茫然彷徨乎塵垢之外逍遥乎無爲之業則不以物傷生此乃過於賢厚其生天下亦賴以全其生豈不美哉第七十六章民之生也柔弱其死也堅强萬物草木之生也柔脆其死也枯槁吕氏曰夫道者神之主神者氣之主氣者身之主道存則神存神存則氣存故人之生也含元和之氣抱眞一之精形全神旺萬炁朝元流通不息故其柔弱可知也及其死也元和之氣散眞一之精竭形虧神逝百體堅强矣故曰人之生也柔弱其死也堅强嘗試論之萬物草木之生也天地之炁流行乎其内陰陽之炁潤澤乎其外春氣一動膏雨遍沾芽蘖敷榮鮮妍秀發風霜纔扇殺氣相仍枯槁變更柯條凋謝有識者以道存亡爲生死無識者以氣聚散爲枯榮故曰萬物草木之生也柔脆其死也枯槁吴氏曰人生則肌膚柔軟而活動可以屈伸死則肌膚冷硬而强直而不能屈伸也草木生則枝莖軟脆死則枝莖枯槁堅硬也林氏曰柔弱堅强皆借喻也老子之學主於尚柔故以人與艸木之生死爲喻故堅强者死之徒柔弱者生之徒吕氏曰陽氣之所居木可卷而草可結也陽炁之所去水可凝而冰可析也故神明陽炁生之根也柔弱滋潤物之芽也欲剛者必以柔守之欲强者必以弱保之今夫堅强不能養和也與物爲敵豈免傷乎柔弱者不失中也與物同波故能全其生也何氏曰天下之柔弱者道也氣也所以能貫天地而包萬物故人物與生爲徒者必其道與氣存焉與死爲徒者必其道與氣去之林氏曰徒類也吴氏曰上文言人與草木之形體生則柔死則堅推此物理則知人之德行凡堅强者不得其死是死之徒也柔弱者善保其生是生之徒也是以兵强則不勝木强則共强大處下柔弱處上吕氏曰兵凶險之器鬭爭之具也所觸之境與敵對者也恃其强而輕其敵非義也不義而輕於用事豈勝乎故曰兵强則不勝木之小也柔且弱及其强則合拱矣木猶如此况於人乎况於國乎故曰木强則拱强大者勇敢之士柔弱者君子之道推以力者强大爲勝推以德者柔弱爲勝故天下有常勝之道曰柔有常敗之道曰剛蓋世之人任力不任德忘本而逐末達者以道觀之則柔弱勝剛强此理之必然者也何氏曰齒剛則折舌柔而存理也共如木墓拱之拱物壯則老是謂不道也兵强則反不勝何也以其恃國家之大矜人民之衆欲見威於敵國者故曰驕兵兵驕者滅也强大處下柔弱處上非但以木爲喻而以柔道理天下乃君上之道如妄自尊大不過井蛙之見耳爲人上者可不鑒哉非但道家以卑弱自持也林氏曰兵之恃强者必不勝木之初生者皆柔乆則堅强至於拱把則將枯矣故知道者以柔弱爲上堅强爲下吴氏曰共兩手所圍也董氏曰此章言柔弱可以保沖和之氣第七十七章天之道其猶張弓乎高者抑之下者舉之有餘者損之不足者補之吕氏曰天法于道與道同功無爲而成不言而化四時資之以行百物待之以生未嘗差忒而不失公平正直之理故曰天之道其猶張弓乎夫工人之爲弓也無殺無生無噏無張制以規矩督以準繩弦高急者寬而緩之弦弛下者攝而上之其有餘者削而損之其不足者補而益之故弓可抨而矢可行也人君道當法天道抑强扶弱損有利無弛之張之調之練之百發百中以準的爲道虧盈益謙稱物平施相爲表裏與夫天道均其用也得之於心應之於手故曰高者抑之下者舉之有餘者損之不足者補之李氏曰接上章强弱之義損有益無天道也强大者必受損柔弱者必受益董氏曰天道無私皆當適中天之道損有餘而補不足人之道則不然損不足以奉有餘吕氏曰無爲而尊者天道也有爲而卑者人道也主道化者天道宰禮法者人道蓋天地有餘則損不足則與非有心者所能得遠非無心者所能得近感而遂通默而行之者也人則不然性失中而情不一好高惡下奉有棄無不能同天道損益去道遠矣林氏曰天之於物每每然也而人之爲道何爲而不然乃欲損人而益己欲以天下之不足而爲一己之有餘失天意矣孰能以有餘奉天下惟有道者吕氏曰且夫有其餘者不可不損其不足者不可不補也故有道者不獨親其親不獨子其子以天下之子而爲子其待人也如此之重其待己也不輕矣非聖賢之心其孰能爲是也故曰孰能以有餘奉天下惟有道者林氏曰惟有道之人乃能損我之有餘以奉天下李氏曰惟有道者則天而行損情益性損多益寡損己益人損有餘補不足損之又損以至於無爲是以聖人爲而不恃功成不處其不欲見賢吕氏曰聖人圓通爲智因物爲心𩐎萬物而不爲義澤及萬世而不爲仁無自伐之心施爲而不矜恃其美無自滿之志功成事遂而不居其不欲人知其賢德也若昭昭于世則是自賢豈有道之士乎林氏曰聖人雖有爲於天下而不以自恃雖功成而不居其功雖有至賢之行而不欲以此自見此爲道曰損必至損之而又損也吴氏曰聖人之功能蓋天下此其有餘者也不自恃其所爲之能而若無能不自居其所成之功而若無功不欲顯示其功能之賢於人皆損己之有餘也第七十八章天下柔弱莫過於水而攻堅强者莫之能勝其無以易之也吕氏曰天下之物不同而柔弱之極者莫過乎水而已平山澤穿金石通滯礙攻堅强善利萬物善入萬物任人壅决隨器方圓化而爲氣爲雲雨爲霜雪故天一生水源泉混混浩浩蕩蕩雖千曲萬折未始失其爲水者是得夫沖一之妙者然施之於物能强能弱能剛能柔故能勝物幾於道不可以易一身柔弱莫過於華池靈液至人斡旋運轉無乎不至或漱咽以溉五臟或搬運而達三關至於透尾閭過夾脊泝流直上而補於腦非神水其可以易哉何氏曰東西可决而流天下至柔弱者莫如水而穿太山之石决千金之堤攻堅强者亦莫如水此古今不易之論也林氏曰水之至弱而能攻堅强世未有能勝之者千金之堤敗於蟻穴之漏是弱之勝强者無以易於水也弱之勝强柔之勝剛天下莫不知莫能行吕氏曰水之滅火陰之制陽舌柔齒剛舌存齒亡天下莫不知而世俗之所共聞也天之道不與物爭故勝物世之人常欲勝物故鮮有勝者蓋知而莫能行之者不可得志於天下有知而能行之者决能得志於天下也何氏曰列子天下有常勝之道有常不勝之道常勝之道曰柔常不勝之道曰强二者易知而人未之知黄石公授子房亦惟柔勝剛弱勝强兩言耳此易知而未知且雖有知者而莫能行惟聖人能知能行耳林氏曰弱勝强柔勝剛如水之易見人莫不知之而至道在於能柔能弱者莫之能行也李氏曰柔勝剛弱勝强天下人皆知而莫能行何哉不肯卑下故也是以聖人云受國之垢是謂社稷主受國之不祥是謂天下王正言若反吕氏曰聖人之德同於天地天地至大洪纎巨細好惡皆在其中聖人至尊賢愚貴賤皆往資之又能忍垢藏蓄奈辱包荒以輔仁義柔弱善勝之道則民仰其德而不離散可以常奉社稷而爲主矣聖人謙讓柔順法天之行兵戈水火疾厄旱蝗皆劫運之所至是天之或有警策于人也惟其不移罪於人而移罪於己則四海歸仁六合宅心亦可爲天下之王矣故曰受國不祥是謂天下王世俗以受垢受不祥爲可惡聖君以受垢受不祥爲可樂樂其樂也未必不爲福惡其惡也未必不爲禍正言若與俗相反蓋世俗掩己之惡揚人之惡聖人認己之惡而掩人之惡所以背馳非至正者故曰正言若反何氏曰孤寡不穀王公所稱是皆柔勝剛之意此天下之正理而世人不知不行聞聖人有柔勝剛之言似乎相反而實正論也董氏曰此章言柔弱能容則爲物所歸也第七十九章和大怨必有餘怨安可以爲善林氏曰恩怨兩忘方知至道人有大怨於我而必欲與和雖無執怨之心猶知怨之爲怨則此心亦未化矣雖曰能與之和此心未化則餘怨尚在安得謂之善道此誠到理之言亦借喻也吕氏怨讟已深仇隙已甚卒未易以口舌和也縱然非其所是而是其所非報之以德直之以義豈能終無憾乎不若兩忘其和而化之以道則怨者不待和而和矣碧虚子言知有怨而和之不若無怨而不和若以刑政和報怨惡安可以爲善乎李氏曰接上章剛柔之義以恩和怨怨雖解而心尚存安可爲善不如責己恩怨兩忘恩怨兩忘則民自然而感德契之是以聖人執左契而不責於人林氏曰左契如今人合同文字也一人得左一人得右故曰左契此契在我則其物必可索聖人雖執此契而不以索於人忘而化之也吕氏曰古者結繩爲約而民不欺破木爲契而民不違是以聖人以人道而合天道以人心而合天心故執之千左爲契合之于右爲信不責於人亦應于天在此無斁在彼無惡上下相親無責於怨故曰執左契而不責於人吴氏曰執左契而不責於人謂無心待物也契者刻木爲券中分之各執其一而合之以表信取財物於人曰責契有左右左契在主財物之所右契以付來取財物之人臨川王氏曰史記云操左契以責事禮記云獻田宅者操左契是知左爲受責之所執故有德司契無德司徹天道無親常與善人林氏曰有德者司主此契而無求索之心無德者則以明白爲主徹明也猶今人言必與之討分曉也有德司契者善人也天道無親而此等之人天必祐之故曰常與善人何氏曰契爲要約也書契合同之類有德則得道多助如契在我不求而自合無德則失道寡助雖强求通徹於人人誰應之莊子好通物者非聖人此也夫苟有道德豈惟人與之而天固與之皇天無親惟德是輔故曰行善者我不知行惡者我不知積善善氣至積惡惡氣至積善神明輔成天道猶祐於善人此也李氏曰契者信約也徹通也有德之人執其信約無德之人司其明徹只知通爲明斷殊不知盡法無民矣安可爲善司契者存誠信與民心契也吕氏曰書曰皇天無私惟德是輔易曰自天祐之吉無不利蓋天之道未嘗分别取與爲善則善氣生爲惡則惡氣生自然相應也若乃上善之人自然符會惟善是與何用司契而責於人哉此太古之風也第八十章小國寡民使有什伯之器而不用使民重死而不遠徙林氏曰小國寡民猶孟子言得百里之地皆可以朝諸侯一天下之意老子蓋曰有道之人若得至小之國不多之民井而居之使有什伯如今之保伍也人人皆有可用之器而不求自用是人皆有士君子之行而安於自退重死而不遠徙小人皆畏不爲惡而各安其居也何氏曰小國寡民非不可於廣土衆民也以道用國即小以明大耳什伯人之器按西漢詔天下吏舍無得置什器儲偫顔師古注五人爲伍十人爲什則共器物故通謂之什伍之具爲什物猶今從軍作役者十人爲伙共蓄調度也十人爲什伯人爲伯可以數計使民有什伯之器而不用無往來免儲偫省徭役事無事之意國於天地無小無大無爲則治有爲則難民卒流亡始輕其生今既樂生則無復轉道塗者孰使之與吴氏曰十人爲什伯人爲伯什伯之器謂重大之器衆人所共者也不用者不營爲不貪求則重大之器無所用也重死者視死爲重事而愛養其生也不遠徙者生於此則死於此而不他適也老子欲挽衰周復還太古以國大民衆而難治故謙退而言若得小國寡民而治之則當使民無慕於外自足於内如此也雖有舟車無所乘之雖有甲兵無所陳之使民復結繩而用之甘其食美其服安其居樂其俗鄰國相望鷄犬之聲相聞民至老死不相往來林氏曰雖有舟車無所乘之不致遠以求利也雖有甲兵而不陳列不恃力以求勝也舍書契而用結繩復歸於素樸也甘食美衣安居樂俗鄰國相近鷄犬之聲雖相聞而老死不相往來各自足而不求也何氏曰舟車以通其欲今民少欲又何所乘甲兵以用於爭今民無爭又何所陳結繩未有書契以前事自今復用反古之淳又敦使之與甘食美服耕而食織而衣不饑不寒也安居樂俗其卧徐徐其覺于于自得自適也鄰國相望鷄鳴犬吠相聞而莫往莫來無求於世以老以死以淳風之盛皆由上古之人有道以使然爾吴氏曰此言有什伯之器而不用也舟車甲兵皆非一人所可獨用也所謂什伯之器也無所乘之無所陳之謂不用也無所行往則無用乎舟車無所爭競則無用乎甲兵民淳事簡則雖上古結繩之治可復雖有書契以代結繩而亦不可用不但不用什伯之器而已以所食之食爲甘以所服之服爲美充然自足以愛養其生所謂重死也以此身之居爲安而安之以此地之俗爲樂而樂之謂不遠徙也重其死者惟老死於所生之處孰肯輕易遠徙哉民皆懷土則雖有相鄰之國目可以相望其鷄犬之聲耳可以相聞雖如此至近而亦不相從至不但不徙於遠而已第八十一章信言不美美言不信善者不辯辯者不善知者不博博者不知吕氏曰信實之言淡乎無味其猶水也水淡而能乆不美者以其質而苦也美好之言甘而滋益能悦於人其猶醴也醴甘則易絶不信者以華爲虚也故曰信言不美美言不信善於心者貴乎能行而不求辯守素樸也辯於口者貴其能說滯於是非未必能知也故曰善者不辯辯者不善知其道者明於理而達其根本得其要而已矣所謂通於一萬事畢也何必博乎博者通於物務於事文滅質博溺心求彼是而已矣不知所謂多則惑也故曰知者不博博者不知林氏曰眞實之言則無華采有華采者非眞實之言也莊子言隱於榮華以博物爲能以博物爲誇非知道者李氏曰信言不美忠言逆耳也美言不信巧言令色也眞實之言淡泊虚妄之言華飾善爲道者無分别故不辯善辯者致爭之由也故不善眞知者光而不耀故不博廣博者明見於外故不知聖人不積既以爲人己愈有既以與人己愈多吕氏曰莊子天道運而無所積故海内服聖人之所謂不積者演道德以爲人人受其益而聖德愈彰如鑑之明未嘗少瘀分浮財以與貧貧受其賜而浮財愈有若井之泉清徹不竭萬物皆往資焉而不匱子列子以財惠人謂之賢人以德分人謂之聖人皆無積之謂也有積也故不足無藏也故有餘故曰聖人不積既以爲人己愈有既以與人己愈多何氏曰聖人不積何也莊子天道運而無所積故萬物生聖人運而無所積故海内服故曰以有積也故不足無藏也故有餘聖人所以既以爲人己愈有與人己愈多或分人以德或分人以財示人以信與人爲善積而能散博而能化莫非天下爲公之意林氏曰聖人之道虚一而已何所積乎未嘗不爲人也而在己者愈有未嘗不與人也而在己者愈多其猶天道然虚而不屈動而愈出爲人與人言以道化物也天之道利而不害聖人之道爲而不爭吕氏曰天道陽也故好生而惡殺謂之有利而無害春夏故生之育之秋冬故成之熟之以其至公無私每成人之善而不成人之惡與人之利而不與人害故曰天之道利而不害天不言而善應常應之以實而不以文聖人體之以爲和法之以爲用施而爲之明於天通於聖所謂六通四闢爲萬物之宗而不爭也何氏曰善利萬物而不害者天之道善爲萬事而不爭者聖人之道易曰乾始能以美利利天下不言所利大矣哉大哉乾元剛健中正純粹精也雲行雨施天下平也體乾聖人備道全美博施濟衆大有爲而靡有爭一乾元之妙用也老子末章先去言中及人後同天聖人功用至此豈不大備哉知易則知老林氏曰天之道雖有美利而不言所利則但見有利而無害纔有利之之名則害亦見矣聖人之道無爲而無不爲而未嘗自恃其有故不與物爭而天下莫能與之爭一書之意大抵以不爭爲主故亦以此語結李氏曰天地大德曰生故曰利而不害聖人守位曰仁故曰爲而不爭只這不爭二字爲日用乆乆純熟則自然造混元之境眞常之道至是盡矣象帝之先明妙之本得矣道德眞經集義卷之十
